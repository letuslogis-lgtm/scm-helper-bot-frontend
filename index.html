              const issueStr = cleanTxt(row['이슈내용']);
              if (applyFilters) {
                if (brandStr.includes('이케아')) return;
                if (issueStr.includes('[SCM팀 부족량 CUT 조치결과]')) return;
              }
              let type = cleanTxt(row['조치결과구분']);
              if (!validTypes.includes(type)) {
                if (type === '') type = '미확인';
                else return;
              }
              const orderId = cleanId(findCol(row, ['수주번호']));
              if (!orderId) return;
              const accDate = findCol(row, ['서비스예약일', '예약일']);
              let delayCount = 0;
              const accTime = normalizeDate(accDate);
              if (schMap[orderId] && accTime > 0) {
                const uniqueSchDates = [...new Set(schMap[orderId].map(d => normalizeDate(d)).filter(time => time > 0))];
                uniqueSchDates.forEach(schTime => { if (schTime >= accTime) delayCount++; });
              }
              const isDelayed = delayCount >= 2 ? "재일정(지연)" : "-";
              const item = cleanTxt(findCol(row, ['단품코드', '품목코드']));
              const color = cleanTxt(row['색상']);
              let finalItemCode = item;
              if (color && !item.includes(color) && !item.includes('-')) { finalItemCode = `${item}-${color}`; }
              const wmsCandidates = wmsByOrder[orderId] || [];
              let matchedWms = {};
              if (wmsCandidates.length === 1) matchedWms = wmsCandidates[0];
              else if (wmsCandidates.length > 1) matchedWms = wmsCandidates.find(w => w.item.includes(item) || item.includes(w.item)) || wmsCandidates[0];
              const loc = matchedWms.loc;
              const zone = loc ? String(loc)[0].toUpperCase() : '';
              let shift = '-';
              if (matchedWms.time) {
                let h;
                if (matchedWms.time instanceof Date) h = matchedWms.time.getHours();
                else { const d = new Date(matchedWms.time); if (!isNaN(d.getTime())) h = d.getHours(); }
                if (h !== undefined) shift = (h >= 9 && h < 18) ? '주간' : '야간';
              }
              processed.push({
                service_date: accDate, brand: brandStr || '알수없음', service_center: row['서비스센터'] || '', service_type: row['시공/AS'] || '',
                order_no: orderId, order_name: row['수주건명'] || '', item_code: finalItemCode, issue_qty: parseInt(row['이슈수량']) || 0,
                action_result: type, is_delayed: isDelayed, zone: zone, worker_name: matchedWms.worker || '', shift_type: shift, status: '원인 파악 중'
              });
            });

            if (processed.length === 0) { alert('분석 결과 저장할 데이터가 없습니다.'); setIsLoading(false); return; }
            const orderNos = [...new Set(processed.map(p => p.order_no))];
            const { data: existingData, error: fetchError } = await supabase.from('logistics_accidents').select('id, order_no, item_code, is_delayed, zone, worker_name, shift_type').in('order_no', orderNos);
            if (fetchError) throw fetchError;
            const existingMap = new Map();
            (existingData || []).forEach(d => { existingMap.set(`${d.order_no}_${d.item_code}`, d); });
            const toInsert = []; const toUpdate = [];
            processed.forEach(p => {
              const key = `${p.order_no}_${p.item_code}`;
              const existingRow = existingMap.get(key);
              if (!existingRow) { toInsert.push(p); }
              else {
                let finalDelayed = existingRow.is_delayed;
                if (p.is_delayed === '재일정(지연)') finalDelayed = '재일정(지연)';
                let finalZone = existingRow.zone; let finalWorker = existingRow.worker_name; let finalShift = existingRow.shift_type;
                if (p.worker_name) { finalZone = p.zone; finalWorker = p.worker_name; finalShift = p.shift_type; }
                toUpdate.push({
                  id: existingRow.id, service_date: p.service_date, brand: p.brand, service_center: p.service_center, service_type: p.service_type,
                  order_no: p.order_no, order_name: p.order_name, item_code: p.item_code, issue_qty: p.issue_qty, action_result: p.action_result,
                  is_delayed: finalDelayed, zone: finalZone, worker_name: finalWorker, shift_type: finalShift, updated_at: new Date().toISOString()
                });
              }
            });
            if (toInsert.length === 0 && toUpdate.length === 0) { alert(`✅ 이미 최신 상태입니다.`); setIsLoading(false); return; }
            if (toInsert.length > 0) { const { error } = await supabase.from('logistics_accidents').insert(toInsert); if (error) throw error; }
            if (toUpdate.length > 0) { const { error } = await supabase.from('logistics_accidents').upsert(toUpdate, { onConflict: 'id' }); if (error) throw error; }
            alert(`🎉 업데이트 완료!\n- 신규: ${toInsert.length}건\n- 수정: ${toUpdate.length}건`);
          }
          else if (rawSch.length > 0) {
            const orderNos = Object.keys(schMap);
            const { data: existingData, error: fetchError } = await supabase.from('logistics_accidents').select('id, order_no, service_date, is_delayed').in('order_no', orderNos);
            if (fetchError) throw fetchError;
            const toUpdate = [];
            existingData.forEach(row => {
              const accTime = normalizeDate(row.service_date);
              let delayCount = 0;
              if (schMap[row.order_no] && accTime > 0) {
                const uniqueSchDates = [...new Set(schMap[row.order_no].map(d => normalizeDate(d)).filter(time => time > 0))];
                uniqueSchDates.forEach(schTime => { if (schTime >= accTime) delayCount++; });
              }
              const newIsDelayed = delayCount >= 2 ? "재일정(지연)" : "-";
              if (newIsDelayed === '재일정(지연)' && row.is_delayed === '-') {
                toUpdate.push({ id: row.id, is_delayed: '재일정(지연)', updated_at: new Date().toISOString() });
              }
            });
            if (toUpdate.length > 0) { await supabase.from('logistics_accidents').upsert(toUpdate, { onConflict: 'id' }); alert(`✅ 지연 업데이트 완료 (${toUpdate.length}건)`); }
            else { alert('✅ 새롭게 지연된 건이 없습니다.'); }
          }
          fetchAccidents();
        } catch (error) { alert('오류: ' + error.message); console.error(error); setIsLoading(false); }
      };

      return (
        <div className="p-6 bg-slate-100 h-[calc(100vh-64px)] flex flex-col gap-4 slide-up">

          {/* 🔍 조회구역 메인 레이아웃 (아코디언 방식) */}
          <div className="w-full bg-white rounded-lg shadow-sm border border-slate-200 px-6 py-3 flex flex-col gap-3 z-30 shrink-0 transition-all duration-300">

            {/* 🔽 Row 1: 기본 검색 (브랜드, 날짜, 검색어, 정상출고토글) */}
            <div className="flex items-center gap-5 w-full flex-wrap">
              <MultiSelect label="브랜드" options={['퍼시스', '일룸', '슬로우베드', '데스커', '시디즈', '알로소']} selected={draftFilters.brands} onChange={(val) => setDraftFilters({ ...draftFilters, brands: val })} />

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">서비스예약일</label>
                <div className="flex items-center">
                  <input type="date" value={draftFilters.startDate} onChange={e => setDraftFilters({ ...draftFilters, startDate: e.target.value })} className="border border-gray-200 rounded-[3px] text-xs px-2 h-[30px] w-[110px] focus:outline-none focus:border-letusBlue" />
                  <span className="mx-1 text-gray-400 text-xs">~</span>
                  <input type="date" value={draftFilters.endDate} onChange={e => setDraftFilters({ ...draftFilters, endDate: e.target.value })} className="border border-gray-200 rounded-[3px] text-xs px-2 h-[30px] w-[110px] focus:outline-none focus:border-letusBlue" />
                </div>
              </div>

              {/* 🔥 검색어 드롭박스: 수주번호 항목 추가 */}
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">검색어</label>
                <div className="flex gap-0.5 h-[30px]">
                  <select value={draftFilters.searchType} onChange={e => setDraftFilters({ ...draftFilters, searchType: e.target.value })} className="border border-gray-200 rounded-l-[3px] text-xs px-2 text-gray-700 bg-gray-50 focus:outline-none cursor-pointer">
                    <option>수주번호</option>
                    <option>수주명</option>
                    <option>품목코드</option>
                  </select>
                  <input type="text" value={draftFilters.searchValue} onChange={e => setDraftFilters({ ...draftFilters, searchValue: e.target.value })} onKeyDown={e => e.key === 'Enter' && handleSearchClick()} className="border border-gray-200 rounded-r-[3px] text-xs px-2.5 w-36 focus:outline-none focus:border-letusOrange" placeholder="검색어 입력" />
                </div>
              </div>

              <div className="flex items-center shrink-0 bg-blue-50/50 px-3 py-1.5 rounded border border-blue-100">
                <label className="flex items-center gap-1.5 cursor-pointer text-xs font-bold text-letusBlue">
                  <input type="checkbox" checked={draftFilters.showNormal} onChange={e => setDraftFilters({ ...draftFilters, showNormal: e.target.checked })} className="w-3.5 h-3.5 accent-letusBlue cursor-pointer" />
                  '정상출고' 포함
                </label>
              </div>

              <div className="ml-auto flex items-center gap-2 shrink-0">
                <button onClick={() => setIsAdvancedOpen(!isAdvancedOpen)} className={`text-[11px] font-bold border px-3 h-[30px] rounded-[3px] transition-colors flex items-center gap-1 shadow-sm ${isAdvancedOpen ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
                  <svg className={`w-3.5 h-3.5 transition-transform ${isAdvancedOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
                  상세 조회
                </button>
                <div className="w-px h-4 bg-gray-200 mx-1"></div>
                <button onClick={handleResetClick} className="border border-gray-300 text-gray-500 hover:bg-gray-50 font-bold px-4 h-[30px] rounded-[3px] text-xs">초기화</button>
                <button onClick={handleSearchClick} className="bg-letusOrange text-white hover:bg-orange-500 font-bold px-6 h-[30px] rounded-[3px] text-xs shadow-sm flex items-center gap-1.5"><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> 조회하기</button>
              </div>
            </div>

            {/* 🔽 Row 2: 상세 검색 (6종 세트 완벽 배치) */}
            {isAdvancedOpen && (
              <div className="flex flex-col gap-3 pt-3 mt-1 border-t border-gray-100 slide-up">
                <div className="flex items-center gap-6 w-full flex-wrap">
                  {/* 1. 서비스센터 */}
                  <MultiSelect label="서비스센터" options={['양지센터', '대전센터', '대구센터', '광주센터', '전북센터', '전남센터', '부산센터', '울산센터', '창원센터', '제주센터']} selected={draftFilters.centers} onChange={(val) => setDraftFilters({ ...draftFilters, centers: val })} width="w-40" />

                  {/* 2. 시공/AS */}
                  <MultiSelect label="시공/AS" options={['시공', 'AS']} selected={draftFilters.serviceTypes} onChange={(val) => setDraftFilters({ ...draftFilters, serviceTypes: val })} width="w-24" />

                  {/* 3. 처리상태 */}
                  <MultiSelect label="처리상태" options={['원인 파악 중', '등록 완료']} selected={draftFilters.statuses} onChange={(val) => setDraftFilters({ ...draftFilters, statuses: val })} width="w-32" />

                  {/* 4. 귀책부서 */}
                  <MultiSelect label="귀책부서" options={['물류사업1팀', '물류사업2팀', '운송사업팀', '컨택센터', '라스트마일1팀', '라스트마일2팀', '기타']} selected={draftFilters.depts} onChange={(val) => setDraftFilters({ ...draftFilters, depts: val })} width="w-40" />

                  {/* 5. 조치결과구분 */}
                  <MultiSelect label="조치결과" options={['미확인', '미출고', '오출고', '물류파손', '정상출고', '납기연기(건)', '납기연기(품목)']} selected={draftFilters.actionResults} onChange={(val) => setDraftFilters({ ...draftFilters, actionResults: val })} width="w-40" />

                  {/* 6. 납기지연판별 */}
                  <div className="flex items-center shrink-0">
                    <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">지연판별</label>
                    <select value={draftFilters.isDelayed} onChange={e => setDraftFilters({ ...draftFilters, isDelayed: e.target.value })} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusBlue cursor-pointer bg-white text-gray-700 w-32 font-medium">
                      <option value="전체">전체 (All)</option>
                      <option value="지연">재일정(지연)</option>
                      <option value="정상">정상(지연없음)</option>
                    </select>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="flex justify-end gap-3 z-30 px-2 -mb-2 shrink-0">
            <button onClick={handleExportExcel} className={`flex items-center text-[11px] font-bold px-3 py-1.5 rounded shadow-sm transition-all border ${selectedIds.length > 0 ? 'bg-green-50 text-green-700 border-green-300 hover:bg-green-100' : 'bg-white text-gray-400 border-gray-200 cursor-not-allowed'}`}>
              <svg className="w-3.5 h-3.5 mr-1.5" fill="currentColor" viewBox="0 0 24 24"><path d="M21.17 3.25q.33 0 .59.25q.24.26.24.59v15.82q0 .33-.24.59q-.26.25-.59.25H2.83q-.33 0-.59-.25q-.24-.26-.24-.59V4.09q0-.33.24-.59q.26-.25.59-.25h18.34zm-8.25 10.9l3.52 4.67h2.7l-4.9-6.07 4.65-5.94h-2.65l-3.23 4.48-3.32-4.48H7.07l4.76 5.94-5 6.07h2.72l3.37-4.67z" /></svg>
              선택 다운로드 {selectedIds.length > 0 && `(${selectedIds.length})`}
            </button>
            {userProfile?.role === '관리자' && (
              <button onClick={() => setIsUploadModalOpen(true)} className="bg-white border border-green-600 text-green-600 px-4 py-1.5 rounded-[4px] text-[11px] font-bold flex items-center cursor-pointer hover:bg-green-50 transition-colors shadow-sm">
                <svg className="w-3.5 h-3.5 mr-1.5" fill="currentColor" viewBox="0 0 24 24"><path d="M21.17 3.25q.33 0 .59.25q.24.26.24.59v15.82q0 .33-.24.59q-.26.25-.59.25H2.83q-.33 0-.59-.25q-.24-.26-.24-.59V4.09q0-.33.24-.59q.26-.25.59-.25h18.34zm-8.25 10.9l3.52 4.67h2.7l-4.9-6.07 4.65-5.94h-2.65l-3.23 4.48-3.32-4.48H7.07l4.76 5.94-5 6.07h2.72l3.37-4.67z" /></svg> 데이터 통합 업로드 (Excel)
              </button>
            )}
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex-1 flex flex-col min-h-0 relative z-20 overflow-hidden">
            <div className="overflow-auto flex-1 custom-scrollbar">
              <table className="w-full text-left whitespace-nowrap table-fixed min-w-[1420px] text-[13px]">
                <thead className="bg-gray-50 border-b border-gray-200 text-xs text-gray-500 font-bold sticky top-0 z-10">
                  <tr>
                    <th className="p-4 w-[50px] text-center"><input type="checkbox" checked={sortedItems.length > 0 && selectedIds.length === sortedItems.length} onChange={handleSelectAll} className="w-4 h-4 cursor-pointer accent-letusBlue" /></th>
                    {[
                      { label: '서비스예약일', key: 'service_date', w: '110px' },
                      { label: '브랜드', key: 'brand', w: '90px' },
                      { label: '서비스센터', key: 'service_center', w: '90px' },
                      { label: '시공/AS', key: 'service_type', w: '80px' },
                      { label: '수주번호', key: 'order_no', w: '150px' },
                      { label: '수주명', key: 'order_name', w: 'auto' },
                      { label: '품목코드', key: 'item_code', w: '180px' },
                      { label: '수량', key: 'issue_qty', w: '70px' },
                      { label: '처리상태', key: 'status', w: '120px' },
                      { label: '귀책부서', key: 'responsible_dept', w: '120px' },
                      { label: '조치결과구분', key: 'action_result', w: '130px' },
                      { label: '납기지연판별', key: 'is_delayed', w: '110px' }
                    ].map((col, idx) => (
                      <th key={idx} className={`p-4 text-center select-none ${col.key ? 'cursor-pointer hover:bg-gray-100 transition-colors' : ''}`} style={{ width: col.w }} onClick={() => col.key && requestSort(col.key)}>
                        <div className="flex items-center justify-center">{col.label} {col.key && getSortIcon(col.key)}</div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {isLoading ? (
                    <tr><td colSpan="13" className="py-32 text-center"><div className="flex flex-col items-center gap-3"><div className="w-8 h-8 border-4 border-blue-100 border-t-letusBlue rounded-full animate-spin"></div><p className="text-gray-500 font-bold">데이터 로딩 중...</p></div></td></tr>
                  ) : sortedItems.length === 0 ? (
                    <tr><td colSpan="13" className="p-20 text-center text-gray-400 font-bold">조회 결과가 없습니다.</td></tr>
                  ) : sortedItems.map(row => (
                    <tr key={row.id} onDoubleClick={() => setActiveRow(row)} className={`cursor-pointer transition-colors ${selectedIds.includes(row.id) ? 'bg-blue-50/50 hover:bg-blue-50' : 'hover:bg-blue-50/30'}`}>
                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(row.id)} onChange={() => handleSelectOne(row.id)} className="w-4 h-4 cursor-pointer accent-letusBlue" /></td>
                      <td className="p-4 text-center text-gray-700">{row.service_date}</td>
                      <td className="p-4 text-center font-semibold">{row.brand}</td>
                      <td className="p-4 text-center text-gray-600">{row.service_center}</td>
                      <td className="p-4 text-center"><span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${row.service_type === '시공' ? 'bg-blue-50 text-blue-600' : 'bg-orange-50 text-orange-600'}`}>{row.service_type}</span></td>
                      <td className="p-4 text-center font-mono text-gray-500">{row.order_no}</td>
                      <td className="p-4 font-bold text-gray-800 truncate">{row.order_name}</td>
                      <td className="p-4 text-gray-600 truncate">{row.item_code}</td>
                      <td className="p-4 text-center font-bold">{row.issue_qty}</td>
                      <td className="p-4 text-center"><span className={`px-2 py-1 rounded text-[11px] font-bold ${row.status === '등록 완료' ? 'bg-green-50 text-green-600 border border-green-200' : 'bg-red-50 text-red-600 border border-red-100 animate-pulse'}`}>{row.status}</span></td>
                      <td className="p-4 text-center font-bold text-letusBlue">{row.responsible_dept || '-'}</td>
                      <td className="p-4 text-center text-gray-600">{row.action_result}</td>
                      <td className={`p-4 font-black text-center ${row.is_delayed !== '-' ? 'text-red-500' : 'text-gray-400'}`}>{row.is_delayed}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {activeRow && <AccidentModal row={activeRow} onClose={() => setActiveRow(null)} onReload={fetchAccidents} userProfile={userProfile} />}
          {isUploadModalOpen && <AccidentUploadModal onClose={() => setIsUploadModalOpen(false)} onFileUpload={handleFileUpload} />}
        </div>
      );
    };

    // --- 🌟 건의사항 상세/답변 모달 (SuggestionModal) ---
    const SuggestionModal = ({ item, onClose, onReload, userProfile }) => {
      const isAdmin = userProfile?.role === '관리자';
      const isAuthor = userProfile?.name === item.user_name;
      const [answer, setAnswer] = useState(item.answer || '');
      const [status, setStatus] = useState(item.status || '대기중');
      const [isSaving, setIsSaving] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false);

      const handleSave = async () => {
        setIsSaving(true);
        try {
          const { error } = await supabase.from('suggestions').update({ answer: answer, status: status }).eq('id', item.id);
          if (error) throw error;
          alert('답변 및 상태가 성공적으로 저장되었습니다.');
          onReload();
          onClose();
        } catch (error) {
          alert('저장 실패: ' + error.message);
        } finally {
          setIsSaving(false);
        }
      };

      const handleDelete = async () => {
        if (!window.confirm('이 건의사항을 정말 삭제하시겠습니까?\n삭제된 데이터는 영구적으로 복구할 수 없습니다.')) return;
        setIsDeleting(true);
        try {
          const { error } = await supabase.from('suggestions').delete().eq('id', item.id);
          if (error) throw error;
          alert('건의사항이 삭제되었습니다.');
          onReload();
          onClose();
        } catch (error) {
          alert('삭제 실패: ' + error.message);
        } finally {
          setIsDeleting(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-2xl slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-gray-900 flex items-center gap-2">
                <span className="text-[10px] font-black bg-gray-200 text-gray-600 px-2 py-0.5 rounded uppercase tracking-wider">{item.request_type}</span>
                건의사항 상세 내역
              </h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>
            <div className="p-6 bg-white space-y-6 overflow-y-auto max-h-[70vh] custom-scrollbar">
              <div>
                <div className="flex justify-between items-end mb-2">
                  <h4 className="text-lg font-bold text-gray-800">{item.title}</h4>
                  <span className="text-xs font-medium text-gray-400">{new Date(item.created_at).toLocaleString()} | 작성자: <span className="font-bold text-gray-600">{item.user_name}</span></span>
                </div>
                <div className="bg-gray-50 p-4 rounded-lg text-sm text-gray-700 min-h-[100px] whitespace-pre-wrap border border-gray-100 leading-relaxed">
                  {item.content}
                </div>
              </div>
              <div className="border-t border-gray-100 pt-5">
                <div className="flex justify-between items-center mb-3">
                  <h4 className="text-sm font-bold text-letusBlue flex items-center gap-1.5">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
                    관리자 피드백
                  </h4>
                  {isAdmin ? (
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-bold text-gray-500">진행 상태:</span>
                      <select value={status} onChange={(e) => setStatus(e.target.value)} className="border border-gray-300 rounded px-2 py-1 text-xs font-bold text-gray-700 focus:border-letusBlue outline-none cursor-pointer">
                        <option value="대기중">대기중</option>
                        <option value="검토중">검토중</option>
                        <option value="반영완료">반영완료</option>
                        <option value="반려">반려</option>
                      </select>
                    </div>
                  ) : (
                    <span className={`text-[11px] font-bold px-2.5 py-1 rounded shadow-sm border ${status === '반영완료' ? 'bg-green-50 text-green-600 border-green-200' : status === '검토중' ? 'bg-blue-50 text-blue-600 border-blue-200' : status === '반려' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-gray-100 text-gray-600 border-gray-200'}`}>{status}</span>
                  )}
                </div>
                {isAdmin ? (
                  <textarea
                    value={answer}
                    onChange={(e) => setAnswer(e.target.value)}
                    placeholder="건의사항에 대한 답변이나 조치 결과를 작성해 주세요."
                    className="w-full border border-blue-200 bg-blue-50/30 rounded-lg p-4 text-sm text-gray-800 focus:ring-2 focus:ring-letusBlue focus:border-letusBlue outline-none resize-none h-32 transition-shadow"
                  ></textarea>
                ) : (
                  <div className="bg-blue-50/50 p-4 rounded-lg text-sm text-gray-800 min-h-[80px] whitespace-pre-wrap border border-blue-100 leading-relaxed">
                    {answer ? answer : <span className="text-gray-400 italic">아직 등록된 답변이 없습니다. 담당자가 내용을 꼼꼼히 검토 중입니다.</span>}
                  </div>
                )}
              </div>
            </div>
            <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
              <div>
                {(isAdmin || isAuthor) && (
                  <button onClick={handleDelete} disabled={isDeleting || isSaving} className={`px-4 py-2 border border-red-200 text-red-500 bg-red-50 text-sm font-bold rounded hover:bg-red-100 transition-colors shadow-sm flex items-center gap-1.5 ${isDeleting ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    {isDeleting ? '삭제 중...' : '삭제'}
                  </button>
                )}
              </div>
              <div className="flex gap-2">
                <button onClick={onClose} disabled={isDeleting || isSaving} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded hover:bg-gray-100 transition-colors bg-white shadow-sm">
                  닫기
                </button>
                {isAdmin && (
                  <button onClick={handleSave} disabled={isSaving || isDeleting} className={`px-6 py-2 bg-letusBlue text-white text-sm font-bold rounded shadow hover:bg-blue-600 transition-colors flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    {isSaving ? '저장 중...' : '답변 저장'}
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 🌟 FAQ 등록 모달 (FaqAddModal) ---
    const FaqAddModal = ({ onClose, onReload }) => {
      const [category, setCategory] = useState('시스템 설정');
      const [question, setQuestion] = useState('');
      const [answer, setAnswer] = useState('');
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async (e) => {
        e.preventDefault();
        if (!question.trim() || !answer.trim()) {
          alert('질문과 답변을 모두 입력해 주세요.');
          return;
        }

        setIsSaving(true);
        try {
          const { error } = await supabase.from('faqs').insert([{ category, question, answer }]);
          if (error) throw error;
          alert('새로운 FAQ가 성공적으로 등록되었습니다.');
          onReload();
          onClose();
        } catch (error) {
          alert('등록 실패: ' + error.message);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-lg slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-5 border-b border-gray-100 bg-white flex justify-between items-center">
              <h3 className="font-bold text-gray-900 flex items-center gap-2">
                <span className="w-1.5 h-3.5 bg-letusOrange rounded-full"></span>
                새 FAQ (자주 묻는 질문) 등록
              </h3>
              <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>
            <div className="p-6 bg-slate-50">
              <form id="faqForm" onSubmit={handleSave} className="space-y-5">
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">카테고리 분류 <span className="text-letusOrange">*</span></label>
                  <select value={category} onChange={(e) => setCategory(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2.5 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800 cursor-pointer">
                    <option>시스템 설정</option>
                    <option>계정/권한</option>
                    <option>입고 관리</option>
                    <option>특이사항 처리</option>
                    <option>기타</option>
                  </select>
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">질문 (Question) <span className="text-letusOrange">*</span></label>
                  <input type="text" value={question} onChange={(e) => setQuestion(e.target.value)} required placeholder="예) 특이사항 알림이 오지 않습니다." className="border border-gray-300 rounded-[4px] px-3.5 py-2.5 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800" />
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">답변 (Answer) <span className="text-letusOrange">*</span></label>
                  <textarea value={answer} onChange={(e) => setAnswer(e.target.value)} required rows={5} placeholder="사용자에게 보여질 상세한 해결 방법을 적어주세요." className="border border-gray-300 rounded-[4px] px-3.5 py-3 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800 resize-none leading-relaxed"></textarea>
                </div>
              </form>
            </div>
            <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-2 shrink-0">
              <button type="button" onClick={onClose} disabled={isSaving} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded-[3px] hover:bg-gray-50 transition-colors shadow-sm">
                취소
              </button>
              <button onClick={handleSave} disabled={isSaving} className={`px-6 py-2 bg-letusOrange text-white text-sm font-bold rounded-[3px] shadow-sm hover:bg-orange-600 transition-colors flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                {isSaving ? '등록 중...' : 'FAQ 등록'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 🌟 지원센터 메인 컴포넌트 ---
    const SupportCenter = ({ userProfile }) => {
      const [activeTab, setActiveTab] = useState('faq');
      const [openFaqId, setOpenFaqId] = useState(null);
      const [activeModalItem, setActiveModalItem] = useState(null);
      const [isFaqModalOpen, setIsFaqModalOpen] = useState(false);

      const [faqs, setFaqs] = useState([]);
      const [suggestions, setSuggestions] = useState([]);
      const [mySuggestions, setMySuggestions] = useState([]);
      const [isLoading, setIsLoading] = useState(false);

      const [sugType, setSugType] = useState('기능 개선 (UI/UX)');
      const [sugTitle, setSugTitle] = useState('');
      const [sugContent, setSugContent] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      const fetchData = async () => {
        setIsLoading(true);
        try {
          const { data: faqData } = await supabase.from('faqs').select('*').order('id', { ascending: true });
          if (faqData) setFaqs(faqData);

          if (userProfile?.role === '관리자') {
            const { data: sugData } = await supabase.from('suggestions').select('*').order('created_at', { ascending: false });
            if (sugData) setSuggestions(sugData);
          }

          if (userProfile?.name) {
            const { data: myData } = await supabase.from('suggestions').select('*').eq('user_name', userProfile.name).order('created_at', { ascending: false });
            if (myData) setMySuggestions(myData);
          }
        } catch (error) {
          console.error("Fetch error:", error);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, [activeTab, userProfile]);

      const handleSubmitSuggestion = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        try {
          const { error } = await supabase.from('suggestions').insert([{
            user_name: userProfile?.name || '알수없음',
            request_type: sugType,
            title: sugTitle,
            content: sugContent
          }]);
          if (error) throw error;

          alert('건의사항이 성공적으로 접수되었습니다.\n하단의 "나의 건의 내역"에서 답변을 확인하실 수 있습니다.');
          setSugTitle(''); setSugContent('');
          fetchData();
        } catch (error) {
          alert('오류가 발생했습니다: ' + error.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] slide-up">
          <div className="max-w-5xl mx-auto">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
              <div className="p-6 border-b border-gray-100 bg-gradient-to-r from-blue-50/50 to-white flex justify-between items-center">
                <div>
                  <h2 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <svg className="w-6 h-6 text-letusBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    지원센터
                  </h2>
                  <p className="text-sm text-gray-500 mt-1">시스템 이용 중 궁금한 점이나 개선 사항을 남겨주세요.</p>
                </div>
              </div>
              <div className="flex px-2 pt-2 bg-gray-50/50 border-b border-gray-100">
                <button onClick={() => setActiveTab('faq')} className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'faq' ? 'border-letusBlue text-letusBlue' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                  자주 묻는 질문 (FAQ)
                </button>
                <button onClick={() => setActiveTab('suggestion')} className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'suggestion' ? 'border-letusBlue text-letusBlue' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                  시스템 건의사항 접수
                </button>
                {userProfile?.role === '관리자' && (
                  <button onClick={() => setActiveTab('admin')} className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ml-auto flex items-center gap-1 ${activeTab === 'admin' ? 'border-orange-500 text-orange-600' : 'border-transparent text-orange-400 hover:text-orange-600'}`}>
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
                    관리자 전용
                  </button>
                )}
              </div>
            </div>

            {activeTab === 'faq' && (
              <div className="space-y-3 animate-fade-in">
                {isLoading ? <p className="text-center text-gray-500 py-10">FAQ 불러오는 중...</p> : faqs.length === 0 ? <p className="text-center text-gray-500 py-10">등록된 FAQ가 없습니다.</p> : faqs.map((faq) => (
                  <div key={faq.id} className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">

        const channel = supabase
          .channel('logistics_issue_notifications')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '신규 입고'); })

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
            <svg className="animate-spin h-8 w-8 text-letusBlue mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span className="text-sm font-bold text-slate-500 tracking-wide">인증 세션을 확인 중입니다...</span>
          </div>
        );
      }

      if (!session) return <LoginView />;

      return (
        <div className="flex h-screen overflow-hidden bg-letusBg text-gray-900 font-sans">
          <Sidebar page={currentPage} setPage={setCurrentPage} userProfile={userProfile} isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen} favorites={favorites} />
          <div className="flex-1 flex flex-col w-full bg-slate-100 overflow-y-auto overflow-x-hidden min-h-screen relative">

            <Header
              page={currentPage} userProfile={userProfile} onLogout={handleLogout} notifications={notifications} isNotiOpen={isNotiOpen}
              toggleNoti={() => setIsNotiOpen(!isNotiOpen)} onNotiClick={handleNotiClick} onEditProfile={() => setSelfEditTarget(userProfile)}
              favorites={favorites} toggleFavorite={toggleFavorite} isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen}
              onMarkAllRead={handleMarkAllAsRead}
            />

            <main className="flex-1 w-full">
              <div className={currentPage === 'dashboard' ? 'block' : 'hidden'}>
                <Dashboard onNavigateToList={() => setCurrentPage('list')} onDrillDown={handleDrillDown} issues={issues} isLoading={isLoading} onReload={fetchIssues} />
              </div>
              <div className={currentPage === 'list' ? 'block' : 'hidden'}>
                <IssueList userProfile={userProfile} issues={issues} isLoading={isLoading} onReload={fetchIssues} savedFilters={savedListFilters} setSavedFilters={setSavedListFilters} />
              </div>
              <div className={currentPage === 'user_management' ? 'block' : 'hidden'}>
                <UserManagement />
              </div>
              <div className={currentPage === 'support' ? 'block' : 'hidden'}>
                <SupportCenter userProfile={userProfile} />
              </div>
              {/* 🔥 사고분석 대시보드 화면 */}
              <div className={currentPage === 'accident_dashboard' ? 'block' : 'hidden'}>
                <AccidentDashboard userProfile={userProfile} />
              </div>

              {/* 🔥 사고분석 LIST (임시 뼈대 삭제 후 실제 컴포넌트 연결) */}
              <div className={currentPage === 'accident_list' ? 'block' : 'hidden'}>
                <AccidentList userProfile={userProfile} />
              </div>

              {/* 🔥 마스터 데이터 관리 화면 */}
              <div className={currentPage === 'product_manager' ? 'block' : 'hidden'}>
                <ProductManager />
              </div>
            </main>

            {selfEditTarget && (
              <UserEditModal user={selfEditTarget} onClose={() => setSelfEditTarget(null)} onReload={fetchProfile} isProfileMode={true} />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
