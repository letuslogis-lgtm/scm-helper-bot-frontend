                  <textarea value={answer} onChange={(e) => setAnswer(e.target.value)} required rows={5} placeholder="사용자에게 보여질 상세한 해결 방법을 적어주세요." className="border border-gray-300 rounded-[4px] px-3.5 py-3 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800 resize-none leading-relaxed"></textarea>
                </div>
              </form>
            </div>
            <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-2 shrink-0">
              <button type="button" onClick={onClose} disabled={isSaving} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded-[3px] hover:bg-gray-50 transition-colors shadow-sm">
                취소
              </button>
              <button onClick={handleSave} disabled={isSaving} className={`px-6 py-2 bg-letusOrange text-white text-sm font-bold rounded-[3px] shadow-sm hover:bg-orange-600 transition-colors flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                {isSaving ? '등록 중...' : 'FAQ 등록'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 🌟 지원센터 메인 컴포넌트 ---
    const SupportCenter = ({ userProfile }) => {
      const [activeTab, setActiveTab] = useState('faq');
      const [openFaqId, setOpenFaqId] = useState(null);
      const [activeModalItem, setActiveModalItem] = useState(null);
      const [isFaqModalOpen, setIsFaqModalOpen] = useState(false);

      const [faqs, setFaqs] = useState([]);
      const [suggestions, setSuggestions] = useState([]);
      const [mySuggestions, setMySuggestions] = useState([]);
      const [isLoading, setIsLoading] = useState(false);

      const [sugType, setSugType] = useState('기능 개선 (UI/UX)');
      const [sugTitle, setSugTitle] = useState('');
      const [sugContent, setSugContent] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      const fetchData = async () => {
        setIsLoading(true);
        try {
          const { data: faqData } = await supabase.from('faqs').select('*').order('id', { ascending: true });
          if (faqData) setFaqs(faqData);

          if (userProfile?.role === '관리자') {
            const { data: sugData } = await supabase.from('suggestions').select('*').order('created_at', { ascending: false });
            if (sugData) setSuggestions(sugData);
          }

          if (userProfile?.name) {
            const { data: myData } = await supabase.from('suggestions').select('*').eq('user_name', userProfile.name).order('created_at', { ascending: false });
            if (myData) setMySuggestions(myData);
          }
        } catch (error) {
          console.error("Fetch error:", error);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, [activeTab, userProfile]);

      const handleSubmitSuggestion = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        try {
          const { error } = await supabase.from('suggestions').insert([{
            user_name: userProfile?.name || '알수없음',
            request_type: sugType,
            title: sugTitle,
            content: sugContent
          }]);
          if (error) throw error;

          alert('건의사항이 성공적으로 접수되었습니다.\n하단의 "나의 건의 내역"에서 답변을 확인하실 수 있습니다.');
          setSugTitle(''); setSugContent('');
          fetchData();
        } catch (error) {
          alert('오류가 발생했습니다: ' + error.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] slide-up">
          <div className="max-w-5xl mx-auto">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
              <div className="p-6 border-b border-gray-100 bg-gradient-to-r from-blue-50/50 to-white flex justify-between items-center">
                <div>
                  <h2 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <svg className="w-6 h-6 text-letusBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    지원센터
                  </h2>
                  <p className="text-sm text-gray-500 mt-1">시스템 이용 중 궁금한 점이나 개선 사항을 남겨주세요.</p>
                </div>
              </div>
              <div className="flex px-2 pt-2 bg-gray-50/50 border-b border-gray-100">
                <button onClick={() => setActiveTab('faq')} className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'faq' ? 'border-letusBlue text-letusBlue' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                  자주 묻는 질문 (FAQ)
                </button>
                <button onClick={() => setActiveTab('suggestion')} className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'suggestion' ? 'border-letusBlue text-letusBlue' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                  시스템 건의사항 접수
                </button>
                {userProfile?.role === '관리자' && (
                  <button onClick={() => setActiveTab('admin')} className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ml-auto flex items-center gap-1 ${activeTab === 'admin' ? 'border-orange-500 text-orange-600' : 'border-transparent text-orange-400 hover:text-orange-600'}`}>
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
                    관리자 전용
                  </button>
                )}
              </div>
            </div>

            {activeTab === 'faq' && (
              <div className="space-y-3 animate-fade-in">
                {isLoading ? <p className="text-center text-gray-500 py-10">FAQ 불러오는 중...</p> : faqs.length === 0 ? <p className="text-center text-gray-500 py-10">등록된 FAQ가 없습니다.</p> : faqs.map((faq) => (
                  <div key={faq.id} className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <button onClick={() => setOpenFaqId(openFaqId === faq.id ? null : faq.id)} className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-50 focus:outline-none">
                      <div className="flex items-center gap-3 w-full overflow-hidden">
                        <span className="w-[96px] flex-shrink-0 text-[10px] font-black text-letusOrange bg-orange-50 border border-orange-100 py-1 px-1 rounded text-center tracking-tight truncate">
                          {faq.category}
                        </span>
                        <span className={`font-bold text-[14px] truncate flex-1 ${openFaqId === faq.id ? 'text-letusBlue' : 'text-gray-800'}`}>Q. {faq.question}</span>
                      </div>
                      <svg className={`w-5 h-5 flex-shrink-0 text-gray-400 transition-transform ${openFaqId === faq.id ? 'rotate-180 text-letusBlue' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    {openFaqId === faq.id && (
                      <div className="px-5 pb-5 pt-2 border-t border-gray-100 bg-gray-50/50">
                        <div className="flex gap-3 text-gray-600 text-sm leading-relaxed whitespace-pre-wrap mt-2">
                          <span className="font-black text-gray-300 text-lg">A.</span>
                          <div className="flex-1 mt-0.5">{faq.answer}</div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'suggestion' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                  <h3 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <span className="w-1 h-3.5 bg-letusBlue rounded-full"></span>
                    새로운 건의사항 등록
                  </h3>
                  <form onSubmit={handleSubmitSuggestion} className="space-y-5">
                    <div className="grid grid-cols-2 gap-5">
                      <div className="flex flex-col gap-1.5">
                        <label className="text-xs font-bold text-gray-700">작성자</label>
                        <input type="text" value={userProfile?.name || ''} disabled className="border border-gray-200 rounded-lg px-4 py-2.5 text-sm bg-gray-50 text-gray-500 cursor-not-allowed" />
                      </div>
                      <div className="flex flex-col gap-1.5">
                        <label className="text-xs font-bold text-gray-700">건의 유형 <span className="text-letusOrange">*</span></label>
                        <select value={sugType} onChange={e => setSugType(e.target.value)} className="border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:border-letusBlue bg-white text-gray-800 outline-none">
                          <option>기능 개선 (UI/UX)</option>
                          <option>신규 기능 추가 요청</option>
                          <option>오류 및 버그 신고</option>
                          <option>기타</option>
                        </select>
                      </div>
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-700">제목 <span className="text-letusOrange">*</span></label>
                      <input type="text" value={sugTitle} onChange={e => setSugTitle(e.target.value)} required placeholder="건의사항의 제목을 입력해 주세요." className="border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:border-letusBlue bg-white outline-none" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-700">상세 내용 <span className="text-letusOrange">*</span></label>
                      <textarea value={sugContent} onChange={e => setSugContent(e.target.value)} required rows={4} placeholder="개선이 필요한 부분을 상세히 적어주시면 시스템 고도화에 큰 도움이 됩니다." className="border border-gray-300 rounded-lg px-4 py-3 text-sm focus:border-letusBlue bg-white resize-none outline-none"></textarea>
                    </div>
                    <div className="pt-2 flex justify-end">
                      <button type="submit" disabled={isSubmitting} className="px-6 py-2.5 bg-letusBlue text-white text-sm font-bold rounded-lg shadow-md hover:bg-blue-600 transition-colors flex items-center gap-2">
                        {isSubmitting ? '전송 중...' : '건의사항 등록'}
                      </button>
                    </div>
                  </form>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="p-4 border-b border-gray-100 bg-gray-50 font-bold text-sm text-gray-800">
                    나의 건의 내역 확인
                  </div>
                  <div className="p-0 overflow-auto max-h-[300px] custom-scrollbar">
                    <table className="w-full text-left whitespace-nowrap text-sm">
                      <thead className="bg-white border-b border-gray-200 text-xs font-bold text-gray-500 sticky top-0">
                        <tr>
                          <th className="p-3 pl-5">접수일시</th>
                          <th className="p-3">유형</th>
                          <th className="p-3">제목 (클릭시 답변 확인)</th>
                          <th className="p-3 text-center">진행 상태</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {mySuggestions.length === 0 ? (
                          <tr><td colSpan="4" className="p-8 text-center text-gray-400">아직 등록하신 건의사항이 없습니다.</td></tr>
                        ) : mySuggestions.map((sug) => (
                          <tr key={sug.id} className="hover:bg-blue-50/30 cursor-pointer transition-colors" onClick={() => setActiveModalItem(sug)}>
                            <td className="p-3 pl-5 text-gray-500 text-xs">{new Date(sug.created_at).toLocaleDateString()}</td>
                            <td className="p-3 text-xs"><span className="bg-gray-100 px-2 py-1 rounded text-gray-600">{sug.request_type}</span></td>
                            <td className="p-3 text-gray-800 font-medium truncate max-w-[300px] hover:text-letusBlue">{sug.title}</td>
                            <td className="p-3 text-center"><span className={`text-[11px] font-bold border px-2 py-0.5 rounded shadow-sm ${sug.status === '반영완료' ? 'bg-green-50 text-green-600 border-green-200' : sug.status === '검토중' ? 'bg-blue-50 text-blue-600 border-blue-200' : sug.status === '반려' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-gray-50 text-gray-500 border-gray-200'}`}>{sug.status}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'admin' && userProfile?.role === '관리자' && (
              <div className="bg-white rounded-xl shadow-sm border border-orange-200 overflow-hidden animate-fade-in">
                <div className="bg-orange-50 px-5 py-4 border-b border-orange-100 font-bold text-sm text-orange-700 flex justify-between items-center">
                  <span>접수된 전체 건의사항 내역</span>
                  <button
                    onClick={() => setIsFaqModalOpen(true)}
                    className="bg-white border border-orange-300 text-orange-600 px-3 py-1.5 text-xs font-bold rounded shadow-sm hover:bg-orange-100 transition-colors flex items-center gap-1"
                  >
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" /></svg>
                    FAQ 새 글 쓰기
                  </button>
                </div>
                <div className="p-0 overflow-auto max-h-[500px] custom-scrollbar">
                  <table className="w-full text-left whitespace-nowrap text-sm">
                    <thead className="bg-white border-b border-orange-100 text-xs font-bold text-gray-500 sticky top-0">
                      <tr>
                        <th className="p-3 pl-5">접수일시</th>
                        <th className="p-3">작성자</th>
                        <th className="p-3">유형</th>
                        <th className="p-3">제목 (클릭시 답변 작성)</th>
                        <th className="p-3 text-center">진행 상태</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {suggestions.length === 0 ? (
                        <tr><td colSpan="5" className="p-10 text-center text-gray-400">접수된 건의사항이 없습니다.</td></tr>
                      ) : suggestions.map((sug) => (
                        <tr key={sug.id} className="hover:bg-orange-50/50 cursor-pointer transition-colors" onClick={() => setActiveModalItem(sug)}>
                          <td className="p-3 pl-5 text-gray-500 text-xs">{new Date(sug.created_at).toLocaleDateString()}</td>
                          <td className="p-3 font-semibold text-gray-700">{sug.user_name}</td>
                          <td className="p-3 text-xs"><span className="bg-orange-50/50 border border-orange-100 px-2 py-1 rounded text-orange-600">{sug.request_type}</span></td>
                          <td className="p-3 text-gray-800 font-medium truncate max-w-[200px] hover:text-orange-600">{sug.title}</td>
                          <td className="p-3 text-center"><span className={`text-[11px] font-bold border px-2 py-0.5 rounded shadow-sm ${sug.status === '대기중' ? 'bg-gray-100 text-gray-500 border-gray-200' : 'bg-orange-50 text-orange-600 border-orange-200'}`}>{sug.status}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>

          {activeModalItem && (
            <SuggestionModal
              item={activeModalItem}
              onClose={() => setActiveModalItem(null)}
              onReload={fetchData}
              userProfile={userProfile}
            />
          )}

          {isFaqModalOpen && (
            <FaqAddModal
              onClose={() => setIsFaqModalOpen(false)}
              onReload={fetchData} />
          )}

        </div>
      );
    };

    const supabaseUrl = 'https://kbbkodmighrrgwtwrgdp.supabase.co';
    const supabaseAnonKey = 'sb_publishable_2yOkLjobrM_oMlncJFqL3A_gbuU9eAr';
    const SUPABASE_SERVICE_ROLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiYmtvZG1pZ2hycmd3dHdyZ2RwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDA2Nzk1OSwiZXhwIjoyMDg5NjQzOTU5fQ.p32oIw0vCr9DfwZ2ifnAjZDM0tiU23UbMgRtXFQ4aeU";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
    const adminSupabase = window.supabase.createClient(supabaseUrl, SUPABASE_SERVICE_ROLE_KEY);

    const LoginView = () => {
      const [loginId, setLoginId] = useState('');
      const [password, setPassword] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        if (!loginId || !password) {
          setErrorMsg('아이디와 비밀번호를 입력해주세요.');
          return;
        }

        setLoading(true);
        const targetEmail = loginId.includes('@') ? loginId : `${loginId}@letus.com`;

        const { error } = await supabase.auth.signInWithPassword({
          email: targetEmail,
          password: password,
        });

        if (error) {
          setErrorMsg(`[Dev] 로그인 실패: ${error.message}`);
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 slide-up">
          <div className="max-w-[400px] w-full bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8 sm:p-10 relative overflow-hidden">
            <div className="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-orange-400 to-orange-600"></div>

            <div className="text-center mb-10 pt-2">
              <h1 className="text-3xl font-black text-letusOrange tracking-tighter mb-2">LETUS LOGIS</h1>
              <p className="text-sm text-slate-500 font-medium tracking-tight">통합 물류 관리 시스템</p>
            </div>

            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-xs font-bold text-slate-700 mb-1.5 ml-1">아이디 (ID)</label>
                <input
                  type="text"
                  value={loginId}
                  onChange={(e) => setLoginId(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-letusOrange focus:ring-1 focus:ring-letusOrange transition-all text-gray-800 bg-slate-50 focus:bg-white"
                  placeholder="admin"
                />
              </div>

              <div>
                <label className="block text-xs font-bold text-slate-700 mb-1.5 ml-1">비밀번호</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-letusOrange focus:ring-1 focus:ring-letusOrange transition-all text-gray-800 bg-slate-50 focus:bg-white"
                  placeholder="••••••••"
                />
              </div>

              {errorMsg && (
                <div className="text-red-500 text-xs font-bold text-center bg-red-50 py-2.5 rounded-lg border border-red-100 flex items-center justify-center gap-1.5">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  {errorMsg}
                </div>
              )}

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-letusOrange hover:bg-orange-500 active:bg-orange-600 text-white font-bold py-3.5 px-4 rounded-lg transition-colors mt-2 flex items-center justify-center shadow-md disabled:opacity-70 disabled:cursor-not-allowed"
              >
                {loading ? (
                  <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w0.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                ) : null}
                {loading ? '로그인 처리 중...' : '로그인'}
              </button>
            </form>

            <div className="mt-10 pt-6 border-t border-slate-100 text-center text-[11px] text-slate-400 font-medium">
              <p>© 2026 LETUS. All rights reserved.</p>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [currentPage, setCurrentPage] = useState('home');
      const [issues, setIssues] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [userProfile, setUserProfile] = useState(null);
      const [selfEditTarget, setSelfEditTarget] = useState(null);
      const [notifications, setNotifications] = useState([]);
      const [isNotiOpen, setIsNotiOpen] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [accidentDrillDownFilters, setAccidentDrillDownFilters] = useState(null);
      const [favorites, setFavorites] = useState(() => {
        const savedFavs = localStorage.getItem('letus_favorites');
        return savedFavs ? JSON.parse(savedFavs) : [];
      });

      const toggleFavorite = (pageId) => {
        setFavorites(prev => {
          const newFavs = prev.includes(pageId) ? prev.filter(id => id !== pageId) : [...prev, pageId];
          localStorage.setItem('letus_favorites', JSON.stringify(newFavs));
          return newFavs;
        });
      };

      const today = new Date().toISOString().split("T")[0];
      const [savedListFilters, setSavedListFilters] = useState({
        brand: '전체', status: '전체', startDate: today, endDate: today, searchType: '품목코드', searchValue: ''
      });

      useEffect(() => {
        if (session) {
          const savedKey = 'letus_noti_' + session.user.id;
          const saved = localStorage.getItem(savedKey);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              const now = new Date().getTime();
              const validNotis = parsed.filter(n => !(n.read && n.read_at && (now - n.read_at > 24 * 60 * 60 * 1000)));
              setNotifications(validNotis);
            } catch (e) { }
          }
        }
      }, [session]);

      useEffect(() => {
        if (session) {
          localStorage.setItem('letus_noti_' + session.user.id, JSON.stringify(notifications));
        }
      }, [notifications, session]);

      const handleNotiClick = (notiId, filterObj) => {
        setNotifications(prev => prev.map(n => n.id === notiId ? { ...n, read: true, read_at: new Date().getTime() } : n));
        handleDrillDown(filterObj);
        setIsNotiOpen(false);
      };

      const handleMarkAllAsRead = () => {
        const now = new Date().getTime();
        setNotifications(prev => prev.map(n => ({ ...n, read: true, read_at: now })));
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
        setUserProfile(null);
        setSession(null);
      };

      const handleDrillDown = (filterObj) => {
        setSavedListFilters(prev => ({
          ...prev,
          brand: filterObj.brand || '전체',
          status: filterObj.status || '전체',
          startDate: filterObj.startDate || prev.startDate,
          endDate: filterObj.endDate || prev.endDate
        }));
        setCurrentPage('list');
      };

      const handleAccidentDrillDown = (filterObj) => {
        setAccidentDrillDownFilters({
          brands: filterObj.brands || [],
          statuses: filterObj.statuses || [],
          isDelayed: filterObj.isDelayed || '전체'
        });
        setCurrentPage('accident_list');
      };

      const fetchIssues = async () => {
        setIsLoading(true);
        try {
          const { data, error } = await supabase.from('logistics_issues').select('*').order('id', { ascending: false });
          if (error) throw error;
          setIssues(data || []);
        } catch (error) {
          console.error('Supabase fetch exception:', error.message || error);
          setIssues([]);
        } finally {
          setIsLoading(false);
        }
      };

      const fetchProfile = async () => {
        if (!session) return;
        try {
          const { data, error } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
          if (data) {
            setUserProfile(data);
            if (data.role === '사용자' && currentPage === 'user_management') {
              setCurrentPage('dashboard');
            }
          }
        } catch (err) {
          console.error('프로필 갱신 실패:', err);
        }
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setAuthLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setAuthLoading(false);
        });

        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (session) {
          fetchIssues();
          fetchProfile();
        }
      }, [session]);

      useEffect(() => {
        if (!session || !userProfile) return;

        if (Notification.permission === 'default' && !sessionStorage.getItem('notiAsked')) {
          sessionStorage.setItem('notiAsked', 'true');
          Notification.requestPermission();
        }

        const channel = supabase
          .channel('logistics_issue_notifications')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '신규 입고'); })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '상태 변경'); })
          .subscribe();

        const handleIssueChange = (newData, type) => {
          const userBrands = userProfile?.managed_brands ? userProfile.managed_brands.split(',').map(s => s.trim()) : [];
          const userVendors = userProfile?.managed_vendors ? userProfile.managed_vendors.split(',').map(s => s.trim()) : [];

          let shouldAlert = false;
          let message = '';
          const currentStatus = newData.status || '조치대기';

          if (currentStatus === '조치대기' && userProfile?.role?.includes('관리자') && (userBrands.includes('전체') || userBrands.includes(newData.brand))) {
            shouldAlert = true;
            message = `[신규] ${newData.brand} 브랜드의 새로운 이슈가 접수되었습니다. (${newData.reception_no})`;
          }
          else if (currentStatus === '처리 중' && userVendors.includes(newData.vendor)) {
            shouldAlert = true;
            message = `[이관] 관리 중인 ${newData.vendor} 업체로 이슈가 이관되었습니다. (${newData.reception_no})`;
          }
          else if (currentStatus === '조치완료' && userProfile?.role?.includes('관리자') && (userBrands.includes('전체') || userBrands.includes(newData.brand))) {
            shouldAlert = true;
            message = `[조치완료] ${newData.brand} 브랜드의 이슈 조치가 완료되었습니다. (${newData.reception_no})`;
          }

          if (shouldAlert) {
            const nowTime = new Date().getTime();
            if (window.lastAlertMsg === message && nowTime - (window.lastAlertTime || 0) < 2000) return;
            window.lastAlertMsg = message;
            window.lastAlertTime = nowTime;

            const newNoti = {
              id: newData.id + '_' + nowTime,
              title: type,
              message: message,
              date: new Date(nowTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              read: false,
              read_at: null,
              filterObj: { brand: newData.brand || '전체', status: newData.status || '전체' }
            };

            setNotifications(prev => [newNoti, ...prev].slice(0, 10));

            if (Notification.permission === 'granted') {
              new Notification(`LETUS LOGIS - ${type}`, {
                body: message,
                icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
              });
            }
            fetchIssues();
          }
        };

        return () => { supabase.removeChannel(channel); };
      }, [session, userProfile]);

      if (authLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
            <svg className="animate-spin h-8 w-8 text-letusBlue mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span className="text-sm font-bold text-slate-500 tracking-wide">인증 세션을 확인 중입니다...</span>
          </div>
        );
      }

      if (!session) return <LoginView />;

      return (
        <div className="flex h-screen overflow-hidden bg-letusBg text-gray-900 font-sans">
          <Sidebar page={currentPage} setPage={setCurrentPage} userProfile={userProfile} isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen} favorites={favorites} />
          <div className="flex-1 flex flex-col w-full bg-slate-100 overflow-y-auto overflow-x-hidden min-h-screen relative">

            <Header
              page={currentPage} userProfile={userProfile} onLogout={handleLogout} notifications={notifications} isNotiOpen={isNotiOpen}
              toggleNoti={() => setIsNotiOpen(!isNotiOpen)} onNotiClick={handleNotiClick} onEditProfile={() => setSelfEditTarget(userProfile)}
              favorites={favorites} toggleFavorite={toggleFavorite} isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen}
              onMarkAllRead={handleMarkAllAsRead}
            />

            <main className="flex-1 w-full">
              {/* 🔥 신규: 나의 홈 (Personal Dashboard) 추가 */}
              <div className={currentPage === 'home' ? 'block' : 'hidden'}>
                <MyDashboard userProfile={userProfile} setPage={setCurrentPage} favorites={favorites} />
              </div>
              <div className={currentPage === 'dashboard' ? 'block' : 'hidden'}>
                <Dashboard onNavigateToList={() => setCurrentPage('list')} onDrillDown={handleDrillDown} issues={issues} isLoading={isLoading} onReload={fetchIssues} />
              </div>
              <div className={currentPage === 'list' ? 'block' : 'hidden'}>
                <IssueList userProfile={userProfile} issues={issues} isLoading={isLoading} onReload={fetchIssues} savedFilters={savedListFilters} setSavedFilters={setSavedListFilters} />
              </div>
              <div className={currentPage === 'user_management' ? 'block' : 'hidden'}>
                <UserManagement />
              </div>
              <div className={currentPage === 'support' ? 'block' : 'hidden'}>
                <SupportCenter userProfile={userProfile} />
              </div>
              {/* 🔥 사고분석 대시보드 화면 */}
              <div className={currentPage === 'accident_dashboard' ? 'block' : 'hidden'}>
                <AccidentDashboard userProfile={userProfile} onDrillDown={handleAccidentDrillDown} />
              </div>

              {/* 🔥 사고분석 LIST (임시 뼈대 삭제 후 실제 컴포넌트 연결) */}
              <div className={currentPage === 'accident_list' ? 'block' : 'hidden'}>
                <AccidentList userProfile={userProfile} initialFilter={accidentDrillDownFilters} />
              </div>

              {/* 🔥 마스터 데이터 관리 화면 */}
              <div className={currentPage === 'product_manager' ? 'block' : 'hidden'}>
                <ProductManager />
              </div>
            </main>

            {selfEditTarget && (
              <UserEditModal user={selfEditTarget} onClose={() => setSelfEditTarget(null)} onReload={fetchProfile} isProfileMode={true} />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
