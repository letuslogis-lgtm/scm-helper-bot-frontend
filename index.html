<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LETUS LOGIS</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            letusBg: '#f5f7fa',
            letusSidebar: '#273444',
            letusBlue: '#4b89ff',
            letusOrange: '#f58220',
          },
          fontFamily: { sans: ['Pretendard', '-apple-system', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    body {
      background-color: #f5f7fa;
      margin: 0;
      padding: 0;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    .slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;

    // --- Recharts 컴포넌트 ---
    const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = window.Recharts || {};

    const BRANDS = ['(주)한국물류', '글로벌테크', '퍼시스', '일룸', '스마트패키징', '에이스코리아'];

    // --- 범용 컴포넌트 ---
    const TableSkeleton = ({ colCount = 7 }) => (
      <tbody className="bg-white">
        <tr>
          <td colSpan={colCount} className="py-24 text-center">
            <div className="flex flex-col items-center justify-center animate-pulse">
              <svg className="w-8 h-8 text-letusBlue mb-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <p className="text-gray-500 font-bold text-sm tracking-tight">데이터를 불러오는 중입니다...</p>
            </div>
          </td>
        </tr>
      </tbody>
    );

    const CloseIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
    );

    const CATEGORY_COLORS = {
      '파손 및 불량': '#ef4444',
      '제품 파손': '#f87171',
      '박스 훼손': '#fb923c',
      '박스훼손': '#fb923c',
      '바코드 불량': '#eab308',
      '계획 이슈': '#3b82f6',
      '계획 미생성': '#60a5fa',
      '계획 부족(실물 과다)': '#818cf8',
      '계획 과다(실물 부족)': '#c084fc',
      '기타 특이사항': '#9ca3af',
      '기타': '#9ca3af',
      '파손': '#ef4444',
      '수량부족': '#facc15',
      '오입고': '#22c55e',
      '품질불량': '#3b82f6'
    };
    const BRAND_COLORS = ['#22c55e', '#14b8a6', '#3b82f6', '#8b5cf6', '#f97316', '#ef4444'];

    const StatusBadge = ({ status, category }) => {
      let bg = '', text = '', icon = null;
      if (status === '조치대기') { bg = 'bg-red-50 border-red-200'; text = 'text-red-500'; }
      if (status === '처리 중') { bg = 'bg-yellow-50 border-yellow-300'; text = 'text-yellow-600'; }
      if (status === '조치완료') { bg = 'bg-green-50 border-green-200'; text = 'text-green-600'; }
      if (status === '피드백완료') {
        bg = 'bg-blue-50 border-blue-200';
        text = 'text-blue-600';
        icon = <svg className="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>;
      }
      return (
        <span className={`inline-flex outline-none items-center px-2 py-1 rounded-full text-xs font-bold border shadow-sm ${bg} ${text} justify-center`}>
          {icon}
          {status}
        </span>
      );
    };

    const CategoryBadge = ({ category }) => {
      const color = CATEGORY_COLORS[category] || '#9ca3af';
      return (
        <div className="flex items-center">
          <span className="w-2 h-2 rounded-full mr-2" style={{ backgroundColor: color }}></span>
          <span className="text-sm text-gray-700">{category}</span>
        </div>
      );
    }

    const formatDateTime = (isoString) => {
      if (!isoString) return '-';
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return '-';
      const pad = n => n.toString().padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    };

    const ImageSlider = ({ imageUrlString }) => {
      const urls = imageUrlString ? imageUrlString.split(',').map(s => s.trim()).filter(Boolean) : [];
      const [currentIndex, setCurrentIndex] = React.useState(0);

      if (urls.length === 0) {
        return (
          <div className="w-full h-full min-h-[400px] bg-gray-50 rounded-lg border border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-sm font-medium">
            첨부된 사진이 없습니다
          </div>
        );
      }

      return (
        <div className="flex flex-col items-center gap-3 w-full h-full">
          <div className="relative w-full h-[400px] flex items-center justify-center bg-gray-50 rounded-lg border border-gray-200 overflow-hidden group">
            <img
              src={urls[currentIndex]}
              alt={`현장사진 ${currentIndex + 1}`}
              className="w-full h-full object-contain transition-opacity duration-300"
            />

            {urls.length > 1 && (
              <div className="absolute top-4 right-4 bg-black/60 text-white text-xs font-bold px-2 py-1 rounded-md backdrop-blur-sm">
                {currentIndex + 1} / {urls.length}
              </div>
            )}
          </div>

          {urls.length > 1 && (
            <div className="flex bg-gray-100 px-3 py-1.5 rounded-full gap-2 border border-gray-200 shadow-inner">
              {urls.map((_, idx) => (
                <button
                  key={idx}
                  onClick={(e) => { e.preventDefault(); e.stopPropagation(); setCurrentIndex(idx); }}
                  className={`w-1.5 h-1.5 rounded-full outline-none transition-all ${idx === currentIndex ? 'bg-letusBlue scale-125' : 'bg-gray-300 hover:bg-gray-400'}`}
                />
              ))}
            </div>
          )}
        </div>
      );
    };

    const RequestModal = ({ row, onClose, onReload, userProfile }) => {
      const [text, setText] = useState(row.request_content || '');
      const [actionText, setActionText] = useState(row?.action_content || '');
      const [isSaving, setIsSaving] = useState(false);

      const handleAction = async (newStatus) => {
        setIsSaving(true);
        try {
          const nowIso = new Date().toISOString();

          const { error } = await supabase
            .from('logistics_issues')
            .update({
              request_content: text,
              action_content: actionText,
              status: newStatus,
              final_handler: userProfile?.name || '관리자',
              resolved_at: nowIso
            })
            .eq('id', row.id);

          if (error) throw error;

          await onReload();
          onClose();
        } catch (error) {
          console.error('Update error:', error);
          alert('상태 업데이트 중 오류가 발생했습니다.');
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>

          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-4xl slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-gray-900">현장 특이사항 요청 내용 ({row.reception_no})</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>

            <div className="p-5 bg-white grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch overflow-y-auto max-h-[80vh]">

              <div className="flex flex-col h-full">
                <h4 className="text-sm font-bold text-gray-700 mb-2">📸 현장 사진</h4>
                <ImageSlider imageUrlString={row.image_url} />
              </div>

              <div className="flex flex-col h-full space-y-4">

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-gray-700 mb-2">요청 내용</h4>
                  <textarea
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    placeholder="특이사항 조치 관련 요청 상세 내용이나 확인된 메모를 자유롭게 입력해 주세요."
                    disabled={userProfile?.role === '사용자' || row.status !== '조치대기'}
                    className={`flex-1 w-full border border-gray-300 rounded-lg p-3 text-sm text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-letusBlue focus:border-letusBlue outline-none resize-none transition-shadow ${userProfile?.role === '사용자' || row.status !== '조치대기' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : ''}`}
                  ></textarea>
                </div>

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-blue-600 mb-2">🛠️ 조치 내용 (현장 작업자 피드백용)</h4>
                  <textarea
                    value={actionText}
                    onChange={(e) => setActionText(e.target.value)}
                    placeholder="현장 작업자의 텔레그램으로 전송될 상세 조치 결과를 입력해 주세요."
                    disabled={userProfile?.role === '사용자' || row.status !== '조치대기'}
                    className={`flex-1 w-full border border-blue-300 rounded-lg p-3 text-sm text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none transition-shadow ${userProfile?.role === '사용자' || row.status !== '조치대기' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'bg-blue-50'}`}
                  ></textarea>
                </div>

              </div>
            </div>

            <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center gap-2">

              <div>
                {row.status !== '조치대기' && (
                  <span className="text-gray-500 font-bold text-sm">✅ 처리가 이관/완료되어 내용을 수정할 수 없습니다.</span>
                )}
              </div>

              <div className="flex gap-2">
                <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded hover:bg-gray-100 transition-colors shadow-sm bg-white">
                  {row.status !== '조치대기' ? '닫기' : '취소'}
                </button>

                {row.status === '조치대기' && (
                  <>
                    <button
                      onClick={() => handleAction('처리 중')}
                      disabled={isSaving || userProfile?.role === '사용자'}
                      className={`px-6 py-2 text-white text-sm font-bold rounded shadow transition-colors flex items-center gap-2 ${userProfile?.role === '사용자' ? 'bg-gray-300 cursor-not-allowed opacity-60' : 'bg-yellow-500 hover:bg-yellow-600'} ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}
                    >
                      {isSaving ? '진행 중...' : '이관'}
                    </button>
                    <button
                      onClick={() => handleAction('조치완료')}
                      disabled={isSaving || userProfile?.role === '사용자'}
                      className={`px-6 py-2 text-white text-sm font-bold rounded shadow transition-colors flex items-center gap-2 ${userProfile?.role === '사용자' ? 'bg-gray-300 cursor-not-allowed opacity-60' : 'bg-green-500 hover:bg-green-600'
                        } ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}
                    >
                      {isSaving ? '진행 중...' : '조치완료'}
                    </button>
                  </>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    };

    const HandleModal = ({ row, onClose, onReload, userProfile }) => {
      const [text, setText] = useState(row.handleComment || '');
      const [actionText, setActionText] = useState(row.action_content || '');
      const [isSaving, setIsSaving] = useState(false);

      const handleAction = async (newStatus) => {
        setIsSaving(true);
        try {
          const nowIso = new Date().toISOString();

          const { error } = await supabase
            .from('logistics_issues')
            .update({
              request_content: text,
              action_content: actionText,
              status: newStatus,
              final_handler: userProfile?.name || '관리자',
              resolved_at: nowIso
            })
            .eq('id', row.id);

          if (error) throw error;

          await onReload();
          onClose();
        } catch (error) {
          console.error('Update error:', error);
          alert('상태 업데이트 중 오류가 발생했습니다.');
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-4xl slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-gray-900">현장 특이사항 조치 등록 ({row.reception_no})</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>

            <div className="p-5 bg-white grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch overflow-y-auto max-h-[80vh]">

              <div className="flex flex-col h-full">
                <h4 className="text-sm font-bold text-gray-700 mb-2">📸 현장 사진</h4>
                <ImageSlider imageUrlString={row.image_url} />
              </div>

              <div className="flex flex-col h-full space-y-4">

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-gray-700 mb-2">요청 내용</h4>
                  <div className="flex-1 w-full border border-gray-200 bg-gray-100 rounded-lg p-3 text-sm text-gray-600 overflow-y-auto">
                    {row.request_content || '등록된 요청 내용이 없습니다.'}
                  </div>
                </div>

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-green-600 mb-2">🛠️ 조치 내용</h4>
                  <textarea
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    disabled={row.status === '조치완료'}
                    placeholder="추가 조치된 내용이나 완료 피드백을 상세하게 입력해 주세요."
                    className={`flex-1 w-full border rounded-lg p-3 text-sm text-gray-800 outline-none resize-none transition-shadow ${row.status === '조치완료' ? 'bg-gray-100 text-gray-500 border-gray-200 cursor-not-allowed' : 'border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500'}`}
                  ></textarea>
                </div>
              </div>
            </div>

            <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center gap-2">
              <div>
                {row.status === '조치완료' && (
                  <span className="text-green-600 font-bold text-sm">✅ 조치가 완료되어 내용을 수정할 수 없습니다.</span>
                )}
              </div>
              <div className="flex gap-2">
                <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded hover:bg-gray-100 transition-colors shadow-sm bg-white">
                  {row.status === '조치완료' ? '닫기' : '취소'}
                </button>
                {row.status !== '조치완료' && (
                  <button
                    onClick={() => handleAction('조치완료')}
                    disabled={isSaving}
                    className={`px-6 py-2 bg-green-500 text-white text-sm font-bold rounded shadow hover:bg-green-600 transition-colors flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}
                  >
                    {isSaving ? '진행 중...' : '조치완료'}
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const VendorSearchModal = ({ initialVendors, onApplyVendors, initialBrands, onApplyBrands, onClose }) => {
      const [query, setQuery] = React.useState('');
      const [vendorList, setVendorList] = React.useState([]);
      const [isLoading, setIsLoading] = React.useState(true);

      const [checkedVendors, setCheckedVendors] = React.useState(() => {
        if (!initialVendors) return [];
        return initialVendors.split(',').map(s => s.trim()).filter(Boolean);
      });

      const [checkedBrands, setCheckedBrands] = React.useState(() => {
        if (!initialBrands) return [];
        return initialBrands.split(',').map(s => s.trim()).filter(Boolean);
      });

      const brandList = ['퍼시스', '일룸', '시디즈', '슬로우베드', '알로소', '데스커', '바로스'];

      React.useEffect(() => {
        const fetchVendors = async () => {
          setIsLoading(true);
          try {
            const { data, error } = await supabase
              .from('vendors')
              .select('id, vendor_name')
              .order('vendor_name', { ascending: true });
            if (error) throw error;
            setVendorList(data || []);
          } catch (err) {
            console.error('vendors fetch error:', err.message);
          } finally {
            setIsLoading(false);
          }
        };
        fetchVendors();
      }, []);

      const filteredVendors = vendorList.filter(v => v.vendor_name.includes(query));
      const filteredBrands = brandList.filter(b => b.includes(query));

      const toggleVendor = (name) => {
        setCheckedVendors(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
      };

      const toggleBrand = (name) => {
        setCheckedBrands(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
      };

      const handleApply = () => {
        onApplyVendors(checkedVendors.join(','));
        onApplyBrands(checkedBrands.join(','));
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col slide-up h-[600px]" style={{ maxHeight: '80vh' }}>
            <div className="flex justify-between items-center px-5 py-4 border-b border-gray-100">
              <h4 className="text-sm font-bold text-gray-800 flex items-center">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>
                담당 업체 및 브랜드 검색
              </h4>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>

            <div className="px-4 py-3 border-b border-gray-100 bg-slate-50">
              <div className="relative">
                <svg className="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input
                  type="text"
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  placeholder="브랜드명 또는 업체명 검색..."
                  className="w-full pl-9 pr-3 py-2 text-xs border border-gray-200 rounded-[4px] focus:outline-none focus:border-letusBlue bg-white"
                  autoFocus
                />
              </div>
              {(checkedVendors.length > 0 || checkedBrands.length > 0) && (
                <p className="text-[10px] text-letusBlue font-bold mt-2">
                  브랜드 {checkedBrands.length}개, 업체 {checkedVendors.length}개 선택됨
                </p>
              )}
            </div>

      const [name, setName] = useState(user.name || '');

          return;
        }

        setIsSaving(true);
        try {

            name,
            login_id: loginId,
            role: group,
            status,
            brands: brand,
            team,
            managed_vendors: managedVendors,
            managed_brands: managedBrands,

          if (password) {
            const { error: pwError } = await adminSupabase.auth.admin.updateUserById(user.id, { password });

          }

          onClose();

                          <div className="flex flex-wrap gap-1.5 items-center">
                            <span className="text-[9px] font-black text-blue-400 bg-blue-50 px-1 rounded">VENDOR</span>
                            {managedVendors ? managedVendors.split(',').filter(Boolean).map((v, i) => (
                              <span key={i} className="bg-blue-50 text-blue-600 border border-blue-200 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">{v.trim()}</span>
                            )) : <span className="text-gray-300 text-[10px]">미설정</span>}
                          </div>
                        </div>
                        <button type="button" onClick={() => setVendorModalOpen(true)} className="flex items-center gap-1.5 text-[11px] font-bold text-letusBlue border border-letusBlue/40 bg-blue-50 hover:bg-blue-100 rounded-[4px] px-3 py-1.5 transition-colors w-fit">
                          <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> 업체 검색 및 추가
                        </button>
                      </div>

                      <div className="grid grid-cols-2 gap-4 pb-1">
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[11px] font-bold text-gray-700">권한 그룹</label>
                          <select value={group} onChange={(e) => setGroup(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                            <option value="관리자">관리자</option>
                            <option value="사용자">사용자</option>
                          </select>
                        </div>
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[11px] font-bold text-gray-700">계정 상태</label>
                          <select value={status} onChange={(e) => setStatus(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                            <option value="정상">정상 승인</option>
                            <option value="정지">이용 정지</option>
                          </select>
                        </div>
                      </div>
                    </>
                  )}

                </form>
              </div>

              <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-2 shrink-0">
                <button type="button" onClick={onClose} className="px-5 py-[9px] border border-gray-300 text-gray-600 text-[11px] font-bold rounded-[3px] hover:bg-gray-50 transition-colors">취소</button>
                <button onClick={handleSave} disabled={isSaving} className={`px-5 py-[9px] bg-letusBlue text-white text-[11px] font-bold rounded-[3px] hover:bg-blue-600 transition-colors flex items-center gap-1.5 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                  {isSaving ? <svg className="animate-spin h-3.5 w-3.5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> : null}
                  {isSaving ? '수정 중...' : '수정하기'}
                </button>
              </div>
            </div>
          </div>
          {vendorModalOpen && (
            <VendorSearchModal initialVendors={managedVendors} onApplyVendors={setManagedVendors} initialBrands={managedBrands} onApplyBrands={setManagedBrands} onClose={() => setVendorModalOpen(false)} />
          )}
        </>
      );
    };

    const VendorListModal = ({ user, onClose }) => {
      const bRaw = user?.managed_brands || '';
      const vRaw = user?.managed_vendors || '';
      const brandList = typeof bRaw === 'string' ? bRaw.split(',').map(v => v.trim()).filter(Boolean) : [];
      const vendorList = typeof vRaw === 'string' ? vRaw.split(',').map(v => v.trim()).filter(Boolean) : [];

      const totalCount = brandList.length + vendorList.length;

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[200] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-xs overflow-hidden flex flex-col slide-up h-[500px]" style={{ maxHeight: '70vh' }}>
            <div className="flex justify-between items-center px-5 py-4 border-b border-gray-100 shrink-0">
              <h4 className="text-sm font-bold text-gray-800 flex items-center">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>
                담당 브랜드 및 업체
                <span className="ml-2 text-xs text-letusBlue font-bold bg-blue-50 border border-blue-200 rounded-full px-2 py-0.5">{totalCount}개</span>
              </h4>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>

            <div className="overflow-y-auto flex-1 divide-y divide-gray-50">
              {brandList.length > 0 && (
                <div>
                  <div className="px-5 py-2 bg-orange-50/50 text-[10px] font-bold text-orange-400">관리 브랜드</div>
                  {brandList.map((b, i) => (
                    <div key={i} className="flex items-center gap-3 px-5 py-2.5">
                      <span className="w-4 h-4 rounded-full bg-orange-100 text-letusOrange text-[9px] font-black flex items-center justify-center shrink-0">{i + 1}</span>
                      <span className="text-xs font-bold text-gray-700">{b}</span>
                    </div>
                  ))}
                </div>
              )}
              {vendorList.length > 0 && (
                <div>
                  <div className="px-5 py-2 bg-blue-50/50 text-[10px] font-bold text-letusBlue">담당 업체</div>
                  {vendorList.map((v, i) => (
                    <div key={i} className="flex items-center gap-3 px-5 py-2.5">
                      <span className="w-4 h-4 rounded-full bg-blue-100 text-letusBlue text-[9px] font-black flex items-center justify-center shrink-0">{i + 1}</span>
                      <span className="text-xs font-bold text-gray-700">{v}</span>
                    </div>
                  ))}
                </div>
              )}
              {totalCount === 0 && (
                <div className="py-16 text-center text-xs text-gray-400 font-bold">등록된 정보가 없습니다.</div>
              )}
            </div>

            <div className="px-4 py-3 border-t border-gray-100 bg-gray-50 flex justify-end shrink-0">
              <button onClick={onClose} className="px-5 py-2 bg-slate-700 text-white text-[11px] font-bold rounded-[3px] hover:bg-slate-800 transition-colors">닫기</button>
            </div>
          </div>
        </div>
      );
    };

    const UserManagement = () => {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [users, setUsers] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [selectedUsers, setSelectedUsers] = useState([]);
      const [editTarget, setEditTarget] = useState(null);
      const [vendorListTarget, setVendorListTarget] = useState(null);
      const [filterRole, setFilterRole] = useState('');
      const [filterStatus, setFilterStatus] = useState('');
      const [filterKeyword, setFilterKeyword] = useState('');
      const [filterVendor, setFilterVendor] = useState('');

      const isAllSelected = users.length > 0 && selectedUsers.length === users.length;

      const toggleAll = () => {
        if (isAllSelected) {
          setSelectedUsers([]);
        } else {
          setSelectedUsers(users.map(u => u.id));
        }
      };

      const toggleOne = (id) => {
        setSelectedUsers(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      };

      const handleDeleteSelected = async () => {
        if (selectedUsers.length === 0) return;
        if (!window.confirm(`선택한 ${selectedUsers.length}명의 계정을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
        try {
          const { error } = await adminSupabase.from('profiles').delete().in('id', selectedUsers);
          if (error) throw error;
          setSelectedUsers([]);
          await fetchUsers();
        } catch (e) {
          alert('삭제 중 오류: ' + e.message);
        }
      };

      const fetchUsers = async (params = {}) => {
        setIsLoading(true);
        try {
          let query = supabase.from('profiles').select('*');
          const role = params.role !== undefined ? params.role : filterRole;
          const status = params.status !== undefined ? params.status : filterStatus;
          const keyword = params.keyword !== undefined ? params.keyword : filterKeyword;
          const vendor = params.vendor !== undefined ? params.vendor : filterVendor;
          if (role) query = query.eq('role', role);
          if (status) query = query.eq('status', status);
          if (keyword) query = query.ilike('name', `%${keyword}%`);
          if (vendor) query = query.ilike('managed_vendors', `%${vendor}%`);
          const { data, error } = await query.order('created_at', { ascending: false });
          if (error) throw error;
          setUsers(data || []);
        } catch (error) {
          console.error("fetchUsers error:", error.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleSearch = () => fetchUsers();

      useEffect(() => {
        window.addEventListener('trigger-refresh', handleSearch);
        return () => window.removeEventListener('trigger-refresh', handleSearch);
      }, [filterRole, filterStatus, filterKeyword, filterVendor]);

      useEffect(() => {
        fetchUsers();
      }, []);

      return (
        <div className="p-6 flex flex-col gap-4 max-w-[1600px] mx-auto animate-fade-in pb-20 w-full min-h-[calc(100vh-64px)]">
          <div className="w-full bg-white rounded-lg shadow-sm border border-slate-200 px-6 py-3 flex items-center z-30 shrink-0">
            <div className="flex items-center gap-5 w-full flex-wrap">

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">권한 그룹</label>
                <select value={filterRole} onChange={e => setFilterRole(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-24 cursor-pointer text-gray-700">
                  <option value="">전체</option>
                  <option value="관리자">관리자</option>
                  <option value="사용자">사용자</option>
                </select>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">계정 상태</label>
                <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-24 cursor-pointer text-gray-700">
                  <option value="">전체</option>
                  <option value="정상">정상 승인</option>
                  <option value="정지">이용 정지</option>
                </select>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">이름</label>
                <input
                  type="text"
                  value={filterKeyword}
                  onChange={e => setFilterKeyword(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleSearch()}
                  placeholder="이름 검색..."
                  className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-32 text-gray-700"
                />
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">담당 업체</label>
                <input
                  type="text"
                  value={filterVendor}
                  onChange={e => setFilterVendor(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleSearch()}
                  placeholder="업체명 검색..."
                  className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-32 text-gray-700"
                />
              </div>

              <div className="ml-auto shrink-0 flex items-center gap-2">
                <button
                  onClick={() => { setFilterRole(''); setFilterStatus(''); setFilterKeyword(''); setFilterVendor(''); fetchUsers({ role: '', status: '', keyword: '', vendor: '' }); }}
                  className="border border-gray-300 text-gray-500 hover:bg-gray-50 font-bold px-4 h-[30px] rounded-[3px] transition-colors text-xs"
                >
                  초기화
                </button>
                <button onClick={handleSearch} className="border border-letusOrange text-letusOrange hover:bg-orange-50 font-bold px-6 h-[30px] rounded-[3px] transition-colors text-xs flex items-center justify-center">
                  조회하기
                </button>
              </div>
            </div>
          </div>

          <div className="flex justify-end w-full px-2 z-30 -mt-1 mb-1">
            <div className="flex items-center gap-3">
              <div className="flex items-center gap-1.5 border-r border-slate-300 pr-3">
                <button className="p-1.5 text-green-700 hover:bg-white rounded transition-colors shadow-sm bg-slate-50 border border-slate-200 hover:border-green-300" title="엑셀 다운로드">
                  <svg className="w-[18px] h-[18px]" fill="currentColor" viewBox="0 0 24 24"><path d="M21.17 3.25q.33 0 .59.25q.24.26.24.59v15.82q0 .33-.24.59q-.26.25-.59.25H2.83q-.33 0-.59-.25q-.24-.26-.24-.59V4.09q0-.33.24-.59q.26-.25.59-.25h18.34zm-8.25 10.9l3.52 4.67h2.7l-4.9-6.07 4.65-5.94h-2.65l-3.23 4.48-3.32-4.48H7.07l4.76 5.94-5 6.07h2.72l3.37-4.67z" /></svg>
                </button>
                <button
                  onClick={handleDeleteSelected}
                  title="선택 삭제"
                  className={`p-1.5 rounded transition-colors shadow-sm border flex items-center
                    ${selectedUsers.length > 0
                      ? 'bg-red-50 border-red-300 text-red-600 hover:bg-red-100'
                      : 'bg-slate-50 border-slate-200 text-slate-400 cursor-not-allowed'}`}
                >
                  <svg className="w-[16px] h-[16px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                  {selectedUsers.length > 0 && (
                    <span className="bg-red-500 text-white rounded-full px-1.5 py-0.5 text-[10px] ml-1">{selectedUsers.length}</span>
                  )}
                </button>
              </div>
              <button
                onClick={() => setIsModalOpen(true)}
                className="flex items-center text-xs font-bold text-slate-700 bg-white border border-slate-300 rounded shadow-sm px-3 py-[7px] hover:bg-slate-50 transition-all cursor-pointer"
              >
                <svg className="w-3.5 h-3.5 mr-1.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" /></svg>
                <span>사용자 추가</span>
              </button>
            </div>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden z-20">
            <div className="p-0 overflow-auto flex-1 h-[600px] custom-scrollbar">
              <table className="w-full text-left whitespace-nowrap">
                <thead className="bg-slate-50/70 border-b border-gray-200 text-xs text-slate-500 font-bold sticky top-0 z-10">
                  <tr>
                    <th className="p-4 pl-6 w-10 text-center">
                      <input
                        type="checkbox"
                        checked={isAllSelected}
                        onChange={toggleAll}
                        className="w-4 h-4 accent-letusBlue cursor-pointer"
                        title="전체 선택"
                      />
                    </th>
                    <th className="p-4 w-10 text-center">No</th>
                    <th className="p-4">사용자명</th>
                    <th className="p-4">사용자 ID</th>
                    <th className="p-4">소속 팀</th>
                    <th className="p-4">소속 브랜드</th>
                    <th className="p-4">담당 업체/창고</th>
                    <th className="p-4">권한 그룹</th>
                    <th className="p-4 text-center">가입일시</th>
                    <th className="p-4 text-center">상태</th>
                  </tr>
                </thead>
                {isLoading ? (
                  <TableSkeleton rowCount={8} colCount={9} />
                ) : users.length === 0 ? (
                  <tbody>
                    <tr>
                      <td colSpan="10" className="p-10 text-center text-gray-400">
                        <svg className="w-16 h-16 mx-auto mb-4 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                        <p className="font-semibold text-gray-500 mb-1">등록된 사용자가 없습니다.</p>
                        <p className="text-sm">상단의 [사용자 추가] 버튼을 눌러 첫 계정을 생성하세요.</p>
                      </td>
                    </tr>
                  </tbody>
                ) : (
                  <tbody className="divide-y divide-gray-100 text-[13px] text-gray-700">
                    {users.map((user, idx) => (
                      <tr key={user.id}
                        className={`transition-colors cursor-pointer ${selectedUsers.includes(user.id) ? 'bg-blue-50' : 'hover:bg-blue-50/30'}`}
                        onDoubleClick={() => setEditTarget(user)}
                        title="더블클릭하면 정보를 수정할 수 있습니다"
                      >
                        <td className="p-4 pl-6 text-center">
                          <input
                            type="checkbox"
                            checked={selectedUsers.includes(user.id)}
                            onChange={() => toggleOne(user.id)}
                            className="w-4 h-4 accent-letusBlue cursor-pointer"
                          />
                        </td>
                        <td className="p-4 text-center text-gray-400 font-medium">{idx + 1}</td>
                        <td className="p-4 font-black text-gray-800 text-sm tracking-tight">{user.name}</td>
                        <td className="p-4 font-bold text-gray-600">{user.login_id}</td>
                        <td className="p-4 text-gray-600 font-medium">{user.team || '-'}</td>
                        <td className="p-4">
                          <div className="flex gap-1.5 flex-wrap max-w-[200px]">
                            {user.brands
                              ? <span className="bg-slate-50 text-slate-600 border border-slate-200 px-2 py-1 rounded-[4px] text-[11px] whitespace-nowrap font-bold shadow-sm">{user.brands}</span>
                              : <span className="text-gray-400">-</span>
                            }
                          </div>
                        </td>
                        <td className="p-4">
                          {(user.managed_vendors || user.managed_brands) ? (
                            <button
                              onClick={e => { e.stopPropagation(); setVendorListTarget(user); }}
                              className="inline-flex items-center gap-1 bg-blue-50 text-letusBlue border border-blue-200 rounded-[4px] px-2 py-1 text-[10px] font-bold hover:bg-blue-100 transition-colors whitespace-nowrap"
                            >
                              <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
                              상세보기 ({(typeof user.managed_vendors === 'string' ? user.managed_vendors.split(',').filter(Boolean).length : 0) + (typeof user.managed_brands === 'string' ? user.managed_brands.split(',').filter(Boolean).length : 0)})
                            </button>
                          ) : (
                            <span className="text-gray-400 text-xs">-</span>
                          )}
                        </td>
                        <td className="p-4">
                          <span className={`px-2.5 py-1 rounded-[4px] font-bold text-[11px] ${user.role === '관리자' ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-slate-100 text-slate-600'}`}>
                            {user.role}
                          </span>
                        </td>
                        <td className="p-4 text-center text-gray-400 font-bold">{formatDateTime(user.created_at)}</td>
                        <td className="p-4 text-center">
                          <span className={`px-3 py-1 rounded-full font-bold text-[11px] shadow-sm ${user.status === '정상' || user.status === '정상 승인' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-50 text-red-600 border border-red-200'}`}>
                            {user.status}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                )}
              </table>
            </div>
          </div>
          {isModalOpen && <UserAddModal onClose={() => setIsModalOpen(false)} onReload={fetchUsers} />}
          {editTarget && <UserEditModal user={editTarget} onClose={() => setEditTarget(null)} onReload={fetchUsers} />}
          {vendorListTarget && <VendorListModal user={vendorListTarget} onClose={() => setVendorListTarget(null)} />}
        </div>
      );
    };

    // --- 사이드바 (Sidebar) 메인 업데이트 ---
    const Sidebar = ({ page, setPage, userProfile, isSidebarOpen, setIsSidebarOpen, favorites }) => {
      const [openMenu, setOpenMenu] = useState('logistics'); // 아코디언 상태
      const [activeTab, setActiveTab] = useState('all'); // 'all' | 'favorites'
      const [searchTerm, setSearchTerm] = useState(''); // 검색어 상태

      // 1. 전체 메뉴 데이터화 (검색 및 필터링을 위해)
      const menuData = [
        {
          id: 'master', label: '마스터 정보관리',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
          roles: ['관리자'],
          children: [{ id: 'user_management', label: '사용자 관리' }]
        },
        {
          id: 'logistics', label: '입고 특이사항',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>,
          roles: ['사용자', '관리자'],
          children: [
            { id: 'dashboard', label: '대시보드' },
            { id: 'list', label: '특이사항 LIST' }
          ]
        },
        {
          id: 'support_menu', label: '고객 지원',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
          roles: ['사용자', '관리자'],
          children: [{ id: 'support', label: '지원센터' }]
        }
      ];

      // 검색어 필터링 적용 (실시간 검색)
      useEffect(() => {
        if (searchTerm) {
          // 검색어가 있으면 메뉴를 전부 펼쳐서 보여줌
          setOpenMenu('all_open');
        } else {
          setOpenMenu('logistics'); // 검색어 지우면 기본 상태로
        }
      }, [searchTerm]);

      const toggleMenu = (menuId) => {
        if (!isSidebarOpen) setIsSidebarOpen(true); // 닫혀있을 때 메뉴 누르면 사이드바 열림
        setOpenMenu(openMenu === menuId ? null : menuId);
      };

      return (
        <div className={`${isSidebarOpen ? 'w-64' : 'w-[72px]'} bg-letusSidebar text-white flex flex-col h-full flex-shrink-0 transition-all duration-300 relative select-none z-50`}>

          {/* 🔥 3번 적용: 상단 로고 (접혀있을 때 L은 흰색, 두번째 L은 주황색) & 기존 버튼 삭제 */}
          <div className={`border-b border-gray-700/50 flex items-center min-h-[64px] ${isSidebarOpen ? 'p-5 justify-between' : 'justify-center py-5'}`}>
            {isSidebarOpen ? (
              <h1 className="text-2xl cursor-pointer truncate w-full text-left" onClick={() => setPage('dashboard')}>
                <span className="font-extrabold tracking-tight">LETUS</span><span className="font-extrabold text-letusOrange tracking-tight ml-1">LOGIS</span>
              </h1>
            ) : (
              <h1 className="text-[26px] leading-none cursor-pointer font-black tracking-tighter" onClick={() => setPage('dashboard')}>
                <span className="text-white">L</span><span className="text-letusOrange">L</span>
              </h1>
            )}
          </div>

          {/* 검색 및 탭 영역 (사이드바 열려있을 때만) */}
          {isSidebarOpen && (
            <div className="px-4 py-4 space-y-3 border-b border-gray-700/50 animate-fade-in">
              <div className="relative">
                <input
                  type="text" placeholder="메뉴 검색..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full bg-gray-800 text-sm text-white placeholder-gray-500 rounded px-3 py-2 pl-9 focus:outline-none focus:ring-1 focus:ring-letusBlue transition-all"
                />
                <svg className="w-4 h-4 text-gray-500 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
              </div>
              <div className="flex bg-gray-800 p-1 rounded">
                <button onClick={() => setActiveTab('all')} className={`flex-1 text-[11px] font-bold py-1.5 rounded transition-colors ${activeTab === 'all' ? 'bg-gray-600 text-white shadow-sm' : 'text-gray-400 hover:text-white'}`}>전체메뉴</button>
                <button onClick={() => setActiveTab('favorites')} className={`flex-1 text-[11px] font-bold py-1.5 rounded transition-colors ${activeTab === 'favorites' ? 'bg-yellow-500 text-white shadow-sm' : 'text-gray-400 hover:text-white'}`}>⭐ 즐겨찾기</button>
              </div>
            </div>
          )}

          <nav className="flex-1 px-2 py-3 space-y-1 overflow-y-auto custom-scrollbar">

            {/* 즐겨찾기 탭 */}
            {activeTab === 'favorites' && isSidebarOpen && (
              <div className="animate-fade-in">
                {favorites.length === 0 ? (
                  <p className="text-xs text-gray-500 text-center py-6">별(⭐)을 눌러<br />자주 쓰는 메뉴를 등록하세요.</p>
                ) : (
                  favorites.map(favId => {
                    const foundMenu = menuData.flatMap(m => m.children).find(c => c.id === favId);
                    if (!foundMenu) return null;
                    return (
                      <div key={favId} className={`px-4 py-2.5 my-1 cursor-pointer text-sm font-bold transition-colors rounded flex items-center ${page === favId ? 'bg-letusBlue text-white shadow-sm' : 'text-gray-300 hover:text-white hover:bg-gray-800'}`} onClick={() => setPage(favId)}>
                        <span className="text-[13px] mr-2">⭐</span> {foundMenu.label}
                      </div>
                    );
                  })
                )}
              </div>
            )}

            {/* 전체메뉴 탭 (또는 접혀있을 때) */}
            {(activeTab === 'all' || !isSidebarOpen) && menuData.map((menu) => {
              if (userProfile?.role !== '관리자' && !menu.roles.includes('사용자')) return null;
              const filteredChildren = menu.children.filter(child => child.label.toLowerCase().includes(searchTerm.toLowerCase()));
              if (searchTerm && filteredChildren.length === 0 && !menu.label.toLowerCase().includes(searchTerm.toLowerCase())) return null;
              const isMenuOpen = openMenu === menu.id || openMenu === 'all_open';

              return (
                <div key={menu.id} className="mb-1">
                  {/* 🔥 3번 적용: 접혔을 때 완벽한 중앙 정렬 (justify-center) */}
                  <div
                    onClick={() => toggleMenu(menu.id)}
                    className={`bg-transparent py-2.5 cursor-pointer flex items-center text-gray-300 hover:text-white transition-colors rounded ${isSidebarOpen ? 'px-3 justify-between' : 'justify-center hover:bg-gray-800'}`}
                    title={!isSidebarOpen ? menu.label : ''}
                  >
                    <div className="flex items-center justify-center">
                      <span className={`${isSidebarOpen ? 'mr-3' : ''} opacity-90 flex justify-center w-5`}>{menu.icon}</span>
                      {isSidebarOpen && <span className="text-sm font-semibold">{menu.label}</span>}
                    </div>
                    {isSidebarOpen && <svg className={`w-3 h-3 transition-transform ${isMenuOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>}
                  </div>

                  {/* 하위 자식 메뉴들 */}
                  {isSidebarOpen && isMenuOpen && (
                    <div className="mt-1 space-y-1 slide-up">
                      {(searchTerm ? filteredChildren : menu.children).map(child => (
                        <div
                          key={child.id}
                          className={`pl-[42px] pr-4 py-2 cursor-pointer text-[13px] font-medium transition-colors rounded-sm ${page === child.id ? 'bg-letusBlue text-white shadow-sm' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}
                          onClick={() => setPage(child.id)}
                        >
                          {searchTerm ? (
                            <span dangerouslySetInnerHTML={{ __html: child.label.replace(new RegExp(searchTerm, 'gi'), match => `<span class="text-letusOrange font-bold">${match}</span>`) }} />
                          ) : (
                            child.label
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </nav>

          {isSidebarOpen && (
            <div className="p-4 text-xs text-gray-600 font-medium border-t border-gray-800 mt-auto truncate text-center">
              <p>© 2026 LETUS LOGIS.</p>
            </div>
          )}
        </div>
      );
    };

    // --- 헤더 (Header) ---
    const Header = ({ page, userProfile, onLogout, notifications = [], isNotiOpen, toggleNoti, onNotiClick, onEditProfile, favorites, toggleFavorite, isSidebarOpen, setIsSidebarOpen }) => {
      const [notiStatus, setNotiStatus] = useState(Notification.permission);

      const handleRequestNotification = () => {
        if (notiStatus === 'denied') {
          alert('🔕 알림이 차단되어 있습니다!\n\n브라우저 상단 주소창 왼쪽의 [자물쇠(🔒) 아이콘]을 클릭한 후, [알림] 권한을 "허용"으로 변경하고 새로고침해 주세요.');
          return;
        }
        if (notiStatus === 'default') {
          Notification.requestPermission().then(permission => {
            setNotiStatus(permission);
            if (permission === 'granted') alert('🔔 이제부터 특이사항 발생 시 바탕화면 팝업 알림이 전송됩니다!');
          });
        }
      };

      const pageTitle = page === 'dashboard' ? '대시보드' : page === 'user_management' ? '사용자 관리' : page === 'support' ? '지원센터' : '특이사항 LIST';
      const isFavorite = favorites?.includes(page); 

      // 안 읽은 알림 개수 계산
      const unreadCount = notifications.filter(n => !n.read).length;

      return (
        <header className="h-16 min-h-[64px] flex-shrink-0 bg-gradient-to-r from-blue-50/70 to-white border-b border-gray-200 flex justify-between items-center px-4 sm:px-6 sticky top-0 z-50">
          <div className="flex items-center text-gray-800 gap-3">
            {/* 햄버거 토글 버튼 */}
            <button 
              onClick={() => setIsSidebarOpen(!isSidebarOpen)} 
              className="p-1.5 mr-1 text-gray-400 hover:text-letusBlue hover:bg-blue-50 rounded transition-colors focus:outline-none"
              title="사이드바 열기/접기"
            >
              <svg className="w-[22px] h-[22px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>

            {/* 즐겨찾기 별 + 메뉴명 */}
            <h2 className="text-[19px] font-extrabold tracking-tight flex items-center gap-1.5">
              <button 
                onClick={() => toggleFavorite(page)}
                className="focus:outline-none transition-transform hover:scale-110 active:scale-90 flex items-center"
                title="즐겨찾기 추가/해제"
              >
                {isFavorite ? (
                  <svg className="w-6 h-6 text-yellow-400 drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                ) : (
                  <svg className="w-6 h-6 text-gray-300 hover:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                )}
              </button>
              {pageTitle}
            </h2>
          </div>
          
          <div className="flex items-center gap-4 sm:gap-5">
            
            {/* 새로고침 버튼 */}
            <button onClick={() => window.location.reload()} className="text-gray-400 hover:text-letusBlue transition-colors focus:outline-none" title="새로고침">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>

            {/* 알림종 버튼 + 드롭다운 */}
            <div className="relative flex items-center">
              <button onClick={toggleNoti} className="text-gray-400 hover:text-letusOrange transition-colors focus:outline-none relative" title="알림 확인">
                <svg className="w-[22px] h-[22px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                {unreadCount > 0 && (
                  <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full min-w-[17px] text-center border-2 border-white shadow-sm">
                    {unreadCount}
                  </span>
                )}
              </button>

              {/* 알림 드롭다운 창 */}
              {isNotiOpen && (
                <div className="absolute right-0 top-full mt-4 w-72 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-[100] slide-up">
                  
                  {/* 🔥 상단 헤더에 PC 알림 버튼 통합 */}
                  <div className="bg-gray-50 px-4 py-2.5 border-b border-gray-100 flex justify-between items-center">
                    <h4 className="text-xs font-bold text-gray-700">최근 알림</h4>
                    <button onClick={handleRequestNotification} className={`flex items-center gap-1 text-[9px] font-bold px-2 py-1 rounded border transition-colors shadow-sm ${notiStatus === 'granted' ? 'bg-green-50 text-green-700 border-green-200' : notiStatus === 'denied' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-orange-50 text-orange-600 border-orange-200 animate-pulse'}`}>
                        {notiStatus === 'granted' ? 'PC 알림 ON' : notiStatus === 'denied' ? '알림 차단됨' : '알림 켜기'}
                    </button>
                  </div>
                  
                  <div className="max-h-64 overflow-y-auto custom-scrollbar">
                    {notifications && notifications.length > 0 ? (
                      notifications.map(noti => (
                        <div key={noti.id} onClick={() => onNotiClick(noti.id, noti.filterObj)} className={`px-4 py-3 border-b border-gray-50 cursor-pointer hover:bg-gray-50 transition-colors ${noti.read ? 'opacity-50' : 'bg-blue-50/20'}`}>
                          <p className="text-xs font-bold text-letusBlue mb-1 flex items-center gap-1">
                            {!noti.read && <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>}
                            {noti.title}
                          </p>
                          <p className="text-[11px] text-gray-600 line-clamp-2 leading-relaxed">{noti.message}</p>
                          <p className="text-[9px] text-gray-400 mt-1.5 font-mono">{noti.date}</p>
                        </div>
                      ))
                    ) : (
                      <div className="py-8 text-center text-xs text-gray-400 flex flex-col items-center gap-2">
                        <svg className="w-6 h-6 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
                        새로운 알림이 없습니다.
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* 독립적인 세로 구분선 */}
            <div className="h-7 w-px bg-gray-200 mx-1 hidden sm:block"></div>

            {/* 사용자 정보 */}
            <div className="text-right flex flex-col justify-center hidden sm:flex">
              <p className="text-[15px] font-bold text-gray-800 cursor-pointer hover:text-letusBlue transition-colors leading-tight" onClick={onEditProfile}>{userProfile?.name || '대기중'}</p>
              <p className="text-[11px] text-gray-500 mt-0.5">{userProfile?.brands || 'LETUS'} • {userProfile?.role || '사용자'}</p>
            </div>
            
            {/* 로그아웃 버튼 */}
            <button onClick={onLogout} className="p-2 ml-1 text-gray-400 hover:text-red-500 transition-colors bg-gray-50 hover:bg-red-50 rounded-lg" title="로그아웃">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
            </button>

          </div>
        </header>
      );
    };

    // --- 대시보드 (Dashboard) ---
    const Dashboard = ({ onNavigateToList, onDrillDown, issues = [], isLoading = false, onReload }) => {
      const [selectedBrands, setSelectedBrands] = useState([]);
      
      // 🔥 1. 날짜 필터 상태 (기본값: 'W' 주간)
      const [filterType, setFilterType] = useState('W'); // 'D', 'W', 'M', 'CUSTOM'
      
      // 🔥 2. 오늘 날짜 구하기 (YYYY-MM-DD 폼)
      const getTodayStr = () => {
        const d = new Date();
        const pad = n => n.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };
      
      const [customDate, setCustomDate] = useState({ start: getTodayStr(), end: getTodayStr() });

      // 🔥 3. 버튼에 따른 날짜 계산 로직
      const getFilterDates = () => {
        const now = new Date();
        const pad = n => n.toString().padStart(2, '0');
        const format = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

        if (filterType === 'D') {
          // 당일
          const today = format(now);
          return { startDate: today, endDate: today, label: '당일 기준' };
        } 
        else if (filterType === 'W') {
          // 해당 주 (월요일 ~ 일요일)
          const day = now.getDay();
          const diffToMonday = now.getDate() - day + (day === 0 ? -6 : 1); // 일요일(0)이면 -6일, 아니면 월요일로 맞춤
          const monday = new Date(now);
          monday.setDate(diffToMonday);
          const sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);
          return { startDate: format(monday), endDate: format(sunday), label: '이번 주 기준' };
        } 
        else if (filterType === 'M') {
          // 해당 월 (1일 ~ 말일)
          const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
          const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0); // 다음 달의 0번째 날 = 이번 달 말일
          return { startDate: format(firstDay), endDate: format(lastDay), label: '이번 달 기준' };
        } 
        else {
          // 사용자 지정
          return { startDate: customDate.start, endDate: customDate.end, label: '사용자 지정 기간' };
        }
      };

      const { startDate, endDate, label } = getFilterDates();

      const toggleBrand = (brand) => {
        if (selectedBrands.includes(brand)) {
          setSelectedBrands(selectedBrands.filter(b => b !== brand));
        } else {
          if (selectedBrands.length >= 6) return;
          setSelectedBrands([...selectedBrands, brand]);
        }
      };

      // 🔥 선택된 기간으로 전체 데이터 필터링 (글로벌 필터 적용)
      const dashboardIssues = issues.filter(issue => {
        if (!issue.created_at) return false;
        const issueDate = issue.created_at.split('T')[0];
        return issueDate >= startDate && issueDate <= endDate;
      });

      const displayBrands = ['퍼시스', '일룸', '시디즈', '슬로우베드', '알로소', '데스커'];
      const brandStatsDetails = displayBrands.reduce((acc, brand) => {
        acc[brand] = { pending: 0, processing: 0, completed: 0 };
        return acc;
      }, {});

      dashboardIssues.forEach(issue => {
        if (brandStatsDetails[issue.brand]) {
          if (issue.status === '조치대기') brandStatsDetails[issue.brand].pending += 1;
          if (issue.status === '처리 중') brandStatsDetails[issue.brand].processing += 1;
          if (issue.status === '조치완료') brandStatsDetails[issue.brand].completed += 1;
        }
      });

      const targetIssues = selectedBrands.length > 0
        ? dashboardIssues.filter(issue => selectedBrands.includes(issue.brand))
        : dashboardIssues;

      // 파이 차트 (특이사항 유형)
      const chartStats = {};
      targetIssues.forEach(issue => {
        const type = issue.issue_type || '기타';
        chartStats[type] = (chartStats[type] || 0) + 1;
      });

      const totalIssues = Object.values(chartStats).reduce((a, b) => a + b, 0);
      const pieData = totalIssues === 0
        ? [{ name: '데이터 없음', value: 1, isEmpty: true }]
        : Object.entries(chartStats).map(([k, v]) => ({ name: k, value: v }));

      // 바 차트 (공급업체)
      const supplierStats = {};
      targetIssues.forEach(issue => {
        const vendor = issue.vendor || issue.brand || '미상';
        supplierStats[vendor] = (supplierStats[vendor] || 0) + 1;
      });

      const supplierTotal = Object.values(supplierStats).reduce((a, b) => a + b, 0);
      const sortedSuppliers = Object.entries(supplierStats).sort((a, b) => b[1] - a[1]);

      return (
        <div className="p-6 space-y-6 slide-up">

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow shrink-0">
            {/* 🔥 마스터 날짜 필터 컨트롤러 영역 */}
            <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-6 gap-4">
              <div>
                <h3 className="text-lg font-bold text-gray-900 font-sans flex items-center gap-2">
                  브랜드별 특이사항 처리 현황
                  <span className="bg-blue-50 text-letusBlue text-[10px] px-2 py-0.5 rounded border border-blue-100 font-black">{label}</span>
                </h3>
                <p className="text-xs text-gray-400 font-medium mt-1.5">조회 기간: {startDate} ~ {endDate}</p>
              </div>

              {/* 글로벌 날짜 토글 버튼 */}
              <div className="flex items-center gap-2">
                {/* 사용자 지정 시 나타나는 달력 폼 */}
                {filterType === 'CUSTOM' && (
                  <div className="flex items-center bg-gray-50 border border-gray-200 rounded-lg p-1 animate-fade-in shadow-sm">
                    <input type="date" value={customDate.start} onChange={e => setCustomDate({...customDate, start: e.target.value})} className="bg-transparent text-xs text-gray-700 font-bold focus:outline-none cursor-pointer px-1 w-[110px]" />
                    <span className="text-gray-400 text-xs mx-1">~</span>
                    <input type="date" value={customDate.end} onChange={e => setCustomDate({...customDate, end: e.target.value})} className="bg-transparent text-xs text-gray-700 font-bold focus:outline-none cursor-pointer px-1 w-[110px]" />
                  </div>
                )}

                {/* D, W, M, 사용자지정 세그먼트 컨트롤 */}
                <div className="flex bg-gray-100 p-1 rounded-lg border border-gray-200 shadow-inner">
                  {[
                    { id: 'D', name: '당일' },
                    { id: 'W', name: '주간' },
                    { id: 'M', name: '월간' },
                    { id: 'CUSTOM', name: '직접지정' }
                  ].map(btn => (
                    <button
                      key={btn.id}
                      onClick={() => setFilterType(btn.id)}
                      className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${filterType === btn.id ? 'bg-white text-letusBlue shadow-sm ring-1 ring-black/5' : 'text-gray-500 hover:text-gray-800'}`}
                    >
                      {btn.name}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
              {displayBrands.map(brand => {
                const stats = brandStatsDetails[brand];
                const isSelected = selectedBrands.includes(brand);
                return (
                  <div
                    key={brand}
                    onClick={() => toggleBrand(brand)}
                    className={`rounded-xl px-5 py-4 flex items-center border text-sm cursor-pointer transition-all ${isSelected
                      ? 'bg-orange-50 border-orange-400 shadow-sm ring-1 ring-orange-400/50'
                      : 'bg-gray-50/60 border-gray-100 hover:border-gray-200 hover:bg-gray-100'
                      }`}
                  >
                    <div style={{ width: '31%' }} className={`font-bold tracking-tight whitespace-nowrap truncate pr-2 ${isSelected ? 'text-orange-700' : 'text-gray-800'}`}>
                      {brand}
                    </div>

                    <div className="flex items-center flex-1">
                      {/* 날짜 데이터까지 같이 넘겨주는 드릴다운 이벤트 */}
                      <div style={{ width: '33.33%' }} className="flex justify-between items-center pr-3 sm:pr-4 border-r border-gray-200">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">조치대기</span>
                        <span className="text-red-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '조치대기', startDate, endDate }); }}>{stats.pending}</span>
                      </div>

                      <div style={{ width: '33.33%' }} className="flex justify-between items-center px-3 sm:px-4 border-r border-gray-200">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">처리 중</span>
                        <span className="text-yellow-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '처리 중', startDate, endDate }); }}>{stats.processing}</span>
                      </div>

                      <div style={{ width: '33.33%' }} className="flex justify-between items-center pl-3 sm:pl-4">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">조치완료</span>
                        <span className="text-green-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '조치완료', startDate, endDate }); }}>{stats.completed}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition-shadow">
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-900 font-sans">특이사항 유형</h3>
              </div>
              <div className="flex-1 flex items-center justify-center gap-8 xl:gap-14 w-full h-[220px] mt-2">
                <div className="relative w-56 h-56 flex items-center justify-center">
                  {PieChart ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={pieData}
                          cx="50%"
                          cy="50%"
                          innerRadius={65}
                          outerRadius={95}
                          paddingAngle={totalIssues === 0 ? 0 : 4}
                          cornerRadius={totalIssues === 0 ? 0 : 8}
                          dataKey="value"
                          stroke="none"
                        >
                          {pieData.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.isEmpty ? '#e5e7eb' : (CATEGORY_COLORS[entry.name] || '#aaaaaa')} />
                          ))}
                        </Pie>
                        {totalIssues > 0 && (
                          <Tooltip
                            contentStyle={{ borderRadius: '8px', border: '1px solid #f3f4f6', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)', fontSize: '13px' }}
                            itemStyle={{ color: '#1f2937', fontWeight: 'bold' }}
                          />
                        )}
                      </PieChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="text-[11px] font-bold text-red-500 bg-red-50 rounded-full w-40 h-40 flex items-center justify-center shadow-inner border border-red-200 text-center leading-relaxed">
                      Chart Module<br />Loading Failed
                    </div>
                  )}

                  <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span className={`text-[28px] font-black leading-tight ${totalIssues === 0 ? 'text-gray-300' : 'text-gray-900'}`}>{totalIssues}</span>
                    <span className="text-xs font-semibold text-gray-500">총 발생건</span>
                  </div>
                </div>
                
                <div className="space-y-3">
                  {totalIssues === 0 ? (
                    <div className="text-sm text-gray-400 font-bold ml-4">해당 기간 데이터가 없습니다.</div>
                  ) : (
                    Object.entries(chartStats).map(([k, v]) => (
                      <div key={k} className="flex justify-between items-center w-48 text-sm">
                        <div className="flex items-center text-gray-600 font-medium whitespace-nowrap">
                          <span className="w-2.5 h-2.5 rounded-full mr-3" style={{ backgroundColor: CATEGORY_COLORS[k] || '#d1d5db' }}></span>{k}
                        </div>
                        <div className="font-bold text-gray-900">{v}<span className="text-xs text-gray-400 font-normal ml-0.5">건</span></div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition-shadow">
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-900 font-sans">공급업체별 이슈 비율 (Top 5)</h3>
              </div>
              <div className="flex-1 flex flex-col justify-center space-y-6 px-4">
                {supplierTotal === 0 ? (
                  <div className="text-center text-sm text-gray-400 font-bold py-10">해당 기간 등록된 이슈가 없습니다.</div>
                ) : (
                  sortedSuppliers.slice(0, 5).map(([vendor, count], idx) => {
                    const percent = ((count / supplierTotal) * 100).toFixed(1);
                    return (
                      <div key={vendor} className="flex items-center text-sm group" title={`${vendor}: ${count}건 (${percent}%)`}>
                        <span className="w-24 text-gray-600 font-semibold truncate text-right mr-4">{vendor}</span>
                        <div className="flex-1 h-5 rounded overflow-hidden bg-gray-100 relative cursor-pointer">
