                          <div className="h-full rounded-r transition-all duration-1000 ease-out" style={{ width: `${percent}%`, backgroundColor: BRAND_COLORS[idx % BRAND_COLORS.length] }}></div>
                        </div>
                        <span className="w-12 text-right text-xs font-bold text-gray-500 ml-3">{percent}%</span>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
            <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
              <div className="flex items-center">
                <svg className="w-5 h-5 text-gray-700 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <h3 className="text-lg font-bold text-gray-900">해당 기간 특이사항 리스트</h3>
              </div>
              <button onClick={onNavigateToList} className="text-sm font-semibold text-letusBlue hover:text-blue-700 transition-colors flex items-center">
                전체보기 <svg className="w-4 h-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
              </button>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left whitespace-nowrap">
                <thead className="bg-white border-b border-gray-200 text-xs font-bold text-gray-500">
                  <tr>
                    <th className="p-4 pl-6">입고번호</th>
                    <th className="p-4">발생시간</th>
                    <th className="p-4">공급사</th>
                    <th className="p-4">품목정보</th>
                    <th className="p-4">특이유형</th>
                    <th className="p-4 text-center">처리상태</th>
                    <th className="p-4 text-center">관리</th>
                  </tr>
                </thead>
                {isLoading ? (
                  <TableSkeleton rowCount={5} colCount={7} />
                ) : (
                  <tbody className="divide-y divide-gray-100 text-sm">
                    {dashboardIssues.length === 0 ? (
                       <tr>
                         <td colSpan="7" className="p-8 text-center text-gray-400 font-bold text-xs">
                           해당 기간에 발생한 특이사항이 없습니다.
                         </td>
                       </tr>
                    ) : (
                      [...dashboardIssues]
                        .sort((a, b) => {
                          if (a.status === '조치대기' && b.status !== '조치대기') return -1;
                          if (a.status !== '조치대기' && b.status === '조치대기') return 1;
                          return 0;
                        })
                        .slice(0, 6)
                        .map((row, idx) => (
                          <tr key={row.reception_no || idx} className="hover:bg-gray-50 transition-colors">
                            <td className="p-4 pl-6 text-gray-800 font-semibold">{row.reception_no}</td>
                            <td className="p-4 text-gray-500 font-mono">{row.created_at ? new Date(row.created_at).toLocaleDateString() : '-'}</td>
                            <td className="p-4 font-semibold text-gray-700">{row.vendor || '-'}</td>
                            <td className="p-4 text-gray-600 truncate max-w-xs">{row.product_code}</td>
                            <td className="p-4"><CategoryBadge category={row.issue_type} /></td>
                            <td className="p-4 text-center"><StatusBadge status={row.status} category={row.issue_type} /></td>
                            <td className="p-4 text-center">
                              <button onClick={() => onDrillDown({ brand: row.brand, status: '전체', startDate, endDate })} className="border border-gray-300 text-gray-600 bg-white px-3 py-1 rounded text-xs font-semibold hover:bg-gray-50 hover:border-gray-400 transition-colors shadow-sm">
                                상세보기
                              </button>
                            </td>
                          </tr>
                        ))
                    )}
                  </tbody>
                )}
              </table>
            </div>
          </div>
        </div>
      );
    }

    // --- 특이사항 리스트 (IssueList) 🌟 최종 업데이트판 ---
    const IssueList = ({ issues = [], isLoading = false, onReload, savedFilters, setSavedFilters, userProfile }) => {
      const [activeModalRow, setActiveModalRow] = useState(null);
      const [activeHandleRow, setActiveHandleRow] = useState(null);
      const [selectedIds, setSelectedIds] = useState([]);
      const [isSendingFeedback, setIsSendingFeedback] = useState(false);

      // 🔥 정렬 상태 관리 (key: 칼럼명, direction: 'asc' | 'desc' | 'none')
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'none' });

      const [draftFilters, setDraftFilters] = useState({ ...savedFilters });

      useEffect(() => {
        setDraftFilters({ ...savedFilters });
      }, [savedFilters]);

      const handleSearch = () => {
        setSavedFilters({ ...draftFilters });
      };

      // 1. 기본 필터링 데이터
      const filteredIssues = useMemo(() => {
        return issues.filter(issue => {
          if (savedFilters.brand !== '전체' && issue.brand !== savedFilters.brand) return false;
          if (savedFilters.status !== '전체' && issue.status !== savedFilters.status) return false;

          if (issue.created_at) {
            const issueDate = issue.created_at.split('T')[0];
            if (issueDate < savedFilters.startDate || issueDate > savedFilters.endDate) return false;
          }

          if (savedFilters.searchValue) {
            const val = savedFilters.searchValue.toLowerCase();
            if (savedFilters.searchType === '품목코드' && !issue.product_code?.toLowerCase().includes(val)) return false;
            if (savedFilters.searchType === '공급업체' && !(issue.vendor || issue.brand || '').toLowerCase().includes(val)) return false;
            if (savedFilters.searchType === '처리자' && !issue.final_handler?.toLowerCase().includes(val)) return false;
          }
          return true;
        });
      }, [issues, savedFilters]);

      // 🔥 2. 정렬 로직 (단일 칼럼, 3단계 토글)
      const sortedIssues = useMemo(() => {
        let items = [...filteredIssues];
        if (sortConfig.key && sortConfig.direction !== 'none') {
          items.sort((a, b) => {
            const aVal = a[sortConfig.key] || '';
            const bVal = b[sortConfig.key] || '';
            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return items;
      }, [filteredIssues, sortConfig]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key) {
          if (sortConfig.direction === 'asc') direction = 'desc';
          else if (sortConfig.direction === 'desc') direction = 'none';
        }
        setSortConfig({ key: direction === 'none' ? null : key, direction });
      };

      // 🔥 3. 피드백 전송 (상태 체크 로직 추가)
      const handleSendFeedback = async () => {
        if (selectedIds.length === 0) {
          alert('피드백을 전송할 항목을 1개 이상 선택해 주세요.');
          return;
        }

        // 선택된 데이터 중 '조치완료'가 아닌 데이터가 있는지 확인
        const selectedData = issues.filter(i => selectedIds.includes(i.id));
        const invalidItems = selectedData.filter(i => i.status !== '조치완료');

        if (invalidItems.length > 0) {
          alert(`⚠️ 전송 실패\n\n'조치완료' 상태인 항목만 피드백 전송이 가능합니다.\n(선택 항목 중 ${invalidItems.length}건이 완료 전 상태입니다.)`);
          return;
        }

        if (!window.confirm(`선택하신 ${selectedIds.length}건의 피드백(알림톡)을 전송하시겠습니까?`)) return;

        setIsSendingFeedback(true);
        try {
          const nowIso = new Date().toISOString();
          const { error } = await supabase
            .from('logistics_issues')
            .update({ is_notified: true, feedback_sent_at: nowIso })
            .in('id', selectedIds);

          if (error) throw error;
          alert(`✅ ${selectedIds.length}건의 피드백 전송이 완료되었습니다.`);
          setSelectedIds([]);
          await onReload();
        } catch (err) {
          alert('피드백 전송 중 오류가 발생했습니다.');
        } finally {
          setIsSendingFeedback(false);
        }
      };

      const handleRevertSelectedIssues = async () => {
        if (selectedIds.length === 0) { alert('원복할 항목을 1개 이상 선택해 주세요.'); return; }
        if (userProfile?.role === '사용자') { alert('이 작업은 관리자만 수행할 수 있습니다.'); return; }
        if (!window.confirm(`선택하신 ${selectedIds.length}건의 이슈를 '조치대기' 상태로 원복하시겠습니까?\n이전의 조치 내용, 처리 기록 및 알림톡 이력이 모두 초기화됩니다.`)) return;

        try {
          const { error } = await supabase
            .from('logistics_issues')
            .update({ status: '조치대기', final_handler: '', action_content: '', resolved_at: null, is_notified: false, feedback_sent_at: null })
            .in('id', selectedIds);
          if (error) throw error;
          alert(`선택한 ${selectedIds.length}건의 항목이 초기화되었습니다.`);
          setSelectedIds([]);
          await onReload();
        } catch (err) { alert('원복 처리 중 오류 발생'); }
      };

      const handleSelectAll = (e) => setSelectedIds(e.target.checked ? sortedIssues.map(i => i.id) : []);
      const handleSelectOne = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

      // 정렬 아이콘 렌더러
      const getSortIcon = (key) => {
        if (sortConfig.key !== key) return <span className="ml-1 opacity-20">↕</span>;
        if (sortConfig.direction === 'asc') return <span className="ml-1 text-letusBlue font-black">↑</span>;
        if (sortConfig.direction === 'desc') return <span className="ml-1 text-letusBlue font-black">↓</span>;
        return <span className="ml-1 opacity-20">↕</span>;
      };

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] flex flex-col gap-4 slide-up">
          {/* 상단 필터 영역 */}
          <div className="w-full h-[54px] bg-white rounded-lg shadow-sm border border-slate-200 px-6 flex items-center z-30 shrink-0">
            <div className="flex items-center gap-6 w-full overflow-hidden">
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">브랜드</label>
                <select value={draftFilters.brand} onChange={e => setDraftFilters({...draftFilters, brand: e.target.value})} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] w-28 cursor-pointer text-gray-700">
                  <option value="전체">전체</option>
                  {['퍼시스', '일룸', '슬로우베드', '데스커', '시디즈', '알로소'].map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">등록일자</label>
                <div className="flex items-center">
                  <input type="date" value={draftFilters.startDate} onChange={e => setDraftFilters({...draftFilters, startDate: e.target.value})} className="border border-gray-200 rounded-[3px] text-xs px-2 h-[30px] w-[115px]" />
                  <span className="mx-1 text-gray-400 text-xs">~</span>
                  <input type="date" value={draftFilters.endDate} onChange={e => setDraftFilters({...draftFilters, endDate: e.target.value})} className="border border-gray-200 rounded-[3px] text-xs px-2 h-[30px] w-[115px]" />
                </div>
              </div>
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">처리상태</label>
                <select value={draftFilters.status} onChange={e => setDraftFilters({...draftFilters, status: e.target.value})} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] w-24 text-gray-700">
                  <option value="전체">전체</option>
                  <option value="조치대기">조치대기</option>
                  <option value="처리 중">처리 중</option>
                  <option value="조치완료">조치완료</option>
                </select>
              </div>
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">검색어</label>
                <div className="flex gap-1.5 h-[30px]">
                  <select value={draftFilters.searchType} onChange={e => setDraftFilters({...draftFilters, searchType: e.target.value})} className="border border-gray-200 rounded-[3px] text-xs px-2 text-gray-700">
                    <option>품목코드</option><option>공급업체</option><option>처리자</option>
                  </select>
                  <input type="text" value={draftFilters.searchValue} onChange={e => setDraftFilters({...draftFilters, searchValue: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleSearch()} className="border border-gray-200 rounded-[3px] text-xs px-2.5 w-36" placeholder="검색어 입력" />
                </div>
              </div>
              <button onClick={handleSearch} className="ml-auto border border-letusOrange text-letusOrange hover:bg-orange-50 font-bold px-6 h-[30px] rounded-[3px] text-xs">조회하기</button>
            </div>
          </div>

          <div className="flex justify-end gap-3 z-30 px-2">
            <div className="relative group">
              <button className="flex items-center text-xs font-bold text-slate-700 bg-white border border-slate-300 rounded px-3 py-1.5 hover:bg-slate-50 min-w-[100px] justify-between">
                <span>선택실행</span>
                <svg className="w-3.5 h-3.5 ml-2 text-slate-400 group-hover:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </button>
              <div className="absolute right-0 top-[110%] w-[120px] hidden group-hover:block z-50">
                <div className="bg-white border border-slate-200 rounded-md shadow-xl p-1.5 flex flex-col gap-0.5">
                  <button onClick={handleRevertSelectedIssues} className="w-full text-left px-2.5 py-2 text-slate-600 hover:text-orange-600 hover:bg-orange-50 font-bold rounded text-[11px]">원복</button>
                  <button onClick={handleSendFeedback} disabled={isSendingFeedback} className={`w-full text-left px-2.5 py-2 font-bold rounded text-[11px] ${isSendingFeedback ? 'text-gray-400' : 'text-slate-600 hover:text-letusBlue hover:bg-blue-50'}`}>{isSendingFeedback ? '전송 중...' : '피드백 전송'}</button>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex-1 overflow-hidden z-20 flex flex-col">
            <div className="overflow-auto flex-1 h-[600px] custom-scrollbar">
              <table className="w-full table-fixed min-w-[1480px]">
                {/* 🔥 헤더: 중앙 정렬(text-center) 및 정렬 기능 추가 */}
                <thead className="bg-gray-50/50 border-b border-gray-200 text-xs text-gray-500 font-bold sticky top-0 z-10">
                  <tr>
                    <th className="p-4 w-[60px] text-center">
                      <input type="checkbox" checked={sortedIssues.length > 0 && selectedIds.length === sortedIssues.length} onChange={handleSelectAll} className="w-4 h-4 cursor-pointer" />
                    </th>
                    {[
                      { label: '접수번호', key: 'reception_no', w: '200px' },
                      { label: '소속 브랜드', key: 'brand', w: '100px' },
                      { label: '품목코드', key: 'product_code', w: 'auto' },
                      { label: '유형', key: 'issue_type', w: '160px' },
                      { label: '접수자', key: 'reporter', w: '90px' },
                      { label: '공급업체', key: 'vendor', w: '120px' },
                      { label: '처리상태', key: 'status', w: '100px' },
                      { label: '알림톡', key: 'is_notified', w: '80px' },
                      { label: '요청내용', key: null, w: '110px' },
                      { label: '처리 내용', key: null, w: '110px' },
                      { label: '최종 처리자', key: 'final_handler', w: '120px' },
                      { label: '최종 처리일시', key: 'resolved_at', w: '150px' }
                    ].map((col, idx) => (
                      <th 
                        key={idx} 
                        className={`p-4 text-center select-none ${col.key ? 'cursor-pointer hover:bg-gray-100 transition-colors' : ''}`} 
                        style={{ width: col.w }}
                        onClick={() => col.key && requestSort(col.key)}
                      >
                        <div className="flex items-center justify-center">
                          {col.label} {col.key && getSortIcon(col.key)}
                        </div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100 text-sm">
                  {isLoading ? <TableSkeleton colCount={12} /> : sortedIssues.map((row) => (
                    <tr key={row.id} className={`hover:bg-blue-50/30 transition-colors cursor-pointer ${selectedIds.includes(row.id) ? 'bg-blue-50/50' : ''}`} onClick={() => handleSelectOne(row.id)}>
                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={selectedIds.includes(row.id)} onChange={() => handleSelectOne(row.id)} className="w-4 h-4 cursor-pointer" />
                      </td>
                      {/* 🔥 모든 데이터 셀 중앙 정렬 적용 */}
                      <td className="p-4 text-center font-bold text-gray-800">{row.reception_no}</td>
                      <td className="p-4 text-center font-semibold text-gray-700">{row.brand}</td>
                      <td className="p-4 text-center text-gray-600 truncate max-w-[200px]" title={row.product_code}>{row.product_code}</td>
                      <td className="p-4 text-center"><div className="flex justify-center"><CategoryBadge category={row.issue_type} /></div></td>
                      <td className="p-4 text-center text-gray-600">{row.reporter || '물류담당자'}</td>
                      <td className="p-4 text-center text-gray-700 font-semibold">{row.vendor || '-'}</td>
                      <td className="p-4 text-center"><StatusBadge status={row.status} category={row.issue_type} /></td>
                      
                      {/* 🔥 알림톡 디자인 업데이트 (배경 + 체크 아이콘) */}
                      <td className="p-4 text-center">
                        {row.is_notified ? (
                          <span className="inline-flex items-center gap-1 text-[10px] font-black bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded-full shadow-sm" title={formatDateTime(row.feedback_sent_at)}>
                            <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={4}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                            전송완료
                          </span>
                        ) : <span className="text-gray-300 font-bold">-</span>}
                      </td>

                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}>
                        <button onClick={() => setActiveModalRow(row)} className={`text-xs font-bold border px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${row.status === '조치대기' ? 'bg-gray-50 text-gray-500' : 'bg-white text-letusBlue border-blue-200 hover:bg-blue-50'}`}>{row.status === '조치대기' ? '요청등록' : '요청확인'}</button>
                      </td>
                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}>
                        {['처리 중', '조치완료'].includes(row.status) ? (
                          <button onClick={() => setActiveHandleRow(row)} className={`text-xs font-bold border px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${row.status === '조치완료' ? 'bg-white text-green-600 border-green-200 hover:bg-green-50' : 'bg-yellow-50 text-yellow-600 border-yellow-300 hover:bg-yellow-100'}`}>{row.status === '조치완료' ? '조치 확인' : '조치 등록'}</button>
                        ) : <span className="text-gray-300">-</span>}
                      </td>
                      <td className="p-4 text-center text-gray-600 font-medium">{row.final_handler || '-'}</td>
                      <td className="p-4 text-center text-gray-500 font-mono text-xs">{formatDateTime(row.resolved_at)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          {activeModalRow && <RequestModal row={activeModalRow} onClose={() => setActiveModalRow(null)} onReload={onReload} userProfile={userProfile} />}
          {activeHandleRow && <HandleModal row={activeHandleRow} onClose={() => setActiveHandleRow(null)} onReload={onReload} userProfile={userProfile} />}
        </div>
      );
    };

    // --- 🌟 건의사항 상세/답변 모달 (SuggestionModal) ---
    const SuggestionModal = ({ item, onClose, onReload, userProfile }) => {
      const isAdmin = userProfile?.role === '관리자';
      // 🔥 본인이 작성한 글인지 확인
      const isAuthor = userProfile?.name === item.user_name;

      const [answer, setAnswer] = useState(item.answer || '');
      const [status, setStatus] = useState(item.status || '대기중');
      const [isSaving, setIsSaving] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false); // 🔥 삭제 상태 관리

      const handleSave = async () => {
        setIsSaving(true);
        try {
          const { error } = await supabase
            .from('suggestions')
            .update({ answer: answer, status: status })
            .eq('id', item.id);

          if (error) throw error;

          alert('답변 및 상태가 성공적으로 저장되었습니다.');
          onReload(); // 리스트 새로고침
          onClose();  // 모달 닫기
        } catch (error) {
          alert('저장 실패: ' + error.message);
        } finally {
          setIsSaving(false);
        }
      };

      // 🔥 삭제 핸들러 추가
      const handleDelete = async () => {
        if (!window.confirm('이 건의사항을 정말 삭제하시겠습니까?\n삭제된 데이터는 영구적으로 복구할 수 없습니다.')) return;

        setIsDeleting(true);
        try {
          const { error } = await supabase
            .from('suggestions')
            .delete()
            .eq('id', item.id); // 해당 ID의 글을 DB에서 삭제

          if (error) throw error;

          alert('건의사항이 삭제되었습니다.');
          onReload(); // 리스트 새로고침하여 화면에서 즉시 사라지게 함
          onClose();  // 모달 닫기
        } catch (error) {
          alert('삭제 실패: ' + error.message);
        } finally {
          setIsDeleting(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-2xl slide-up border border-gray-100 overflow-hidden flex flex-col">

            {/* 헤더 */}
            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-gray-900 flex items-center gap-2">
                <span className="text-[10px] font-black bg-gray-200 text-gray-600 px-2 py-0.5 rounded uppercase tracking-wider">{item.request_type}</span>
                건의사항 상세 내역
              </h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>

            {/* 본문 영역 */}
            <div className="p-6 bg-white space-y-6 overflow-y-auto max-h-[70vh] custom-scrollbar">

              {/* 1. 작성자 원본 내용 (읽기 전용) */}
              <div>
                <div className="flex justify-between items-end mb-2">
                  <h4 className="text-lg font-bold text-gray-800">{item.title}</h4>
                  <span className="text-xs font-medium text-gray-400">{new Date(item.created_at).toLocaleString()} | 작성자: <span className="font-bold text-gray-600">{item.user_name}</span></span>
                </div>
                <div className="bg-gray-50 p-4 rounded-lg text-sm text-gray-700 min-h-[100px] whitespace-pre-wrap border border-gray-100 leading-relaxed">
                  {item.content}
                </div>
              </div>

              {/* 2. 관리자 답변 및 상태 영역 */}
              <div className="border-t border-gray-100 pt-5">
                <div className="flex justify-between items-center mb-3">
                  <h4 className="text-sm font-bold text-letusBlue flex items-center gap-1.5">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
                    관리자 피드백
                  </h4>

                  {/* 관리자면 셀렉트 박스, 일반 유저면 상태 뱃지만 노출 */}
                  {isAdmin ? (
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-bold text-gray-500">진행 상태:</span>
                      <select value={status} onChange={(e) => setStatus(e.target.value)} className="border border-gray-300 rounded px-2 py-1 text-xs font-bold text-gray-700 focus:border-letusBlue outline-none cursor-pointer">
                        <option value="대기중">대기중</option>
                        <option value="검토중">검토중</option>
                        <option value="반영완료">반영완료</option>
                        <option value="반려">반려</option>
                      </select>
                    </div>
                  ) : (
                    <span className={`text-[11px] font-bold px-2.5 py-1 rounded shadow-sm border ${status === '반영완료' ? 'bg-green-50 text-green-600 border-green-200' : status === '검토중' ? 'bg-blue-50 text-blue-600 border-blue-200' : status === '반려' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-gray-100 text-gray-600 border-gray-200'}`}>{status}</span>
                  )}
                </div>

                {/* 관리자면 입력창(textarea), 일반 유저면 결과 텍스트만 노출 */}
                {isAdmin ? (
                  <textarea
                    value={answer}
                    onChange={(e) => setAnswer(e.target.value)}
                    placeholder="건의사항에 대한 답변이나 조치 결과를 작성해 주세요."
                    className="w-full border border-blue-200 bg-blue-50/30 rounded-lg p-4 text-sm text-gray-800 focus:ring-2 focus:ring-letusBlue focus:border-letusBlue outline-none resize-none h-32 transition-shadow"
                  ></textarea>
                ) : (
                  <div className="bg-blue-50/50 p-4 rounded-lg text-sm text-gray-800 min-h-[80px] whitespace-pre-wrap border border-blue-100 leading-relaxed">
                    {answer ? answer : <span className="text-gray-400 italic">아직 등록된 답변이 없습니다. 담당자가 내용을 꼼꼼히 검토 중입니다.</span>}
                  </div>
                )}
              </div>
            </div>

            {/* 하단 버튼 */}
            <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
              {/* 🔥 왼쪽: 삭제 버튼 (관리자이거나 작성자 본인일 경우에만 노출) */}
              <div>
                {(isAdmin || isAuthor) && (
                  <button
                    onClick={handleDelete}
                    disabled={isDeleting || isSaving}
                    className={`px-4 py-2 border border-red-200 text-red-500 bg-red-50 text-sm font-bold rounded hover:bg-red-100 transition-colors shadow-sm flex items-center gap-1.5 ${isDeleting ? 'opacity-70 cursor-not-allowed' : ''}`}
                  >
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    {isDeleting ? '삭제 중...' : '삭제'}
                  </button>
                )}
              </div>

              {/* 오른쪽: 닫기 및 저장 버튼 */}
              <div className="flex gap-2">
                <button onClick={onClose} disabled={isDeleting || isSaving} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded hover:bg-gray-100 transition-colors bg-white shadow-sm">
                  닫기
                </button>
                {isAdmin && (
                  <button onClick={handleSave} disabled={isSaving || isDeleting} className={`px-6 py-2 bg-letusBlue text-white text-sm font-bold rounded shadow hover:bg-blue-600 transition-colors flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    {isSaving ? '저장 중...' : '답변 저장'}
                  </button>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    };

    // --- 🌟 FAQ 등록 모달 (FaqAddModal) ---
    const FaqAddModal = ({ onClose, onReload }) => {
      const [category, setCategory] = useState('시스템 설정');
      const [question, setQuestion] = useState('');
      const [answer, setAnswer] = useState('');
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async (e) => {
        e.preventDefault();
        if (!question.trim() || !answer.trim()) {
          alert('질문과 답변을 모두 입력해 주세요.');
          return;
        }

        setIsSaving(true);
        try {
          const { error } = await supabase
            .from('faqs')
            .insert([{ category, question, answer }]);

          if (error) throw error;

          alert('새로운 FAQ가 성공적으로 등록되었습니다.');
          onReload(); // 지원센터 리스트 싹 새로고침!
          onClose();  // 모달 닫기
        } catch (error) {
          alert('등록 실패: ' + error.message);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-lg slide-up border border-gray-100 overflow-hidden flex flex-col">

            <div className="p-5 border-b border-gray-100 bg-white flex justify-between items-center">
              <h3 className="font-bold text-gray-900 flex items-center gap-2">
                <span className="w-1.5 h-3.5 bg-letusOrange rounded-full"></span>
                새 FAQ (자주 묻는 질문) 등록
              </h3>
              <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>

            <div className="p-6 bg-slate-50">
              <form id="faqForm" onSubmit={handleSave} className="space-y-5">
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">카테고리 분류 <span className="text-letusOrange">*</span></label>
                  <select value={category} onChange={(e) => setCategory(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2.5 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800 cursor-pointer">
                    <option>시스템 설정</option>
                    <option>계정/권한</option>
                    <option>입고 관리</option>
                    <option>특이사항 처리</option>
                    <option>기타</option>
                  </select>
                </div>

                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">질문 (Question) <span className="text-letusOrange">*</span></label>
                  <input type="text" value={question} onChange={(e) => setQuestion(e.target.value)} required placeholder="예) 특이사항 알림이 오지 않습니다." className="border border-gray-300 rounded-[4px] px-3.5 py-2.5 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800" />
                </div>

                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">답변 (Answer) <span className="text-letusOrange">*</span></label>
                  <textarea value={answer} onChange={(e) => setAnswer(e.target.value)} required rows={5} placeholder="사용자에게 보여질 상세한 해결 방법을 적어주세요." className="border border-gray-300 rounded-[4px] px-3.5 py-3 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800 resize-none leading-relaxed"></textarea>
                </div>
              </form>
            </div>

            <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-2 shrink-0">

    };

    const App = () => {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [issues, setIssues] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [userProfile, setUserProfile] = useState(null);
      const [selfEditTarget, setSelfEditTarget] = useState(null);
      const [notifications, setNotifications] = useState([]);
      const [isNotiOpen, setIsNotiOpen] = useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = useState(true); 

      const [favorites, setFavorites] = useState(() => {
        const savedFavs = localStorage.getItem('letus_favorites');
        return savedFavs ? JSON.parse(savedFavs) : [];
      });

      const toggleFavorite = (pageId) => {
        setFavorites(prev => {
          const newFavs = prev.includes(pageId) ? prev.filter(id => id !== pageId) : [...prev, pageId];
          localStorage.setItem('letus_favorites', JSON.stringify(newFavs));
          return newFavs;
        });
      };

      const today = new Date().toISOString().split("T")[0];
      const [savedListFilters, setSavedListFilters] = useState({
        brand: '전체', status: '전체', startDate: today, endDate: today, searchType: '품목코드', searchValue: ''
      });

      useEffect(() => {
        if (session) {
          const savedKey = 'letus_noti_' + session.user.id;
          const saved = localStorage.getItem(savedKey);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              const now = new Date().getTime();
              const validNotis = parsed.filter(n => !(n.read && n.read_at && (now - n.read_at > 24 * 60 * 60 * 1000)));
              setNotifications(validNotis);
            } catch (e) { }
          }
        }
      }, [session]);

      useEffect(() => {
        if (session) {
          localStorage.setItem('letus_noti_' + session.user.id, JSON.stringify(notifications));
        }
      }, [notifications, session]);

      const handleNotiClick = (notiId, filterObj) => {
        setNotifications(prev => prev.map(n => n.id === notiId ? { ...n, read: true, read_at: new Date().getTime() } : n));
        handleDrillDown(filterObj);
        setIsNotiOpen(false);
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
        setUserProfile(null);
        setSession(null);
      };

      const handleDrillDown = (filterObj) => {
        setSavedListFilters(prev => ({
          ...prev,
          brand: filterObj.brand || '전체',
          status: filterObj.status || '전체',
          startDate: filterObj.startDate || prev.startDate,
          endDate: filterObj.endDate || prev.endDate        
        }));
        setCurrentPage('list');
      };

      const fetchIssues = async () => {
        setIsLoading(true);
        try {
          const { data, error } = await supabase.from('logistics_issues').select('*').order('id', { ascending: false });
          if (error) throw error;
          setIssues(data || []);
        } catch (error) {
          console.error('Supabase fetch exception:', error.message || error);
          setIssues([]);
        } finally {
          setIsLoading(false);
        }
      };

      const fetchProfile = async () => {
        if (!session) return;
        try {
          const { data, error } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
          if (data) {
            setUserProfile(data);
            if (data.role === '사용자' && currentPage === 'user_management') {
              setCurrentPage('dashboard');
            }
          }
        } catch (err) {
          console.error('프로필 갱신 실패:', err);
        }
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setAuthLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setAuthLoading(false);
        });

        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (session) {
          fetchIssues();
          fetchProfile();
        }
      }, [session]);

      useEffect(() => {
        if (!session || !userProfile) return;

        if (Notification.permission === 'default' && !sessionStorage.getItem('notiAsked')) {
          sessionStorage.setItem('notiAsked', 'true');
          Notification.requestPermission();
        }

        const channel = supabase
          .channel('logistics_issue_notifications')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '신규 입고'); })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '상태 변경'); })
          .subscribe();

        const handleIssueChange = (newData, type) => {
          const userBrands = userProfile?.managed_brands ? userProfile.managed_brands.split(',').map(s => s.trim()) : [];
          const userVendors = userProfile?.managed_vendors ? userProfile.managed_vendors.split(',').map(s => s.trim()) : [];

          let shouldAlert = false;
          let message = '';
          const currentStatus = newData.status || '조치대기';

          if (currentStatus === '조치대기' && userProfile?.role?.includes('관리자') && (userBrands.includes('전체') || userBrands.includes(newData.brand))) {
            shouldAlert = true;
            message = `[신규] ${newData.brand} 브랜드의 새로운 이슈가 접수되었습니다. (${newData.reception_no})`;
          }
          else if (currentStatus === '처리 중' && userVendors.includes(newData.vendor)) {
            shouldAlert = true;
            message = `[이관] 관리 중인 ${newData.vendor} 업체로 이슈가 이관되었습니다. (${newData.reception_no})`;
          }
          else if (currentStatus === '조치완료' && userProfile?.role?.includes('관리자') && (userBrands.includes('전체') || userBrands.includes(newData.brand))) {
            shouldAlert = true;
            message = `[조치완료] ${newData.brand} 브랜드의 이슈 조치가 완료되었습니다. (${newData.reception_no})`;
          }

          if (shouldAlert) {
            const nowTime = new Date().getTime();
            if (window.lastAlertMsg === message && nowTime - (window.lastAlertTime || 0) < 2000) return;
            window.lastAlertMsg = message;
            window.lastAlertTime = nowTime;

            const newNoti = {
              id: newData.id + '_' + nowTime,
              title: type,
              message: message,
              date: new Date(nowTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              read: false,
              read_at: null,
              filterObj: { brand: newData.brand || '전체', status: newData.status || '전체' }
            };

            setNotifications(prev => [newNoti, ...prev].slice(0, 10));

            if (Notification.permission === 'granted') {
              new Notification(`LETUS LOGIS - ${type}`, {
                body: message,
                icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
              });
            }
            fetchIssues();
          }
        };

        return () => { supabase.removeChannel(channel); };
      }, [session, userProfile]);

      if (authLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
            <svg className="animate-spin h-8 w-8 text-letusBlue mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span className="text-sm font-bold text-slate-500 tracking-wide">인증 세션을 확인 중입니다...</span>
          </div>
        );
      }

      if (!session) return <LoginView />;

      return (
        <div className="flex h-screen overflow-hidden bg-letusBg text-gray-900 font-sans">
          <Sidebar page={currentPage} setPage={setCurrentPage} userProfile={userProfile} isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen} favorites={favorites} />
          <div className="flex-1 flex flex-col w-full bg-slate-100 overflow-y-auto overflow-x-hidden min-h-screen relative">
            <Header
              page={currentPage} userProfile={userProfile} onLogout={handleLogout} notifications={notifications} isNotiOpen={isNotiOpen}
              toggleNoti={() => setIsNotiOpen(!isNotiOpen)} onNotiClick={handleNotiClick} onEditProfile={() => setSelfEditTarget(userProfile)}
              favorites={favorites} toggleFavorite={toggleFavorite} isSidebarOpen={isSidebarOpen} setIsSidebarOpen={setIsSidebarOpen}
            />

            <main className="flex-1 w-full">
              <div className={currentPage === 'dashboard' ? 'block' : 'hidden'}>
                <Dashboard onNavigateToList={() => setCurrentPage('list')} onDrillDown={handleDrillDown} issues={issues} isLoading={isLoading} onReload={fetchIssues} />
              </div>
              <div className={currentPage === 'list' ? 'block' : 'hidden'}>
                <IssueList userProfile={userProfile} issues={issues} isLoading={isLoading} onReload={fetchIssues} savedFilters={savedListFilters} setSavedFilters={setSavedListFilters} />
              </div>
              <div className={currentPage === 'user_management' ? 'block' : 'hidden'}>
                <UserManagement />
              </div>
              <div className={currentPage === 'support' ? 'block' : 'hidden'}>
                <SupportCenter userProfile={userProfile} />
              </div>
            </main>

            {selfEditTarget && (
              <UserEditModal user={selfEditTarget} onClose={() => setSelfEditTarget(null)} onReload={fetchProfile} isProfileMode={true} />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
