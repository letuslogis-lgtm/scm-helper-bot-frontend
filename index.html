                              <button onClick={() => onDrillDown({ brand: row.brand, status: '전체', startDate, endDate })} className="border border-gray-300 text-gray-600 bg-white px-3 py-1 rounded text-xs font-semibold hover:bg-gray-50 hover:border-gray-400 transition-colors shadow-sm">
                                상세보기
                              </button>
                            </td>
                          </tr>
                        ))
                    )}
                  </tbody>
                )}
              </table>
            </div>
          </div>
        </div>
      );
    }

    // --- 👤 사용자 관리 (UserManagement) ---
    const UserManagement = () => {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [users, setUsers] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [selectedUsers, setSelectedUsers] = useState([]);
      const [editTarget, setEditTarget] = useState(null);
      const [vendorListTarget, setVendorListTarget] = useState(null);
      const [filterRole, setFilterRole] = useState('');
      const [filterStatus, setFilterStatus] = useState('');
      const [filterKeyword, setFilterKeyword] = useState('');
      const [filterVendor, setFilterVendor] = useState('');
      const [isBulkUploadModalOpen, setIsBulkUploadModalOpen] = useState(false);
      const [selectedUserIds, setSelectedUserIds] = useState([]);
      const [isBulkEditModalOpen, setIsBulkEditModalOpen] = useState(false);
      const [isActionMenuOpen, setIsActionMenuOpen] = useState(false);

      const isAllSelected = users.length > 0 && selectedUsers.length === users.length;

      const handleExportExcel = () => {
        const targetData = selectedUserIds.length > 0 ? users.filter(u => selectedUserIds.includes(u.id)) : users;
        if (targetData.length === 0) return alert('추출할 데이터가 없습니다.');

        // 엑셀 시트에 들어갈 JSON 데이터 배열 생성
        const excelData = targetData.map(row => ({
          '사용자명': row.name || '',
          '아이디': row.login_id || '',
          '소속팀': row.team || '',
          '소속브랜드': row.brands || '',
          '권한그룹': row.role || '',
          '상태': row.status || ''
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        ws['!cols'] = [{ wch: 15 }, { wch: 20 }, { wch: 15 }, { wch: 25 }, { wch: 10 }, { wch: 10 }];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "사용자목록");
        XLSX.writeFile(wb, `사용자목록_${new Date().toISOString().split('T')[0]}.xlsx`);
      };

      const toggleAll = () => {
        if (isAllSelected) {
          setSelectedUsers([]);
        } else {
          setSelectedUsers(users.map(u => u.id));
        }
      };

      const toggleOne = (id) => {
        setSelectedUsers(prev =>
          prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
        );
      };

      // 🔥 선택 항목 일괄 삭제 기능 (관리자 전용 & 대용량 청크 처리)
      const handleDeleteSelected = async () => {
        if (userProfile?.role !== '관리자') return alert('🚨 삭제 권한이 없습니다. 관리자에게 문의하세요.');
        if (selectedIds.length === 0) return alert('삭제할 항목을 체크해 주세요.');

        if (!window.confirm(`선택하신 ${selectedIds.length}건의 데이터를 정말 삭제하시겠습니까?\n이 작업은 영구적이며 복구할 수 없습니다.`)) return;

        try {
          // 🔥 URL 길이 초과 방지를 위해 200개씩 쪼개서 지우기!
          const CHUNK_SIZE = 200;
          for (let i = 0; i < selectedIds.length; i += CHUNK_SIZE) {
            const chunk = selectedIds.slice(i, i + CHUNK_SIZE);
            const { error } = await supabase.from('logistics_accidents').delete().in('id', chunk);
            if (error) throw error;
          }

          alert(`🗑️ ${selectedIds.length}건의 데이터가 깔끔하게 삭제되었습니다.`);
          setSelectedIds([]);
          fetchAccidents();
        } catch (err) {
          alert('삭제 중 오류 발생: ' + err.message);
        }
      };

      const fetchUsers = async (params = {}) => {
        setIsLoading(true);
        try {
          let query = supabase.from('profiles').select('*');
          const role = params.role !== undefined ? params.role : filterRole;
          const status = params.status !== undefined ? params.status : filterStatus;
          const keyword = params.keyword !== undefined ? params.keyword : filterKeyword;
          const vendor = params.vendor !== undefined ? params.vendor : filterVendor;
          if (role) query = query.eq('role', role);
          if (status) query = query.eq('status', status);
          if (keyword) query = query.ilike('name', `%${keyword}%`);
          if (vendor) query = query.ilike('managed_vendors', `%${vendor}%`);
          const { data, error } = await query.order('created_at', { ascending: false });
          if (error) throw error;
          setUsers(data || []);
        } catch (error) {
          console.error("fetchUsers error:", error.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleSearch = () => fetchUsers();

      useEffect(() => {
        window.addEventListener('trigger-refresh', handleSearch);
        return () => window.removeEventListener('trigger-refresh', handleSearch);
      }, [filterRole, filterStatus, filterKeyword, filterVendor]);

      useEffect(() => {
        fetchUsers();
      }, []);

      return (
        <div className="p-6 flex flex-col gap-4 max-w-[1600px] mx-auto animate-fade-in pb-20 w-full min-h-[calc(100vh-64px)]">
          <div className="w-full bg-white rounded-lg shadow-sm border border-slate-200 px-6 py-3 flex items-center z-30 shrink-0">
            <div className="flex items-center gap-5 w-full flex-wrap">

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">권한 그룹</label>
                <select value={filterRole} onChange={e => setFilterRole(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-24 cursor-pointer text-gray-700">
                  <option value="">전체</option>
                  <option value="관리자">관리자</option>
                  <option value="사용자">사용자</option>
                </select>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">계정 상태</label>
                <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-24 cursor-pointer text-gray-700">
                  <option value="">전체</option>
                  <option value="정상">정상 승인</option>
                  <option value="정지">이용 정지</option>
                </select>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">이름</label>
                <input
                  type="text"
                  value={filterKeyword}
                  onChange={e => setFilterKeyword(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleSearch()}
                  placeholder="이름 검색..."
                  className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-32 text-gray-700"
                />
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">담당 업체</label>
                <input
                  type="text"
                  value={filterVendor}
                  onChange={e => setFilterVendor(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleSearch()}
                  placeholder="업체명 검색..."
                  className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-32 text-gray-700"
                />
              </div>

              <div className="ml-auto shrink-0 flex items-center gap-2">
                <button
                  onClick={() => { setFilterRole(''); setFilterStatus(''); setFilterKeyword(''); setFilterVendor(''); fetchUsers({ role: '', status: '', keyword: '', vendor: '' }); }}
                  className="border border-gray-300 text-gray-500 hover:bg-gray-50 font-bold px-4 h-[30px] rounded-[3px] transition-colors text-xs"
                >
                  초기화
                </button>
                <button onClick={handleSearch} className="border border-letusOrange text-letusOrange hover:bg-orange-50 font-bold px-6 h-[30px] rounded-[3px] transition-colors text-xs flex items-center justify-center">
                  조회하기
                </button>
              </div>
            </div>
          </div>

          <div className="flex justify-end w-full px-2 z-30 -mt-1 mb-1">
            <div className="flex items-center gap-3">
              {/* 🔥 3단계: 지저분한 버튼들 싹 지우고 '선택실행' 드롭다운으로 통합! */}
              <div className="relative">
                <button
                  onClick={() => setIsActionMenuOpen(!isActionMenuOpen)}
                  className="flex items-center justify-between text-xs font-bold text-gray-700 bg-white border border-gray-300 rounded shadow-sm px-3 py-[7px] hover:bg-gray-50 transition-all w-[90px]"
                >
                  선택실행
                  <svg className={`w-3.5 h-3.5 text-gray-400 transition-transform ${isActionMenuOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                </button>

                {isActionMenuOpen && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setIsActionMenuOpen(false)}></div>
                    <div className="absolute right-0 mt-1 w-32 bg-white border border-gray-200 rounded shadow-lg z-50 py-1.5 slide-down">

                      <button onClick={() => { setIsActionMenuOpen(false); setIsModalOpen(true); }} className="w-full text-left px-4 py-2 text-xs font-medium text-gray-700 hover:bg-gray-50">
                        사용자 추가
                      </button>

                      <button onClick={() => { setIsActionMenuOpen(false); setIsBulkUploadModalOpen(true); }} className="w-full text-left px-4 py-2 text-xs font-medium text-gray-700 hover:bg-gray-50">
                        일괄 등록
                      </button>

                      <button
                        onClick={() => {
                          setIsActionMenuOpen(false);
                          // 기훈님 코드의 selectedUsers 또는 selectedUserIds 배열 길이 확인
                          if (selectedUsers.length === 0 && selectedUserIds.length === 0) alert('일괄 변경할 사용자를 먼저 체크박스로 선택해 주세요.');
                          else setIsBulkEditModalOpen(true);
                        }}
                        className={`w-full text-left px-4 py-2 text-xs font-medium ${(selectedUsers.length > 0 || selectedUserIds.length > 0) ? 'text-gray-700 hover:bg-gray-50' : 'text-gray-300 cursor-not-allowed'}`}
                      >
                        일괄 변경 {(selectedUsers.length > 0 || selectedUserIds.length > 0) && `(${Math.max(selectedUsers.length, selectedUserIds.length)})`}
                      </button>

                      {/* 첫 번째 구분선 */}
                      <div className="h-px bg-gray-100 my-1"></div>

                      <button onClick={() => { setIsActionMenuOpen(false); handleExportExcel(); }} className="w-full text-left px-4 py-2 text-xs font-bold text-green-600 hover:bg-green-50 flex items-center justify-between">
                        엑셀 추출
                        <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                      </button>

                      {/* 두 번째 구분선 */}
                      <div className="h-px bg-gray-100 my-1"></div>

                      <button
                        onClick={() => {
                          setIsActionMenuOpen(false);
                          if (selectedUsers.length === 0 && selectedUserIds.length === 0) alert('삭제할 사용자를 먼저 선택해 주세요.');
                          else handleDeleteSelected(); // 기훈님 코드에 있던 삭제 함수 연결 완료!
                        }}
                        className={`w-full text-left px-4 py-2 text-xs font-medium ${(selectedUsers.length > 0 || selectedUserIds.length > 0) ? 'text-red-600 hover:bg-red-50' : 'text-gray-300 cursor-not-allowed'}`}
                      >
                        삭제
                      </button>

                    </div>
                  </>
                )}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden z-20">
            <div className="p-0 overflow-auto flex-1 h-[600px] custom-scrollbar">
              <table className="w-full text-left whitespace-nowrap">
                <thead className="bg-slate-50/70 border-b border-gray-200 text-xs text-slate-500 font-bold sticky top-0 z-10">
                  <tr>
                    <th className="p-4 pl-6 w-10 text-center">
                      <input
                        type="checkbox"
                        checked={isAllSelected}
                        onChange={toggleAll}
                        className="w-4 h-4 accent-letusBlue cursor-pointer"
                        title="전체 선택"
                      />
                    </th>
                    <th className="p-4 w-10 text-center">No</th>
                    <th className="p-4">사용자명</th>
                    <th className="p-4">사용자 ID</th>
                    <th className="p-4">소속 팀</th>
                    <th className="p-4">소속 브랜드</th>
                    <th className="p-4">담당 업체/창고</th>
                    <th className="p-4">권한 그룹</th>
                    <th className="p-4 text-center">가입일시</th>
                    <th className="p-4 text-center">상태</th>
                  </tr>
                </thead>
                {isLoading ? (
                  <TableSkeleton rowCount={8} colCount={9} />
                ) : users.length === 0 ? (
                  <tbody>
                    <tr>
                      <td colSpan="10" className="p-10 text-center text-gray-400">
                        <svg className="w-16 h-16 mx-auto mb-4 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                        <p className="font-semibold text-gray-500 mb-1">등록된 사용자가 없습니다.</p>
                        <p className="text-sm">상단의 [사용자 추가] 버튼을 눌러 첫 계정을 생성하세요.</p>
                      </td>
                    </tr>
                  </tbody>
                ) : (
                  <tbody className="divide-y divide-gray-100 text-[13px] text-gray-700">
                    {users.map((user, idx) => (
                      <tr key={user.id}
                        className={`transition-colors cursor-pointer ${selectedUsers.includes(user.id) ? 'bg-blue-50' : 'hover:bg-blue-50/30'}`}
                        onDoubleClick={() => setEditTarget(user)}
                        title="더블클릭하면 정보를 수정할 수 있습니다"
                      >
                        <td className="p-4 pl-6 text-center">
                          <input
                            type="checkbox"
                            checked={selectedUsers.includes(user.id)}
                            onChange={() => toggleOne(user.id)}
                            className="w-4 h-4 accent-letusBlue cursor-pointer"
                          />
                        </td>
                        <td className="p-4 text-center text-gray-400 font-medium">{idx + 1}</td>
                        <td className="p-4 font-black text-gray-800 text-sm tracking-tight">{user.name}</td>
                        <td className="p-4 font-bold text-gray-600">{user.login_id}</td>
                        <td className="p-4 text-gray-600 font-medium">{user.team || '-'}</td>
                        <td className="p-4">
                          <div className="flex gap-1.5 flex-wrap max-w-[200px]">
                            {user.brands
                              ? <span className="bg-slate-50 text-slate-600 border border-slate-200 px-2 py-1 rounded-[4px] text-[11px] whitespace-nowrap font-bold shadow-sm">{user.brands}</span>
                              : <span className="text-gray-400">-</span>
                            }
                          </div>
                        </td>
                        <td className="p-4">
                          {(user.managed_vendors || user.managed_brands) ? (
                            <button
                              onClick={e => { e.stopPropagation(); setVendorListTarget(user); }}
                              className="inline-flex items-center gap-1 bg-blue-50 text-letusBlue border border-blue-200 rounded-[4px] px-2 py-1 text-[10px] font-bold hover:bg-blue-100 transition-colors whitespace-nowrap"
                            >
                              <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
                              상세보기 ({(typeof user.managed_vendors === 'string' ? user.managed_vendors.split(',').filter(Boolean).length : 0) + (typeof user.managed_brands === 'string' ? user.managed_brands.split(',').filter(Boolean).length : 0)})
                            </button>
                          ) : (
                            <span className="text-gray-400 text-xs">-</span>
                          )}
                        </td>
                        <td className="p-4">
                          <span className={`px-2.5 py-1 rounded-[4px] font-bold text-[11px] ${user.role === '관리자' ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-slate-100 text-slate-600'}`}>
                            {user.role}
                          </span>
                        </td>
                        <td className="p-4 text-center text-gray-400 font-bold">{formatDateTime(user.created_at)}</td>
                        <td className="p-4 text-center">
                          <span className={`px-3 py-1 rounded-full font-bold text-[11px] shadow-sm ${user.status === '정상' || user.status === '정상 승인' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-50 text-red-600 border border-red-200'}`}>
                            {user.status}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                )}
              </table>
            </div>
          </div>
          {isModalOpen && <UserAddModal onClose={() => setIsModalOpen(false)} onReload={fetchUsers} />}
          {editTarget && <UserEditModal user={editTarget} onClose={() => setEditTarget(null)} onReload={fetchUsers} />}
          {vendorListTarget && <VendorListModal user={vendorListTarget} onClose={() => setVendorListTarget(null)} />}
          {isBulkUploadModalOpen && <UserBulkUploadModal onClose={() => setIsBulkUploadModalOpen(false)} onReload={fetchUsers} />}
          {isBulkEditModalOpen && (<UserBulkEditModal selectedUserIds={selectedUsers} users={users} onClose={() => setIsBulkEditModalOpen(false)} onReload={fetchUsers} />)}
        </div>
      );
    };

    // --- ⚙️ 마스터 데이터 수동 업데이트 (ProductManager) ---
    const ProductManager = () => {
      const [isLoading, setIsLoading] = useState(false);
      const [resultStats, setResultStats] = useState(null);

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsLoading(true);
        setResultStats(null);

        try {
          // 1. 엑셀 데이터 로드
          const rawData = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const wb = XLSX.read(e.target.result, { type: 'binary' });
              resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
            };
            reader.readAsBinaryString(file);
          });

          if (rawData.length === 0) {
            alert('엑셀 파일에 데이터가 없습니다.');
            setIsLoading(false);
            return;
          }

          const clean = (val) => val ? String(val).trim() : '';

          // 2. 엑셀 파일 내부 자체 중복 제거 (같은 코드가 여러 개면 마지막 줄 기준)
          const uniqueMap = new Map();
          rawData.forEach(excelRow => {
            const itemCode = clean(excelRow['단품코드']);
            const itemColor = clean(excelRow['단품컬러']);
            if (itemCode) {
              uniqueMap.set(`${itemCode}_${itemColor}`, excelRow);
            }
          });
          const uniqueData = Array.from(uniqueMap.values());

          let insertResult = 0;
          let updateResult = 0;
          let skipCount = 0;

          // 3. Supabase API 1000건 제한 극복을 위한 300개 단위 청크(Chunk) 처리
          const chunkSize = 300;

          for (let i = 0; i < uniqueData.length; i += chunkSize) {
            const chunk = uniqueData.slice(i, i + chunkSize);

            // 현재 청크의 단품코드 리스트만 추출
            const chunkItemCodes = [...new Set(chunk.map(r => clean(r['단품코드'])))];

            // DB에서 해당 단품코드들만 정확히 핀셋 검색
            const { data: existingData, error: fetchError } = await supabase
              .from('products')
              .select('id, item_code, item_color, brand_category, company_division, vendor, production_line')
              .in('item_code', chunkItemCodes);

            if (fetchError) throw fetchError;

            // 검색된 기존 데이터 매핑
            const existingDBMap = new Map();
            existingData.forEach(row => {
              const key = `${row.item_code}_${row.item_color || ''}`.trim();
              existingDBMap.set(key, row);
            });

            const toInsert = [];
            const toUpdate = [];

            chunk.forEach(excelRow => {
              const itemCode = clean(excelRow['단품코드']);
              const itemColor = clean(excelRow['단품컬러']);
              const brand = clean(excelRow['브랜드구분']);
              const companyDiv = clean(excelRow['사별회사구분']);
              const vendor = clean(excelRow['공급업체']);
              const prodLine = clean(excelRow['생산지창고']);

              const key = `${itemCode}_${itemColor}`;
              const existingRow = existingDBMap.get(key);

              if (!existingRow) {
                // DB에 진짜 없는 경우 신규 등록
                toInsert.push({
                  item_code: itemCode, item_color: itemColor, brand_category: brand,
                  company_division: companyDiv, vendor: vendor, production_line: prodLine
                });
              } else {
                // 기존 데이터가 있으면 변경점 체크
                const isBrandChanged = existingRow.brand_category !== brand;
                const isCompanyDivChanged = existingRow.company_division !== companyDiv;
                const isVendorChanged = existingRow.vendor !== vendor;
                const isProdLineChanged = existingRow.production_line !== prodLine;

                if (isBrandChanged || isCompanyDivChanged || isVendorChanged || isProdLineChanged) {
                  toUpdate.push({
                    id: existingRow.id, item_code: itemCode, item_color: itemColor,
                    brand_category: brand, company_division: companyDiv, vendor: vendor, production_line: prodLine
                  });
                } else {
                  skipCount++;
                }
              }
            });

            // 청크 단위로 즉시 DB 꽂아넣기
            if (toInsert.length > 0) {
              const { error } = await supabase.from('products').insert(toInsert);
              if (error) throw error;
              insertResult += toInsert.length;
            }

            if (toUpdate.length > 0) {
              const { error } = await supabase.from('products').upsert(toUpdate, { onConflict: 'id' });
              if (error) throw error;
              updateResult += toUpdate.length;
            }
          }

          setResultStats({ total: rawData.length, inserted: insertResult, updated: updateResult, skipped: skipCount });
          alert(`✅ 마스터 데이터 업데이트 완료!\n신규 등록: ${insertResult}건\n정보 수정: ${updateResult}건`);

        } catch (error) {
          console.error(error);
          alert('업데이트 중 오류 발생: ' + error.message);
        } finally {
          setIsLoading(false);
          e.target.value = '';
        }
      };

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] slide-up flex flex-col gap-5">
          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
            <div className="flex items-center gap-3 mb-6">
              <span className="w-1.5 h-5 bg-green-500 rounded-full"></span>
              <h2 className="font-bold text-gray-800 text-lg">마스터 데이터 수동 업데이트 (임시)</h2>
            </div>

            <p className="text-sm text-gray-600 mb-6 bg-blue-50 p-4 rounded-lg border border-blue-100">
              💡 <strong>안내:</strong> 엑셀 데이터를 업로드하면 기존 DB와 전체 내용을 1:1로 비교합니다.<br />
              코드가 없으면 <strong>신규 등록</strong>, 정보가 다르면 <strong>수정</strong>, 내용이 완전히 같으면 <strong>무시(Skip)</strong> 처리됩니다.<br />
              <span className="inline-block mt-2 font-bold text-letusBlue bg-blue-100/50 px-2 py-1 rounded">
                📥 추출 경로: {"[ERP > 단품정보추출 > 번호/단품코드/단품컬러/브랜드구분/사별회사구분/공급업체/생산지창고]"}
              </span>
            </p>

            <div className="flex items-center gap-4">
              <label className={`cursor-pointer px-6 py-3 rounded-lg font-bold text-sm shadow-sm transition-all flex items-center gap-2 ${isLoading ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-700'}`}>
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                {isLoading ? '데이터 대조 및 반영 중...' : '마스터 엑셀 업로드'}
                <input type="file" accept=".xlsx, .xls" onChange={handleFileUpload} disabled={isLoading} className="hidden" />
              </label>
            </div>

            {resultStats && (
              <div className="mt-8 grid grid-cols-4 gap-4 animate-fade-in-up">
                <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col items-center">
                  <span className="text-slate-500 text-xs font-bold mb-1">총 스캔 데이터</span>
                  <span className="text-2xl font-black text-slate-700">{resultStats.total}</span>
                </div>
                <div className="bg-blue-50 p-4 rounded-lg border border-blue-200 flex flex-col items-center">
                  <span className="text-blue-500 text-xs font-bold mb-1">✨ 신규 등록 (Insert)</span>
                  <span className="text-2xl font-black text-blue-600">{resultStats.inserted}</span>
                </div>
                <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 flex flex-col items-center">
                  <span className="text-orange-500 text-xs font-bold mb-1">🔄 정보 수정 (Update)</span>
                  <span className="text-2xl font-black text-orange-600">{resultStats.updated}</span>
                </div>
                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 flex flex-col items-center opacity-70">
                  <span className="text-gray-500 text-xs font-bold mb-1">⏭️ 변경 없음 (Skip)</span>
                  <span className="text-2xl font-black text-gray-500">{resultStats.skipped}</span>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- 특이사항 리스트 (IssueList) 🌟 화면 고정 & 내부 스크롤 완벽 적용 ---
    const IssueList = ({ issues = [], isLoading = false, onReload, savedFilters, setSavedFilters, userProfile }) => {
      const [activeModalRow, setActiveModalRow] = useState(null);
      const [activeHandleRow, setActiveHandleRow] = useState(null);
      const [selectedIds, setSelectedIds] = useState([]);
      const [isSendingFeedback, setIsSendingFeedback] = useState(false);
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'none' });
      const [draftFilters, setDraftFilters] = useState({ ...savedFilters });

      useEffect(() => { setDraftFilters({ ...savedFilters }); }, [savedFilters]);
      const handleSearch = () => { setSavedFilters({ ...draftFilters }); };

      const MultiSelect = ({ label, options, selected, onChange }) => {
        const [isOpen, setIsOpen] = useState(false);
        const toggleOption = (opt) => {
          if (opt === '전체') {
            onChange('전체');
          } else {
            let currentArr = Array.isArray(selected) ? selected : (selected === '전체' ? [] : [selected]);
            const newSelected = currentArr.includes(opt) ? currentArr.filter(s => s !== opt) : [...currentArr, opt];
            onChange(newSelected.length === 0 ? '전체' : newSelected);
          }
        };

        const currentArr = Array.isArray(selected) ? selected : (selected === '전체' ? [] : [selected]);

        return (
          <div className="flex items-center shrink-0">
            <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">{label}</label>
            <div className="relative">
              <div onClick={() => setIsOpen(!isOpen)} className="border border-gray-200 rounded-[3px] bg-white px-2.5 h-[30px] w-32 flex items-center justify-between cursor-pointer hover:border-letusBlue transition-all text-xs">
                <span className="truncate text-gray-700 font-medium">
                  {currentArr.length === 0 ? '전체' : `${currentArr[0]}${currentArr.length > 1 ? ` 외 ${currentArr.length - 1}` : ''}`}
                </span>
                <svg className={`w-3 h-3 text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </div>
              {isOpen && (
                <>
                  <div className="fixed inset-0 z-40" onClick={() => setIsOpen(false)}></div>
                  <div className="absolute top-[105%] left-0 w-48 bg-white border border-gray-200 rounded shadow-xl z-50 py-1.5 max-h-60 overflow-y-auto custom-scrollbar slide-up">
                    <div onClick={() => { toggleOption('전체'); setIsOpen(false); }} className={`px-3 py-1.5 text-xs cursor-pointer hover:bg-gray-50 flex items-center gap-2 ${currentArr.length === 0 ? 'text-letusBlue font-bold' : 'text-gray-600'}`}>
                      <input type="checkbox" readOnly checked={currentArr.length === 0} className="w-3.5 h-3.5 accent-letusBlue" /> 전체
                    </div>
                    <div className="h-px bg-gray-100 my-1"></div>
                    {options.map(opt => (
                      <div key={opt} onClick={() => toggleOption(opt)} className={`px-3 py-1.5 text-xs cursor-pointer hover:bg-gray-50 flex items-center gap-2 ${currentArr.includes(opt) ? 'text-letusBlue font-bold bg-blue-50/30' : 'text-gray-600'}`}>
                        <input type="checkbox" readOnly checked={currentArr.includes(opt)} className="w-3.5 h-3.5 accent-letusBlue" /> {opt}
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        );
      };

      const filteredIssues = useMemo(() => {
        return issues.filter(issue => {
          const filterBrands = Array.isArray(savedFilters.brand) ? savedFilters.brand : (savedFilters.brand === '전체' ? [] : [savedFilters.brand]);
          const filterStatus = Array.isArray(savedFilters.status) ? savedFilters.status : (savedFilters.status === '전체' ? [] : [savedFilters.status]);
          if (filterBrands.length > 0 && !filterBrands.includes(issue.brand)) return false;
          if (filterStatus.length > 0 && !filterStatus.includes(issue.status)) return false;
          if (issue.created_at) {
            const issueDate = issue.created_at.split('T')[0];
            if (issueDate < savedFilters.startDate || issueDate > savedFilters.endDate) return false;
          }
          if (savedFilters.searchValue) {
            const val = savedFilters.searchValue.toLowerCase();
            if (savedFilters.searchType === '품목코드' && !issue.product_code?.toLowerCase().includes(val)) return false;
            if (savedFilters.searchType === '공급업체' && !(issue.vendor || issue.brand || '').toLowerCase().includes(val)) return false;
            if (savedFilters.searchType === '처리자' && !issue.final_handler?.toLowerCase().includes(val)) return false;
          }
          return true;
        });
      }, [issues, savedFilters]);

      const sortedIssues = useMemo(() => {
        let items = [...filteredIssues];
        if (sortConfig.key && sortConfig.direction !== 'none') {
          items.sort((a, b) => {
            const aVal = a[sortConfig.key] || '';
            const bVal = b[sortConfig.key] || '';
            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return items;
      }, [filteredIssues, sortConfig]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key) {
          if (sortConfig.direction === 'asc') direction = 'desc';
          else if (sortConfig.direction === 'desc') direction = 'none';
        }
        setSortConfig({ key: direction === 'none' ? null : key, direction });
      };

      const handleSendFeedback = async () => { /* 기존 로직과 동일 */
        if (selectedIds.length === 0) return alert('피드백을 전송할 항목을 1개 이상 선택해 주세요.');
        const invalidItems = issues.filter(i => selectedIds.includes(i.id) && i.status !== '조치완료');
        if (invalidItems.length > 0) return alert(`⚠️ 전송 실패\n'조치완료' 상태인 항목만 전송 가능합니다.`);
        if (!window.confirm(`선택하신 ${selectedIds.length}건의 피드백을 전송하시겠습니까?`)) return;
        setIsSendingFeedback(true);
        try {
          const { error } = await supabase.from('logistics_issues').update({ is_notified: true, feedback_sent_at: new Date().toISOString() }).in('id', selectedIds);
          if (error) throw error;
          alert(`✅ ${selectedIds.length}건의 피드백 전송이 완료되었습니다.`);
          setSelectedIds([]);
          await onReload();
        } catch (err) { alert('피드백 전송 중 오류 발생'); } finally { setIsSendingFeedback(false); }
      };

      const handleRevertSelectedIssues = async () => { /* 기존 로직과 동일 */
        if (selectedIds.length === 0) return alert('원복할 항목을 선택해 주세요.');
        if (userProfile?.role === '사용자') return alert('이 작업은 관리자만 수행할 수 있습니다.');
        if (!window.confirm(`선택하신 ${selectedIds.length}건의 이슈를 '조치대기' 상태로 원복하시겠습니까?`)) return;
        try {
          const { error } = await supabase.from('logistics_issues').update({ status: '조치대기', final_handler: '', action_content: '', resolved_at: null, is_notified: false, feedback_sent_at: null }).in('id', selectedIds);
          if (error) throw error;
          alert('초기화되었습니다.');
          setSelectedIds([]);
          await onReload();
        } catch (err) { alert('오류 발생'); }
      };

      const handleSelectAll = (e) => setSelectedIds(e.target.checked ? sortedIssues.map(i => i.id) : []);
      const handleSelectOne = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      const getSortIcon = (key) => {
        if (sortConfig.key !== key) return null;
        if (sortConfig.direction === 'asc') return <span className="ml-1 text-letusBlue font-black">↑</span>;
        if (sortConfig.direction === 'desc') return <span className="ml-1 text-letusBlue font-black">↓</span>;
        return null;
      };

      const handleExportExcel = () => {
        if (sortedIssues.length === 0) return alert('데이터가 없습니다.');

        // 엑셀 시트에 들어갈 JSON 데이터 배열 생성
        const excelData = sortedIssues.map(row => ({
          '접수번호': row.reception_no || '',
          '소속 브랜드': row.brand || '',
          '품목코드': row.product_code || '',
          '유형': row.issue_type || '',
          '접수자': row.reporter || '',
          '공급업체': row.vendor || '',
          '처리상태': row.status || '',
          '요청내용': row.request_content || '',
          '처리내용': row.action_content || '',
          '최종 처리자': row.final_handler || '',
          '최종 처리일시': formatDateTime(row.resolved_at) || ''
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        ws['!cols'] = [{ wch: 18 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, { wch: 10 }, { wch: 15 }, { wch: 10 }, { wch: 40 }, { wch: 40 }, { wch: 12 }, { wch: 20 }];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "특이사항_LIST");
        XLSX.writeFile(wb, `특이사항_LIST_${new Date().toISOString().split('T')[0]}.xlsx`);
      };

      return (
        // 🔥 포인트 1: min-h-[] 대신 h-[]를 사용하여 브라우저 창 크기로 컴포넌트 높이를 강력하게 고정!
        <div className="p-6 bg-slate-100 h-[calc(100vh-64px)] flex flex-col gap-4 slide-up">

          <div className="w-full bg-white rounded-lg shadow-sm border border-slate-200 px-6 h-[54px] flex items-center z-30 shrink-0">
            <div className="flex items-center gap-6 w-full">
              <MultiSelect label="브랜드" options={['퍼시스', '일룸', '슬로우베드', '데스커', '시디즈', '알로소']} selected={draftFilters.brand} onChange={(val) => setDraftFilters({ ...draftFilters, brand: val })} />
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">등록일자</label>
                <div className="flex items-center">
                  <input type="date" value={draftFilters.startDate} onChange={e => setDraftFilters({ ...draftFilters, startDate: e.target.value })} className="border border-gray-200 rounded-[3px] text-xs px-2 h-[30px] w-[110px] focus:outline-none focus:border-letusBlue" />
                  <span className="mx-1 text-gray-400 text-xs">~</span>
                  <input type="date" value={draftFilters.endDate} onChange={e => setDraftFilters({ ...draftFilters, endDate: e.target.value })} className="border border-gray-200 rounded-[3px] text-xs px-2 h-[30px] w-[110px] focus:outline-none focus:border-letusBlue" />
                </div>
              </div>
              <MultiSelect label="처리상태" options={['조치대기', '처리 중', '조치완료']} selected={draftFilters.status} onChange={(val) => setDraftFilters({ ...draftFilters, status: val })} />
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">검색어</label>
                <div className="flex gap-0.5 h-[30px]">
                  <select value={draftFilters.searchType} onChange={e => setDraftFilters({ ...draftFilters, searchType: e.target.value })} className="border border-gray-200 rounded-l-[3px] text-xs px-2 text-gray-700 bg-gray-50 focus:outline-none">
                    <option>품목코드</option><option>공급업체</option><option>처리자</option>
                  </select>
                  <input type="text" value={draftFilters.searchValue} onChange={e => setDraftFilters({ ...draftFilters, searchValue: e.target.value })} onKeyDown={e => e.key === 'Enter' && handleSearch()} className="border border-gray-200 rounded-r-[3px] text-xs px-2.5 w-32 focus:outline-none focus:border-letusOrange" placeholder="검색어 입력" />
                </div>
              </div>
              <div className="ml-auto flex items-center gap-2">
                <button onClick={() => { const todayStr = new Date().toISOString().split('T')[0]; setDraftFilters({ brand: '전체', status: '전체', startDate: todayStr, endDate: todayStr, searchType: '품목코드', searchValue: '' }); setSavedFilters({ brand: '전체', status: '전체', startDate: todayStr, endDate: todayStr, searchType: '품목코드', searchValue: '' }); }} className="border border-gray-300 text-gray-500 hover:bg-gray-50 font-bold px-4 h-[30px] rounded-[3px] text-xs transition-colors">초기화</button>
                <button onClick={handleSearch} className="bg-letusOrange text-white hover:bg-orange-500 font-bold px-6 h-[30px] rounded-[3px] text-xs shadow-sm transition-all flex items-center gap-1.5">
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> 조회하기
                </button>
              </div>
            </div>
          </div>

          <div className="flex justify-end gap-3 z-30 px-2 -mb-2 shrink-0">
            <div className="relative group">
              <button className="flex items-center text-xs font-bold text-slate-700 bg-white border border-slate-300 rounded px-3 py-1.5 hover:bg-slate-50 min-w-[100px] justify-between shadow-sm transition-all">
                <span>선택실행</span><svg className="w-3.5 h-3.5 ml-2 text-slate-400 group-hover:rotate-180 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </button>
              <div className="absolute right-0 top-[110%] w-[130px] hidden group-hover:block z-50">
                <div className="bg-white border border-slate-200 rounded-md shadow-xl p-1.5 flex flex-col gap-0.5">
                  <button onClick={handleExportExcel} className="w-full text-left px-2.5 py-2 text-green-700 hover:text-green-800 hover:bg-green-50 font-bold rounded text-[11px] flex items-center justify-between transition-colors">엑셀 추출 <svg className="w-3.5 h-3.5 opacity-70" fill="currentColor" viewBox="0 0 24 24"><path d="M21.17 3.25q.33 0 .59.25q.24.26.24.59v15.82q0 .33-.24.59q-.26.25-.59.25H2.83q-.33 0-.59-.25q-.24-.26-.24-.59V4.09q0-.33.24-.59q.26-.25.59-.25h18.34zm-8.25 10.9l3.52 4.67h2.7l-4.9-6.07 4.65-5.94h-2.65l-3.23 4.48-3.32-4.48H7.07l4.76 5.94-5 6.07h2.72l3.37-4.67z" /></svg></button>
                  <div className="h-px bg-slate-100 my-0.5"></div>
                  <button onClick={handleRevertSelectedIssues} className="w-full text-left px-2.5 py-2 text-slate-600 hover:text-orange-600 hover:bg-orange-50 font-bold rounded text-[11px] transition-colors">원복</button>
                  <button onClick={handleSendFeedback} disabled={isSendingFeedback} className={`w-full text-left px-2.5 py-2 font-bold rounded text-[11px] transition-colors ${isSendingFeedback ? 'text-gray-400 cursor-not-allowed bg-gray-50' : 'text-slate-600 hover:text-letusBlue hover:bg-blue-50'}`}>{isSendingFeedback ? '전송 중...' : '피드백 전송'}</button>
                </div>
              </div>
            </div>
          </div>

          {/* 🔥 포인트 2: min-h-0 속성 추가! 남은 공간만 꽉 채우고 표가 부모를 뚫고 나가지 못하게 막습니다. */}
          <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex-1 flex flex-col min-h-0 relative z-20">
            {/* 🔥 포인트 3: h-[600px] 제거! 부모 컨테이너에 맞춰서 자동으로 스크롤바가 생깁니다. */}
            <div className="overflow-auto flex-1 custom-scrollbar">
              <table className="w-full text-left whitespace-nowrap table-fixed min-w-[1480px]">
                {/* 헤더는 sticky top-0으로 고정 */}
                <thead className="bg-gray-50/90 backdrop-blur-sm border-b border-gray-200 text-xs text-gray-500 font-bold sticky top-0 z-10">
                  <tr>
                    <th className="p-4 w-[60px] text-center"><input type="checkbox" checked={sortedIssues.length > 0 && selectedIds.length === sortedIssues.length} onChange={handleSelectAll} className="w-4 h-4 cursor-pointer" /></th>
                    {[{ label: '접수번호', key: 'reception_no', w: '200px' }, { label: '소속 브랜드', key: 'brand', w: '100px' }, { label: '품목코드', key: 'product_code', w: 'auto' }, { label: '유형', key: 'issue_type', w: '160px' }, { label: '접수자', key: 'reporter', w: '90px' }, { label: '공급업체', key: 'vendor', w: '120px' }, { label: '처리상태', key: 'status', w: '100px' }, { label: '알림톡', key: 'is_notified', w: '80px' }, { label: '요청내용', key: null, w: '110px' }, { label: '처리 내용', key: null, w: '110px' }, { label: '최종 처리자', key: 'final_handler', w: '120px' }, { label: '최종 처리일시', key: 'resolved_at', w: '150px' }].map((col, idx) => (
                      <th key={idx} className={`p-4 text-center select-none ${col.key ? 'cursor-pointer hover:bg-gray-100 transition-colors' : ''}`} style={{ width: col.w }} onClick={() => col.key && requestSort(col.key)}>
                        <div className="flex items-center justify-center">{col.label} {col.key && getSortIcon(col.key)}</div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100 text-[13px]">
                  {/* 🔥 로딩 중일 때 colSpan="13"으로 전체 너비 차지 & 정중앙 정렬! */}
                  {isLoading ? (
                    <tr>
                      <td colSpan="13" className="py-32 text-center align-middle">
                        <div className="flex flex-col items-center justify-center gap-3">
                          <div className="w-8 h-8 border-4 border-blue-100 border-t-letusBlue rounded-full animate-spin"></div>
                          <p className="text-gray-500 font-bold text-[13px]">데이터를 불러오는 중입니다...</p>
                        </div>
                      </td>
                    </tr>
                  ) : sortedIssues.length === 0 ? (
                    <tr><td colSpan="13" className="p-20 text-center text-gray-400 font-bold">조회 결과가 없습니다.</td></tr>
                  ) : sortedIssues.map((row) => (
                    <tr key={row.id} className={`hover:bg-blue-50/30 transition-colors cursor-pointer ${selectedIds.includes(row.id) ? 'bg-blue-50/50' : ''}`} onClick={() => handleSelectOne(row.id)}>
                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(row.id)} onChange={() => handleSelectOne(row.id)} className="w-4 h-4 cursor-pointer" /></td>
                      <td className="p-4 pl-6 font-bold text-gray-800">{row.reception_no}</td>
                      <td className="p-4 font-semibold text-gray-700">{row.brand}</td>
                      <td className="p-4 text-gray-600 truncate max-w-[200px]" title={row.product_code}>{row.product_code}</td>
                      <td className="p-4"><CategoryBadge category={row.issue_type} /></td>
                      <td className="p-4 text-gray-600">{row.reporter || '물류담당자'}</td>
                      <td className="p-4 text-gray-700 font-semibold">{row.vendor || '-'}</td>
                      <td className="p-4 text-center"><StatusBadge status={row.status} category={row.issue_type} /></td>
                      <td className="p-4 text-center">{row.is_notified ? (<div className="flex justify-center"><span className="flex items-center justify-center w-5 h-5 bg-blue-100 text-blue-600 border border-blue-200 rounded-full shadow-sm" title={`전송완료: ${formatDateTime(row.feedback_sent_at)}`}><svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={4}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg></span></div>) : <span className="text-gray-300 font-bold">-</span>}</td>
                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}><button onClick={() => setActiveModalRow(row)} className={`text-xs font-bold border px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${row.status === '조치대기' ? 'bg-gray-50 text-gray-500' : 'bg-white text-letusBlue border-blue-200 hover:bg-blue-50'}`}>{row.status === '조치대기' ? '요청등록' : '요청확인'}</button></td>
                      <td className="p-4 text-center" onClick={e => e.stopPropagation()}>{['처리 중', '조치완료'].includes(row.status) ? (<button onClick={() => setActiveHandleRow(row)} className={`text-xs font-bold border px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${row.status === '조치완료' ? 'bg-white text-green-600 border-green-200 hover:bg-green-50' : 'bg-yellow-50 text-yellow-600 border-yellow-300 hover:bg-yellow-100'}`}>{row.status === '조치완료' ? '조치 확인' : '조치 등록'}</button>) : <span className="text-gray-300">-</span>}</td>
                      <td className="p-4 text-gray-600 font-medium">{row.final_handler || '-'}</td>
                      <td className="p-4 text-gray-500 font-mono text-xs">{formatDateTime(row.resolved_at)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          {activeModalRow && <RequestModal row={activeModalRow} onClose={() => setActiveModalRow(null)} onReload={onReload} userProfile={userProfile} />}
          {activeHandleRow && <HandleModal row={activeHandleRow} onClose={() => setActiveHandleRow(null)} onReload={onReload} userProfile={userProfile} />}
        </div>
      );
    };

    // --- 📊 물류사고분석 전용 모달 (귀책 부서 강제 고정 로직 적용) ---
    const AccidentModal = ({ row, onClose, onReload, userProfile }) => {
      const initialCause = row.cause_detail || '';
      const match = initialCause.match(/^\[(.*?)\]\s*(.*)$/);
      const initType = match ? match[1] : '';
      const initDetail = match ? match[2] : initialCause;

      // 🔥 권한 체크 (사용자인지 여부 확인)
      const isUser = userProfile?.role !== '관리자';

      const [causeType, setCauseType] = useState(initType);
      const [causeDetail, setCauseDetail] = useState(initDetail);

      // 🔥 사용자인 경우 본인의 소속팀(team)으로 초기값 강제 고정!
      const [dept, setDept] = useState(row.responsible_dept || (isUser ? userProfile?.team : ''));

      const [actionResult, setActionResult] = useState(row.action_result || '미확인');
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async () => {
        if (!causeType) return alert('발생 원인을 선택해 주세요.');
        if (!dept) return alert('귀책 부서를 선택해 주세요.');

        setIsSaving(true);
        try {
          const finalCauseStr = causeDetail ? `[${causeType}] ${causeDetail}` : `[${causeType}]`;

          const { error } = await supabase
            .from('logistics_accidents')
            .update({
              responsible_dept: dept,
              cause_detail: finalCauseStr,
              action_result: actionResult,
              status: '등록 완료',
              handler_name: userProfile?.name || '관리자',
              updated_at: new Date().toISOString()
            })
            .eq('id', row.id);

          if (error) throw error;
          alert('사고 원인이 성공적으로 등록되었습니다.');
          onReload();
          onClose();
        } catch (err) {
          alert('저장 중 오류 발생');
        } finally {
          setIsSaving(false);
        }
      };

      const formatModalTime = (dateStr) => {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-lg slide-up overflow-hidden border border-gray-100 flex flex-col">
            <div className="p-4 border-b bg-gray-50 flex justify-between items-center shrink-0">
              <h3 className="font-bold text-gray-900 flex items-center gap-2">
                <span className="w-1.5 h-3.5 bg-letusOrange rounded-full"></span>
                사고 상세 정보 및 원인 등록
              </h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1"><CloseIcon /></button>
            </div>

            <div className="p-6 space-y-5 overflow-y-auto max-h-[80vh] custom-scrollbar">
              <div className="bg-slate-50 rounded-lg p-4 border border-slate-200">
                <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-wider mb-3">기본 정보 (Read-Only)</h4>
                <div className="grid grid-cols-2 gap-y-3 gap-x-6 text-[13px]">
                  <div className="flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500">수주번호</span>
                    <span className="font-bold text-gray-800">{row.order_no}</span>
                  </div>
                  <div className="flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500">브랜드</span>
                    <span className="font-bold text-gray-800">{row.brand}</span>
                  </div>
                  <div className="col-span-2 flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500 shrink-0">수주건명</span>
                    <span className="font-bold text-gray-800 text-right break-all ml-4">{row.order_name || '-'}</span>
                  </div>
                  <div className="flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500">ZONE</span>
                    <span className="font-bold text-letusBlue">{row.zone || '-'}</span>
                  </div>
                  <div className="flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500">작업자</span>
                    <span className="font-bold text-gray-800">{row.worker_name || '-'}</span>
                  </div>
                  <div className="flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500">주/야</span>
                    <span className="font-bold text-gray-800">{row.shift_type || '-'}</span>
                  </div>
                  <div className="flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500">이슈수량</span>
                    <span className="font-bold text-red-500">{row.issue_qty}개</span>
                  </div>
                  <div className="col-span-2 flex justify-between border-b border-slate-100 pb-1">
                    <span className="text-gray-500 shrink-0">품목코드</span>
                    <span className="font-medium text-gray-700 text-right break-all ml-4">{row.item_code}</span>
                  </div>
                </div>
              </div>

              <div className="space-y-4 pt-2">
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5">
                      <span className="text-letusOrange">*</span> 발생 원인 선택
                    </label>
                    <select value={causeType} onChange={e => setCauseType(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm font-medium outline-none focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue transition-all cursor-pointer bg-white">
                      <option value="">원인을 선택해 주세요</option>
                      <option value="작업자 귀책">작업자 귀책</option>
                      <option value="시공팀 귀책">시공팀 귀책</option>
                      <option value="전산/시스템 오류">전산/시스템 오류</option>
                      <option value="서류/정보 불일치">서류/정보 불일치</option>
                      <option value="재고/수량 이슈">재고/수량 이슈</option>
                      <option value="프로세스 미준수">프로세스 미준수</option>
                      <option value="기타">기타</option>
                    </select>
                  </div>

                  {/* 🔥 사용자 계정일 경우, 드롭다운이 막히고 소속팀으로 고정됩니다 */}
                  <div>
                    <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5">
                      <span className="text-letusOrange">*</span> 귀책 부서 선택 {isUser && <span className="text-gray-400 font-normal ml-1">(소속팀 고정)</span>}
                    </label>
                    <select
                      value={dept}
                      onChange={e => setDept(e.target.value)}
                      disabled={isUser}
                      className={`w-full border rounded-lg p-2.5 text-sm font-bold outline-none transition-all ${isUser ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'border-gray-300 focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue cursor-pointer bg-white'}`}
                    >
                      <option value="">부서를 선택해 주세요</option>

                      {/* 사용자의 소속팀이 기본 목록에 없어도 드롭다운에 표시되도록 방어코드 추가 */}
                      {isUser && dept && !['물류사업1팀', '물류사업2팀', '운송사업팀', '컨택센터', '라스트마일1팀', '라스트마일2팀', '기타'].includes(dept) && (
                        <option value={dept}>{dept}</option>
                      )}

                      <option value="물류사업1팀">물류사업1팀</option>
                      <option value="물류사업2팀">물류사업2팀</option>
                      <option value="운송사업팀">운송사업팀</option>
                      <option value="컨택센터">컨택센터</option>
                      <option value="라스트마일1팀">라스트마일1팀</option>
                      <option value="라스트마일2팀">라스트마일2팀</option>
                      <option value="기타">기타</option>
                    </select>
                  </div>
                </div>

                {userProfile?.role === '관리자' && (
                  <div>
                    <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5">
                      <span className="text-letusOrange">*</span> 조치 결과 반영
                    </label>
                    <select
                      value={actionResult}
                      onChange={e => setActionResult(e.target.value)}
                      className="w-full border border-blue-300 rounded-lg p-2.5 text-sm font-bold outline-none transition-all focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue cursor-pointer bg-blue-50/30 text-letusBlue"
                    >
                      <option value="미확인">미확인 (빈칸)</option>
                      <option value="정상출고">정상출고</option>
                      <option value="미출고">미출고</option>
                      <option value="오출고">오출고</option>
                      <option value="과출고">과출고</option>
                      <option value="물류파손">물류파손</option>
                      <option value="시공파손">시공파손</option>
                      <option value="현장직출">현장직출</option>
                      <option value="센터직출">센터직출</option>
                      <option value="납기연기(건)">납기연기(건)</option>
                      <option value="납기연기(품목)">납기연기(품목)</option>
                      <option value="제품분실">제품분실</option>
                    </select>
                    {actionResult === '미확인' && <p className="text-[10px] text-red-500 mt-1 font-bold">⚠️ 현재 엑셀에 조치결과가 누락되어 '미확인' 상태입니다.</p>}
                  </div>
                )}

                <div>
                  <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5">
                    발생 원인 상세
                  </label>
                  <textarea
                    value={causeDetail}
                    onChange={e => setCauseDetail(e.target.value)}
                    rows={3}
                    className="w-full border border-gray-300 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue resize-none transition-all placeholder:text-gray-300"
                    placeholder="사고 발생의 구체적인 원인과 내용을 자유롭게 입력해 주세요."
                  ></textarea>

                  {row.handler_name && (
                    <div className="text-right text-[11px] text-gray-400 font-bold mt-1.5 pr-1 tracking-wide">
                      {formatModalTime(row.updated_at || row.created_at)} / {row.handler_name}
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="p-4 border-t bg-gray-50 flex justify-end gap-2 shrink-0">
              <button onClick={onClose} className="px-5 py-2 text-sm font-bold text-gray-500 bg-white border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors shadow-sm">취소</button>
              <button onClick={handleSave} disabled={isSaving} className={`px-6 py-2 bg-letusBlue text-white text-sm font-bold rounded-lg shadow hover:bg-blue-600 transition-all flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                {isSaving ? '저장 중...' : '확인 및 등록'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 📊 사고분석 리스트 전용: 다중 선택 일괄 수정 모달 ---
    const AccidentBulkEditModal = ({ selectedIds, onClose, onReload, userProfile }) => {
      const isUser = userProfile?.role !== '관리자';

      const [causeType, setCauseType] = useState('');
      const [causeDetail, setCauseDetail] = useState('');
      const [dept, setDept] = useState(isUser ? userProfile?.team : '');
      const [actionResult, setActionResult] = useState('미확인');
      const [isSaving, setIsSaving] = useState(false);

      const handleSave = async () => {
        if (!causeType) return alert('발생 원인을 선택해 주세요.');
        if (!dept) return alert('귀책 부서를 선택해 주세요.');

        if (!window.confirm(`선택하신 ${selectedIds.length}건의 사고 데이터를 일괄 수정하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;

        setIsSaving(true);
        try {
          const finalCauseStr = causeDetail ? `[${causeType}] ${causeDetail}` : `[${causeType}]`;

          const { error } = await supabase
            .from('logistics_accidents')
            .update({
              responsible_dept: dept,
              cause_detail: finalCauseStr,
              action_result: actionResult !== '미확인' ? actionResult : undefined,
              status: '등록 완료',
              handler_name: userProfile?.name || '관리자',
              updated_at: new Date().toISOString()
            })
            .in('id', selectedIds);

          if (error) throw error;

          alert(`🎉 총 ${selectedIds.length}건의 데이터가 일괄 마감 처리되었습니다.`);
          onReload();
          onClose();
        } catch (err) {
          alert('일괄 저장 중 오류 발생: ' + err.message);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-lg slide-up overflow-hidden border border-gray-100 flex flex-col">
            <div className="p-4 border-b bg-gray-50 flex justify-between items-center shrink-0">
              <h3 className="font-bold text-gray-900 flex items-center gap-2">
                <span className="w-1.5 h-3.5 bg-letusOrange rounded-full"></span>
                선택 항목 일괄 마감 처리
              </h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1"><CloseIcon /></button>
            </div>

            <div className="p-6 space-y-5 overflow-y-auto max-h-[80vh] custom-scrollbar">
              <div className="bg-blue-50 border border-blue-100 rounded-lg p-3 text-sm font-bold text-letusBlue text-center">
                현재 <span className="text-lg mx-1">{selectedIds.length}</span>건의 데이터가 선택되었습니다.
              </div>

              <div className="space-y-4 pt-2">
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5"><span className="text-letusOrange">*</span> 발생 원인 일괄 적용</label>
                    <select value={causeType} onChange={e => setCauseType(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm font-medium outline-none focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue transition-all cursor-pointer bg-white">
                      <option value="">원인을 선택해 주세요</option>
                      <option value="작업자 귀책">작업자 귀책</option><option value="시공팀 귀책">시공팀 귀책</option><option value="전산/시스템 오류">전산/시스템 오류</option><option value="서류/정보 불일치">서류/정보 불일치</option><option value="재고/수량 이슈">재고/수량 이슈</option><option value="프로세스 미준수">프로세스 미준수</option><option value="기타">기타</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5"><span className="text-letusOrange">*</span> 귀책 부서 일괄 적용</label>
                    <select value={dept} onChange={e => setDept(e.target.value)} disabled={isUser} className={`w-full border rounded-lg p-2.5 text-sm font-bold outline-none transition-all ${isUser ? 'bg-gray-100 text-gray-500 cursor-not-allowed border-gray-200' : 'border-gray-300 focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue cursor-pointer bg-white'}`}>
                      <option value="">부서를 선택해 주세요</option>
                      {isUser && dept && !['물류사업1팀', '물류사업2팀', '운송사업팀', '컨택센터', '라스트마일1팀', '라스트마일2팀', '기타'].includes(dept) && (<option value={dept}>{dept}</option>)}
                      <option value="물류사업1팀">물류사업1팀</option><option value="물류사업2팀">물류사업2팀</option><option value="운송사업팀">운송사업팀</option><option value="컨택센터">컨택센터</option><option value="라스트마일1팀">라스트마일1팀</option><option value="라스트마일2팀">라스트마일2팀</option><option value="기타">기타</option>
                    </select>
                  </div>
                </div>

                {userProfile?.role === '관리자' && (
                  <div>
                    <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5">조치 결과 일괄 변경 (선택사항)</label>
                    <select value={actionResult} onChange={e => setActionResult(e.target.value)} className="w-full border border-blue-300 rounded-lg p-2.5 text-sm font-bold outline-none transition-all focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue cursor-pointer bg-blue-50/30 text-letusBlue">
                      <option value="미확인">변경 안 함 (기존 값 유지)</option>
                      <option value="정상출고">정상출고</option><option value="미출고">미출고</option><option value="오출고">오출고</option><option value="과출고">과출고</option><option value="물류파손">물류파손</option><option value="시공파손">시공파손</option><option value="현장직출">현장직출</option><option value="센터직출">센터직출</option><option value="납기연기(건)">납기연기(건)</option><option value="납기연기(품목)">납기연기(품목)</option><option value="제품분실">제품분실</option>
                    </select>
                  </div>
                )}

                <div>
                  <label className="block text-[12px] font-bold text-gray-700 mb-2 flex items-center gap-1.5">발생 원인 상세 일괄 기입</label>
                  <textarea value={causeDetail} onChange={e => setCauseDetail(e.target.value)} rows={3} className="w-full border border-gray-300 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-letusBlue/20 focus:border-letusBlue resize-none transition-all placeholder:text-gray-300" placeholder="예: 시공팀 오등록 확인, 일괄 마감 처리건"></textarea>
                </div>
              </div>
            </div>

            <div className="p-4 border-t bg-gray-50 flex justify-end gap-2 shrink-0">
              <button onClick={onClose} className="px-5 py-2 text-sm font-bold text-gray-500 bg-white border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors shadow-sm">취소</button>
              <button onClick={handleSave} disabled={isSaving} className={`px-6 py-2 bg-letusBlue text-white text-sm font-bold rounded-lg shadow hover:bg-blue-600 transition-all flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                {isSaving ? '일괄 적용 중...' : '확인 및 일괄 적용'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 📊 사고분석 대시보드 (AccidentDashboard) ---
    const AccidentDashboard = ({ userProfile, onDrillDown }) => {
      const [accidents, setAccidents] = useState([]);
      const [isLoading, setIsLoading] = useState(true);

      // 🔥 1. 특이사항 대시보드와 완벽하게 동일한 날짜 상태 관리
      const [filterType, setFilterType] = useState('M'); // 기본값 월간

      const [selectedBrands, setSelectedBrands] = useState([]);
      const toggleBrand = (brand) => {
        setSelectedBrands(prev => prev.includes(brand) ? prev.filter(b => b !== brand) : [...prev, brand]);
      };

      const getTodayStr = () => {
        const d = new Date();
        const pad = n => n.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };

      const [customDate, setCustomDate] = useState({ start: getTodayStr(), end: getTodayStr() });

      const getFilterDates = () => {
        const now = new Date();
        const pad = n => n.toString().padStart(2, '0');
        const format = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

        if (filterType === 'D') {
          const today = format(now);
          return { startDate: today, endDate: today, label: '당일 현황' };
        }
        else if (filterType === 'W') {
          const day = now.getDay();
          const diffToMonday = now.getDate() - day + (day === 0 ? -6 : 1);
          const monday = new Date(now);
          monday.setDate(diffToMonday);
          const sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);
          return { startDate: format(monday), endDate: format(sunday), label: '이번 주 현황' };
        }
        else if (filterType === 'M') {
          const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
          const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
          return { startDate: format(firstDay), endDate: format(lastDay), label: '이번 달 현황' };
        }
        else {
          return { startDate: customDate.start, endDate: customDate.end, label: '사용자 지정 기간' };
        }
      };

      const { startDate, endDate, label } = getFilterDates();

      const fetchDashboardData = async () => {
        setIsLoading(true);
        try {
          const { data, error } = await supabase
            .from('logistics_accidents')
            .select('*')
            .gte('service_date', startDate)
            .lte('service_date', endDate);

          if (error) throw error;
          setAccidents(data || []);
        } catch (err) {
          console.error(err);
        } finally {
          setIsLoading(false);
        }
      };

      // startDate나 endDate가 바뀔 때마다 자동으로 갱신
      useEffect(() => { fetchDashboardData(); }, [startDate, endDate]);

      // --- 📈 사고 추이 꺾은선 그래프용 전용 상태 및 데이터 페치 ---
      const [trendType, setTrendType] = useState('daily'); // 'daily' | 'monthly'
      const [trendAccidents, setTrendAccidents] = useState([]);
      const [isTrendLoading, setIsTrendLoading] = useState(false);

      const fetchTrendData = async () => {
        setIsTrendLoading(true);
        try {
          // endDate("YYYY-MM-DD") 파싱 시 UTC 오차 방지를 위해 직접 분해
          const [eYear, eMonth, eDay] = endDate.split('-').map(Number);

          let tStart, tEnd;
          const pad = n => n.toString().padStart(2, '0');
          const format = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

          if (trendType === 'daily') {
            const firstDay = new Date(eYear, eMonth - 1, 1);
            const lastDay = new Date(eYear, eMonth, 0);
            tStart = format(firstDay);
            tEnd = format(lastDay);
          } else {
            const firstDay = new Date(eYear, 0, 1);
            const lastDay = new Date(eYear, 11, 31);
            tStart = format(firstDay);
            tEnd = format(lastDay);
          }

          const { data, error } = await supabase
            .from('logistics_accidents')
            .select('service_date, brand')
            .gte('service_date', tStart)
            .lte('service_date', tEnd);

          if (error) throw error;
          setTrendAccidents(data || []);
        } catch (err) {
          console.error(err);
        } finally {
          setIsTrendLoading(false);
        }
      };

      useEffect(() => { fetchTrendData(); }, [endDate, trendType]);

      // 📊 필터 적용 사고 (요약 통계 및 하단 차트용)
      const filteredAccidents = selectedBrands.length > 0
        ? accidents.filter(a => {
          let b = a.brand || '기타';
          if (!['퍼시스', '일룸', '슬로우베드', '데스커', '시디즈', '알로소'].includes(b)) b = '기타';
          return selectedBrands.includes(b);
        })
        : accidents;

      // 📊 요약 데이터 계산
      const totalCount = filteredAccidents.length;
      const pendingCount = filteredAccidents.filter(a => a.status === '원인 파악 중').length;
      const completedCount = filteredAccidents.filter(a => a.status === '등록 완료').length;
      const delayedCount = filteredAccidents.filter(a => a.is_delayed && a.is_delayed !== '-').length;

      // 📊 귀책 부서별 통계
      const deptStats = filteredAccidents.reduce((acc, curr) => {
        if (curr.status === '등록 완료') {
          const dept = curr.responsible_dept || '미배정';
          acc[dept] = (acc[dept] || 0) + 1;
        }
        return acc;
      }, {});
      const deptData = Object.keys(deptStats).map(name => ({ name, value: deptStats[name] })).sort((a, b) => b.value - a.value).slice(0, 5);

      // 📊 조치결과별 통계 (파이 차트용)
      const resultStats = filteredAccidents.reduce((acc, curr) => {
        const res = curr.action_result || '기타';
        acc[res] = (acc[res] || 0) + 1;
        return acc;
      }, {});
      const resultData = Object.keys(resultStats).map(name => ({ name, value: resultStats[name] })).sort((a, b) => b.value - a.value);

      // 📊 브랜드별 통계 (하단 차트 표시용)
      const brandStats = filteredAccidents.reduce((acc, curr) => {
        const brand = curr.brand || '알수없음';
        acc[brand] = (acc[brand] || 0) + 1;
        return acc;
      }, {});
      const brandData = Object.keys(brandStats).map(name => ({ name, value: brandStats[name] })).sort((a, b) => b.value - a.value).slice(0, 5);

      // 📊 신규: 브랜드별 상태 상세 통계
      const displayBrands = ['퍼시스', '일룸', '슬로우베드', '데스커', '시디즈', '알로소', '기타'];
      const brandStatsDetails = {};
      displayBrands.forEach(b => brandStatsDetails[b] = { pending: 0, completed: 0, delayed: 0 });

      accidents.forEach(acc => {
        let b = acc.brand || '기타';
        if (!displayBrands.includes(b)) b = '기타';

        if (acc.status === '원인 파악 중') brandStatsDetails[b].pending += 1;
        else if (acc.status === '등록 완료') brandStatsDetails[b].completed += 1;

        if (acc.is_delayed && acc.is_delayed !== '-') brandStatsDetails[b].delayed += 1;
      });

      // 📈 추이 그래프 데이터 매핑 로직
      const trendDataMapped = useMemo(() => {
        if (!trendAccidents.length && !isTrendLoading) return { data: [], brands: [] };
        const targetBrands = selectedBrands.length > 0 ? selectedBrands : displayBrands.filter(b => b !== '기타' && b !== '알로소'); // 너무 많으면 복잡하므로 5개로 제한

        // endDate 파싱 시 UTC 오차 방지를 위해 예외 처리
        const [eYear, eMonth] = endDate.split('-').map(Number);
        const dataList = [];

        if (trendType === 'daily') {
          const lastDate = new Date(eYear, eMonth, 0).getDate(); // 해당 월의 말일 산출
          for (let i = 1; i <= lastDate; i++) {
            const dayStr = i.toString().padStart(2, '0');
            const dateStr = `${eYear}-${eMonth.toString().padStart(2, '0')}-${dayStr}`;
            const dayData = { name: `${i}일` };
            targetBrands.forEach(b => dayData[b] = 0);

            trendAccidents.forEach(acc => {
              let b = acc.brand || '기타';
              if (!displayBrands.includes(b)) b = '기타';
              // 데이터 내의 날짜시간 포맷을 더 강건하게 처리하기 위해 startsWith 사용
              if (acc.service_date && String(acc.service_date).startsWith(dateStr) && targetBrands.includes(b)) {
                dayData[b] += 1;
              }
            });
            dataList.push(dayData);
          }
        } else {
          for (let i = 1; i <= 12; i++) {
            const monthStr = i.toString().padStart(2, '0');
            const prefix = `${eYear}-${monthStr}`;
            const monthData = { name: `${i}월` };
            targetBrands.forEach(b => monthData[b] = 0);

            trendAccidents.forEach(acc => {
              let b = acc.brand || '기타';
              if (!displayBrands.includes(b)) b = '기타';
              // 월 비교 시 2026-04 와 같이 매칭
              if (acc.service_date && String(acc.service_date).startsWith(prefix) && targetBrands.includes(b)) {
                monthData[b] += 1;
              }
            });
            dataList.push(monthData);
          }
        }
        return { data: dataList, brands: targetBrands };
      }, [trendAccidents, selectedBrands, trendType, endDate, isTrendLoading]);

      const PIE_COLORS = ['#3b82f6', '#f97316', '#10b981', '#ef4444', '#8b5cf6', '#f59e0b'];
      const TREND_COLORS = { '퍼시스': '#f97316', '일룸': '#ef4444', '시디즈': '#3b82f6', '데스커': '#10b981', '슬로우베드': '#8b5cf6', '알로소': '#f59e0b', '기타': '#94a3b8' };

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] slide-up flex flex-col gap-5">

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 shrink-0 z-10 hover:shadow-md transition-shadow">
            <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-6 gap-4">
              <div>
                <h2 className="text-lg font-bold text-gray-900 font-sans flex items-center gap-2">
                  브랜드별 사고 처리 현황
                  <span className="bg-blue-50 text-letusBlue text-[10px] px-2 py-0.5 rounded border border-blue-100 font-black">{label}</span>
                </h2>
                <p className="text-xs text-gray-400 font-medium mt-1.5">조회 기간: {startDate} ~ {endDate}</p>
              </div>

              <div className="flex items-center gap-2">
