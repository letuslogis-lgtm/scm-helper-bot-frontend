              title="내 정보 수정"
            >
              {userProfile ? userProfile.name : '기다리는 중...'}
              <svg className="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
            </p>
            <p className="text-xs text-gray-500">
              {userProfile ? (
                <>
                  {userProfile.brands || 'LETUS'}
                  {' • '}
                  {userProfile.role || '사용자'}
                </>
              ) : 'LETUS'}
            </p>
          </div>
          <button
            onClick={onLogout}
            className="ml-4 pl-4 border-l border-gray-200 text-xs font-bold text-slate-400 hover:text-red-500 transition-colors"
          >
            로그아웃
          </button>
        </div>
      </header>
    );

    const Dashboard = ({ onNavigateToList, onDrillDown, issues = [], isLoading = false, onReload }) => {
      const [selectedBrands, setSelectedBrands] = useState([]);

      const toggleBrand = (brand) => {
        if (selectedBrands.includes(brand)) {
          setSelectedBrands(selectedBrands.filter(b => b !== brand));
        } else {
          if (selectedBrands.length >= 6) return;
          setSelectedBrands([...selectedBrands, brand]);
        }
      };

      const displayBrands = ['퍼시스', '일룸', '시디즈', '슬로우베드', '알로소', '데스커'];
      const brandStatsDetails = displayBrands.reduce((acc, brand) => {
        acc[brand] = { pending: 0, processing: 0, completed: 0 };
        return acc;
      }, {});

      issues.forEach(issue => {
        if (brandStatsDetails[issue.brand]) {
          if (issue.status === '조치대기') brandStatsDetails[issue.brand].pending += 1;
          if (issue.status === '처리 중') brandStatsDetails[issue.brand].processing += 1;
          if (issue.status === '조치완료') brandStatsDetails[issue.brand].completed += 1;
        }
      });

      const chartStats = (() => {
        const base = {};
        const targetIssues = selectedBrands.length > 0
          ? issues.filter(issue => selectedBrands.includes(issue.brand))
          : issues;

        targetIssues.forEach(issue => {
          const type = issue.issue_type || '기타';
          base[type] = (base[type] || 0) + 1;
        });

        if (Object.keys(base).length === 0) return { '등록 0건 (데이터 없음)': 1 };
        return base;
      })();

      const supplierStats = (() => {
        const base = {};
        const targetIssues = selectedBrands.length > 0
          ? issues.filter(issue => selectedBrands.includes(issue.brand))
          : issues;

        targetIssues.forEach(issue => {
          const vendor = issue.vendor || issue.brand || '미상';
          base[vendor] = (base[vendor] || 0) + 1;
        });

        if (Object.keys(base).length === 0) return { '등록 0건': 1 };
        return base;
      })();

      const totalIssues = Object.values(chartStats).reduce((a, b) => a + b, 0);

      const pieData = Object.entries(chartStats)
        .filter(([k, v]) => v > 0)
        .map(([k, v]) => ({ name: k, value: v }));

      const maxSupplierTotal = Math.max(...Object.values(supplierStats));
      const currentTime = "03-21 08:50 기준";

      return (
        <div className="p-6 space-y-6 slide-up">

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow shrink-0">
            <div className="mb-6">
              <h3 className="text-lg font-bold text-gray-900 font-sans">브랜드별 특이사항 처리 현황</h3>
              <p className="text-xs text-gray-400 font-medium mt-1">{currentTime}</p>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
              {displayBrands.map(brand => {
                const stats = brandStatsDetails[brand];
                const isSelected = selectedBrands.includes(brand);
                return (
                  <div
                    key={brand}
                    onClick={() => toggleBrand(brand)}
                    className={`rounded-xl px-5 py-4 flex items-center border text-sm cursor-pointer transition-all ${isSelected
                      ? 'bg-orange-50 border-orange-400 shadow-sm ring-1 ring-orange-400/50'
                      : 'bg-gray-50/60 border-gray-100 hover:border-gray-200 hover:bg-gray-100'
                      }`}
                  >
                    <div style={{ width: '31%' }} className={`font-bold tracking-tight whitespace-nowrap truncate pr-2 ${isSelected ? 'text-orange-700' : 'text-gray-800'}`}>
                      {brand}
                    </div>

                    <div className="flex items-center flex-1">
                      <div style={{ width: '33.33%' }} className="flex justify-between items-center pr-3 sm:pr-4 border-r border-gray-200">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">조치대기</span>
                        <span className="text-red-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '조치대기' }); }}>{stats.pending}</span>
                      </div>

                      <div style={{ width: '33.33%' }} className="flex justify-between items-center px-3 sm:px-4 border-r border-gray-200">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">처리 중</span>
                        <span className="text-yellow-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '처리 중' }); }}>{stats.processing}</span>
                      </div>

                      <div style={{ width: '33.33%' }} className="flex justify-between items-center pl-3 sm:pl-4">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">조치완료</span>
                        <span className="text-green-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '조치완료' }); }}>{stats.completed}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition-shadow">
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-900 font-sans">특이사항 유형</h3>
                <p className="text-xs text-gray-400 font-medium mt-1">{currentTime}</p>
              </div>
              <div className="flex-1 flex items-center justify-center gap-8 xl:gap-14 w-full h-[220px] mt-2">
                <div className="relative w-56 h-56 flex items-center justify-center">
                  {PieChart ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={pieData}
                          cx="50%"
                          cy="50%"
                          innerRadius={65}
                          outerRadius={95}
                          paddingAngle={4}
                          cornerRadius={8}
                          dataKey="value"
                          stroke="none"
                        >
                          {pieData.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={CATEGORY_COLORS[entry.name] || '#aaaaaa'} />
                          ))}
                        </Pie>
                        <Tooltip
                          contentStyle={{ borderRadius: '8px', border: '1px solid #f3f4f6', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)', fontSize: '13px' }}
                          itemStyle={{ color: '#1f2937', fontWeight: 'bold' }}
                        />
                      </PieChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="text-[11px] font-bold text-red-500 bg-red-50 rounded-full w-40 h-40 flex items-center justify-center shadow-inner border border-red-200 text-center leading-relaxed">
                      Chart Module<br />Loading Failed
                    </div>
                  )}

                  <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span className="text-[28px] font-black text-gray-900 leading-tight">{totalIssues}</span>
                    <span className="text-xs font-semibold text-gray-500">총 발생건</span>
                  </div>
                </div>
                <div className="space-y-3">
                  {Object.entries(chartStats).map(([k, v]) => (
                    <div key={k} className="flex justify-between items-center w-32 text-sm">
                      <div className="flex items-center text-gray-600 font-medium whitespace-nowrap">
                        <span className="w-2.5 h-2.5 rounded-full mr-3" style={{ backgroundColor: CATEGORY_COLORS[k] || '#d1d5db' }}></span>{k}
                      </div>
                      <div className="font-bold text-gray-900">{v}<span className="text-xs text-gray-400 font-normal ml-0.5">건</span></div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition-shadow">
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-900 font-sans">공급업체별 이슈 비율</h3>
                <p className="text-xs text-gray-400 font-medium mt-1">{currentTime}</p>
              </div>
              <div className="flex-1 flex flex-col justify-center space-y-6 px-4">
                {Object.entries(supplierStats).map(([vendor, total], idx) => {
                  const percentWidth = (total / maxSupplierTotal) * 100;
                  return (
                    <div key={vendor} className="flex items-center text-sm">
                      <span className="w-24 text-gray-600 font-semibold truncate text-right mr-4" title={vendor}>{vendor}</span>
                      <div className="flex-1 h-5 rounded overflow-hidden">
                        <div className="h-full rounded-r transition-all duration-1000 ease-out" style={{ width: `${percentWidth}%`, backgroundColor: BRAND_COLORS[idx % BRAND_COLORS.length] }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
            <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
              <div className="flex items-center">
                <svg className="w-5 h-5 text-gray-700 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <h3 className="text-lg font-bold text-gray-900">최근 특이사항 발생 내역</h3>
              </div>
              <button onClick={onNavigateToList} className="text-sm font-semibold text-letusBlue hover:text-blue-700 transition-colors flex items-center">
                전체보기 <svg className="w-4 h-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
              </button>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left whitespace-nowrap">
                <thead className="bg-white border-b border-gray-200 text-xs font-bold text-gray-500">
                  <tr>
                    <th className="p-4 pl-6">입고번호</th>
                    <th className="p-4">발생시간</th>
                    <th className="p-4">공급사</th>
                    <th className="p-4">품목정보</th>
                    <th className="p-4">특이유형</th>
                    <th className="p-4 text-center">처리상태</th>
                    <th className="p-4 text-center">관리</th>
                  </tr>
                </thead>
                {isLoading ? (
                  <TableSkeleton rowCount={5} colCount={7} />
                ) : (
                  <tbody className="divide-y divide-gray-100 text-sm">
                    {[...issues]
                      .sort((a, b) => {
                        if (a.status === '조치대기' && b.status !== '조치대기') return -1;
                        if (a.status !== '조치대기' && b.status === '조치대기') return 1;
                        return 0;
                      })
                      .slice(0, 6)
                      .map((row, idx) => (
                        <tr key={row.reception_no || idx} className="hover:bg-gray-50 transition-colors">
                          <td className="p-4 pl-6 text-gray-800 font-semibold">{row.reception_no}</td>
                          <td className="p-4 text-gray-500 font-mono">{row.created_at ? new Date(row.created_at).toLocaleDateString() : '-'}</td>
                          <td className="p-4 font-semibold text-gray-700">{row.vendor || '-'}</td>
                          <td className="p-4 text-gray-600 truncate max-w-xs">{row.product_code}</td>
                          <td className="p-4"><CategoryBadge category={row.issue_type} /></td>
                          <td className="p-4 text-center"><StatusBadge status={row.status} category={row.issue_type} /></td>
                          <td className="p-4 text-center">
                            <button onClick={onNavigateToList} className="border border-gray-300 text-gray-600 bg-white px-3 py-1 rounded text-xs font-semibold hover:bg-gray-50 hover:border-gray-400 transition-colors shadow-sm">
                              상세보기
                            </button>
                          </td>
                        </tr>
                      ))}
                  </tbody>
                )}
              </table>
            </div>
          </div>
        </div>
      );
    }

    const IssueList = ({ issues = [], isLoading = false, onReload, savedFilters, setSavedFilters, userProfile }) => {
      const [viewComment, setViewComment] = useState(null);
      const [activeModalRow, setActiveModalRow] = useState(null);
      const [activeHandleRow, setActiveHandleRow] = useState(null);
      const [selectedIds, setSelectedIds] = useState([]);

      const [draftBrand, setDraftBrand] = useState(savedFilters.brand);
      const [draftStatus, setDraftStatus] = useState(savedFilters.status);
      const [draftStartDate, setDraftStartDate] = useState(savedFilters.startDate);
      const [draftEndDate, setDraftEndDate] = useState(savedFilters.endDate);
      const [draftSearchType, setDraftSearchType] = useState(savedFilters.searchType);
      const [draftSearchValue, setDraftSearchValue] = useState(savedFilters.searchValue);

      useEffect(() => {
        setDraftBrand(savedFilters.brand);
        setDraftStatus(savedFilters.status);
        setDraftStartDate(savedFilters.startDate);
        setDraftEndDate(savedFilters.endDate);
        setDraftSearchType(savedFilters.searchType);
        setDraftSearchValue(savedFilters.searchValue);
      }, [savedFilters.brand, savedFilters.status, savedFilters.startDate, savedFilters.endDate, savedFilters.searchType, savedFilters.searchValue]);

      const handleSearch = () => {
        setSavedFilters({
          brand: draftBrand,
          status: draftStatus,
          startDate: draftStartDate,
          endDate: draftEndDate,
          searchType: draftSearchType,
          searchValue: draftSearchValue
        });
      };

      const filteredIssues = issues.filter(issue => {
        if (savedFilters.brand !== '전체' && issue.brand !== savedFilters.brand) return false;
        if (savedFilters.status !== '전체' && issue.status !== savedFilters.status) return false;

        if (issue.created_at) {
          const issueDate = issue.created_at.split('T')[0];
          if (issueDate < savedFilters.startDate || issueDate > savedFilters.endDate) return false;
        }

        if (savedFilters.searchValue) {
          const val = savedFilters.searchValue.toLowerCase();
          if (savedFilters.searchType === '품목코드') {
            if (!issue.product_code?.toLowerCase().includes(val)) return false;
          } else if (savedFilters.searchType === '공급업체') {
            const vendor = (issue.vendor || issue.brand || '').toLowerCase();
            if (!vendor.includes(val)) return false;
          } else if (savedFilters.searchType === '처리자') {
            if (!issue.final_handler?.toLowerCase().includes(val)) return false;
          }
        }
        return true;
      });

      const isAllSelected = filteredIssues.length > 0 && selectedIds.length === filteredIssues.length;

      const handleSelectAll = (e) => {
        if (e.target.checked) {
          setSelectedIds(filteredIssues.map(issue => issue.id));
        } else {
          setSelectedIds([]);
        }
      };

      const handleSelectOne = (e, id) => {
        if (e.target.checked) {
          setSelectedIds(prev => [...prev, id]);
        } else {
          setSelectedIds(prev => prev.filter(item => item !== id));
        }
      };

      const handleRevertSelectedIssues = async () => {
        if (selectedIds.length === 0) {
          alert('원복할 항목을 1개 이상 선택해 주세요.');
          return;
        }

        if (userProfile?.role === '사용자') {
          alert('이 작업은 관리자만 수행할 수 있습니다.');
          return;
        }

        if (!window.confirm(`선택하신 ${selectedIds.length}건의 이슈를 '조치대기' 상태로 원복하시겠습니까?\n이전의 조치 내용, 최종 처리자 정보, 해결 일시가 모두 영구적으로 초기화(삭제)됩니다.`)) return;

        try {
          const { error } = await supabase
            .from('logistics_issues')
            .update({
              status: '조치대기',
              final_handler: '',
              action_content: '',
              resolved_at: null
            })
            .in('id', selectedIds);

          if (error) throw error;

          alert(`선택한 ${selectedIds.length}건의 항목이 초기화되었습니다.`);
          setSelectedIds([]);
          await onReload();
        } catch (err) {
          console.error('원복 처리 중 오류:', err);
          alert('원복 처리 중 오류가 발생했습니다.');
        }
      };

      const CommentViewerModal = ({ title, content, author, date, onClose }) => {
        if (!content) return null;
        return (
          <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
            <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-sm slide-up border border-gray-100 overflow-hidden">
              <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 className="font-bold text-gray-900">{title}</h3>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
              </div>
              <div className="p-5 bg-white space-y-3">
                <div className="flex justify-between items-center text-xs text-gray-500 font-medium">
                  <span>작성자: {author || '-'}</span><span>일시: {date}</span>
                </div>
                <div className="bg-gray-50 text-gray-800 p-4 rounded-lg text-sm leading-relaxed border border-gray-100">
                  {content}
                </div>
              </div>
              <div className="p-3 border-t border-gray-50 bg-gray-50/50 text-right">
                <button onClick={onClose} className="px-5 py-2 bg-letusSidebar text-white text-sm font-semibold rounded hover:bg-gray-800 transition-colors">닫기</button>
              </div>
            </div>
          </div>
        )
      };

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] flex flex-col gap-4 slide-up">
          <div className="w-full h-[54px] bg-white rounded-lg shadow-sm border border-slate-200 px-6 flex items-center z-30 shrink-0">
            <div className="flex items-center gap-6 w-full overflow-hidden">
              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap flex items-center">브랜드 <span className="text-letusOrange ml-0.5">*</span></label>
                <select
                  value={draftBrand}
                  onChange={(e) => setDraftBrand(e.target.value)}
                  className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-28 cursor-pointer text-gray-700"
                >
                  <option value="전체">전체</option>
                  <option value="퍼시스">퍼시스</option>
                  <option value="일룸">일룸</option>
                  <option value="슬로우베드">슬로우베드</option>
                  <option value="데스커">데스커</option>
                  <option value="시디즈">시디즈</option>
                  <option value="알로소">알로소</option>
                </select>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap flex items-center">등록일자 <span className="text-letusOrange ml-0.5">*</span></label>
                <div className="flex items-center h-[30px]">
                  <input type="date" value={draftStartDate} onChange={(e) => setDraftStartDate(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-[115px] cursor-pointer text-gray-700" />
                  <span className="mx-1.5 text-gray-400 font-medium text-xs">~</span>
                  <input type="date" value={draftEndDate} onChange={(e) => setDraftEndDate(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-[115px] cursor-pointer text-gray-700" />
                </div>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">처리상태</label>
                <select
                  value={draftStatus}
                  onChange={(e) => setDraftStatus(e.target.value)}
                  className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-24 cursor-pointer text-gray-700"
                >
                  <option value="전체">전체</option>
                  <option value="조치대기">조치대기</option>
                  <option value="처리 중">처리 중</option>
                  <option value="조치완료">조치완료</option>
                  <option value="피드백완료">피드백완료</option>
                </select>
              </div>

              <div className="flex items-center shrink-0">
                <label className="text-[11px] font-bold text-gray-600 mr-2 whitespace-nowrap">검색어</label>
                <div className="flex gap-1.5 items-center">
                  <select value={draftSearchType} onChange={(e) => setDraftSearchType(e.target.value)} className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-24 cursor-pointer text-gray-700">
                    <option>품목코드</option>
                    <option>공급업체</option>
                    <option>처리자</option>
                  </select>
                  <input type="text" value={draftSearchValue} onChange={(e) => setDraftSearchValue(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} placeholder="검색어 입력" className="border border-gray-200 rounded-[3px] text-xs px-2.5 h-[30px] focus:outline-none focus:border-letusOrange w-36 text-gray-700" />
                </div>
              </div>

              <div className="ml-auto shrink-0 flex items-center pl-4">
                <button
                  onClick={handleSearch}
                  className="border border-letusOrange text-letusOrange hover:bg-orange-50 font-bold px-6 h-[30px] rounded-[3px] transition-colors text-xs flex items-center justify-center gap-1.5 disabled:opacity-70 disabled:cursor-not-allowed"
                >
                  조회하기
                </button>
              </div>
            </div>
          </div>

          <div className="flex justify-end w-full px-2 z-30">
            <div className="flex items-center gap-3">
              <div className="flex items-center gap-1.5 border-r border-slate-300 pr-3">
                <button className="p-1.5 text-green-700 hover:bg-white rounded transition-colors shadow-sm bg-slate-50 border border-slate-200 hover:border-green-300" title="엑셀 다운로드">
                  <svg className="w-[18px] h-[18px]" fill="currentColor" viewBox="0 0 24 24"><path d="M21.17 3.25q.33 0 .59.25q.24.26.24.59v15.82q0 .33-.24.59q-.26.25-.59.25H2.83q-.33 0-.59-.25q-.24-.26-.24-.59V4.09q0-.33.24-.59q.26-.25.59-.25h18.34zm-8.25 10.9l3.52 4.67h2.7l-4.9-6.07 4.65-5.94h-2.65l-3.23 4.48-3.32-4.48H7.07l4.76 5.94-5 6.07h2.72l3.37-4.67z" /></svg>
                </button>
                <button className="p-1.5 text-slate-500 hover:bg-white rounded transition-colors shadow-sm bg-slate-50 border border-slate-200 hover:border-slate-300" title="인쇄">
                  <svg className="w-[18px] h-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </button>
              </div>

              <div className="relative group">
                <button className="flex items-center text-xs font-bold text-slate-700 bg-white border border-slate-300 rounded shadow-sm px-3 py-[7px] hover:bg-slate-50 transition-all cursor-pointer justify-between min-w-[100px]">
                  <span>선택실행</span>
                  <svg className="w-3.5 h-3.5 ml-2 text-slate-400 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                </button>
                <div className="absolute right-0 top-[110%] w-[120px] hidden group-hover:block z-50">
                  <div className="bg-white border border-slate-200 rounded-md shadow-xl p-1.5 flex flex-col gap-0.5">
                    <button onClick={handleRevertSelectedIssues} className="w-full text-left px-2.5 py-2 text-slate-600 hover:text-orange-600 hover:bg-orange-50 font-bold rounded text-[11px] transition-colors">원복</button>
                    <button className="w-full text-left px-2.5 py-2 text-slate-600 hover:text-orange-600 hover:bg-orange-50 font-bold rounded text-[11px] transition-colors">피드백 전송</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 flex flex-col flex-1 overflow-hidden z-20">

            <div className="p-0 overflow-auto flex-1 h-[600px]">
              <table className="w-full text-left whitespace-nowrap">
                <thead className="bg-gray-50/50 border-b border-gray-200 text-xs text-gray-500 font-bold sticky top-0 z-10">
                  <tr>
                    <th className="p-4 pl-6 w-12">
                      <input
                        type="checkbox"
                        className="w-4 h-4 rounded border-gray-300 text-letusOrange focus:ring-letusOrange cursor-pointer"
                        checked={isAllSelected}
                        onChange={handleSelectAll}
                      />
                    </th>
                    <th className="p-4">접수번호</th>
                    <th className="p-4">소속 브랜드</th>
                    <th className="p-4">품목코드</th>
                    <th className="p-4">유형</th>
                    <th className="p-4">접수자</th>
                    <th className="p-4">공급업체</th>
                    <th className="p-4 text-center">처리상태</th>
                    <th className="p-4 text-center">요청내용</th>
                    <th className="p-4 text-center">처리 내용</th>
                    <th className="p-4">최종 처리자</th>
                    <th className="p-4">최종 처리일시</th>
                  </tr>
                </thead>
                {isLoading ? (
                  <TableSkeleton rowCount={10} colCount={12} />
                ) : (
                  <tbody className="divide-y divide-gray-100 text-sm cursor-pointer">
                    {filteredIssues.map((row) => {
                      const rowId = row.id;
                      return (
                        <tr
                          key={rowId}
                          className={`hover:bg-blue-50/30 transition-colors ${selectedIds.includes(rowId) ? 'bg-blue-50/50' : ''}`}
                          onClick={() => handleSelectOne({ target: { checked: !selectedIds.includes(rowId) } }, rowId)}
                        >
                          <td className="p-4 pl-6 w-12" onClick={(e) => e.stopPropagation()}>
                            <input
                              type="checkbox"
                              className="w-4 h-4 rounded border-gray-300 text-letusOrange focus:ring-letusOrange cursor-pointer"
                              checked={selectedIds.includes(rowId)}
                              onChange={(e) => handleSelectOne(e, rowId)}
                            />
                          </td>
                          <td className="p-4 font-bold text-gray-800">{row.reception_no}</td>
                          <td className="p-4 font-semibold text-gray-700">{row.brand}</td>
                          <td className="p-4 text-gray-600 truncate max-w-[150px]" title={row.product_code}>{row.product_code}</td>
                          <td className="p-4"><CategoryBadge category={row.issue_type} /></td>
                          <td className="p-4 text-gray-600">{row.reporter || '물류담당자'}</td>
                          <td className="p-4 text-gray-700 font-semibold">{row.vendor || '-'}</td>
                          <td className="p-4 text-center"><StatusBadge status={row.status} category={row.issue_type} /></td>
                          <td className="p-4 text-center">
                            {row.status === '조치대기' ? (
                              <button
                                onClick={(e) => { e.stopPropagation(); setActiveModalRow(row); }}
                                disabled={userProfile?.role === '사용자'}
                                className={`text-xs font-bold border border-dashed px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${userProfile?.role === '사용자'
                                  ? 'text-gray-400 border-gray-200 bg-gray-50 cursor-not-allowed opacity-60'
                                  : 'text-gray-500 border-gray-300 bg-gray-50 hover:bg-gray-100/70'
                                  }`}
                              >
                                요청등록
                              </button>
                            ) : (
                              <button
                                onClick={(e) => { e.stopPropagation(); setActiveModalRow(row); }}
                                disabled={userProfile?.role === '사용자'}
                                className={`text-xs font-bold border px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${userProfile?.role === '사용자'
                                  ? 'text-gray-400 border-gray-200 bg-gray-50 cursor-not-allowed opacity-60'
                                  : 'text-letusBlue border-blue-200 bg-white hover:bg-blue-50'
                                  }`}
                              >
                                요청확인
                              </button>
                            )}
                          </td>
                          <td className="p-4 text-center text-green-600">
                            {['처리 중', '조치완료'].includes(row.status) ? (
                              <button
                                onClick={(e) => { e.stopPropagation(); setActiveHandleRow(row); }}
                                className={`text-xs font-bold border px-3 py-1.5 rounded transition-colors shadow-sm w-[76px] ${row.status === '조치완료'
                                  ? 'text-green-600 border-green-200 bg-white hover:bg-green-50'
                                  : 'text-yellow-600 border-yellow-300 bg-yellow-50 hover:bg-yellow-100'
                                  }`}
                              >
                                {row.status === '조치완료' ? '조치 확인' : '조치 등록'}
                              </button>
                            ) : (
                              <span className="text-gray-300">-</span>
                            )}
                          </td>
                          <td className="p-4 text-gray-600 font-medium">{row.final_handler || row.handlerName || '-'}</td>
                          <td className="p-4 text-gray-500 font-mono text-xs">{formatDateTime(row.resolved_at)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                )}
              </table>
            </div>
          </div>
          {viewComment && <CommentViewerModal {...viewComment} onClose={() => setViewComment(null)} />}
          {activeModalRow && <RequestModal row={activeModalRow} onClose={() => setActiveModalRow(null)} onReload={onReload} userProfile={userProfile} />}
          {activeHandleRow && <HandleModal row={activeHandleRow} onClose={() => setActiveHandleRow(null)} onReload={onReload} userProfile={userProfile} />}
        </div>
      );
    }

    // --- 지원센터 (FAQ 및 건의사항) 컴포넌트 ---
    const SupportCenter = ({ userProfile }) => {
      const [activeTab, setActiveTab] = useState('faq'); // 'faq' or 'suggestion'
      const [openFaqId, setOpenFaqId] = useState(1); // 기본으로 첫 번째 FAQ 열어두기

      // FAQ 데이터
      const faqs = [
        {
          id: 1,
          category: '시스템 설정',
          q: '특이사항 발생 알림(팝업)이 오지 않습니다.',
          a: (
            <div className="space-y-3 text-gray-600 text-sm leading-relaxed">
              <p>브라우저의 알림 설정이 '차단'되어 있을 수 있습니다. 사용 중인 브라우저에 맞게 아래 방법으로 해제해 주세요.</p>
              <div className="bg-gray-50 p-4 rounded-lg border border-gray-100 space-y-4">
                <div>
                  <strong className="text-gray-800 block mb-1">🟢 Google Chrome (구글 크롬)</strong>
                  1. 주소창 왼쪽의 <strong>자물쇠(🔒) 또는 단추 모양 아이콘</strong> 클릭<br />
                  2. 메뉴에서 <strong>[알림]</strong>을 찾아 <strong>'허용'</strong>으로 변경<br />
                  3. 브라우저 새로고침(F5)
                </div>
                <div className="border-t border-gray-200 pt-3">
                  <strong className="text-gray-800 block mb-1">🔵 Microsoft Edge (마이크로소프트 엣지)</strong>
                  1. 주소창 왼쪽의 <strong>자물쇠(🔒) 아이콘</strong> 클릭<br />
                  2. <strong>[이 사이트에 대한 권한]</strong> 클릭 후 <strong>[알림]</strong> 항목을 <strong>'허용'</strong>으로 변경<br />
                  3. 원래 화면으로 돌아와 새로고침(F5)
                </div>
              </div>
            </div>
          )
        },
        {
          id: 2,
          category: '입고 관리',
          q: '대시보드와 리스트의 재고 수량이 다른 것 같습니다.',
          a: '대시보드의 데이터는 실시간으로 반영되나, 리스트 화면은 검색(조회) 버튼을 누른 시점의 데이터를 보여줍니다. 최신 데이터를 보시려면 상단의 새로고침 아이콘이나 조회 버튼을 다시 눌러주세요.'
        },
        {
          id: 3,
          category: '계정/권한',
          q: '담당 업체(브랜드)를 추가/변경하고 싶습니다.',
          a: '우측 상단의 본인 이름을 클릭하여 [내 정보 수정] 창을 띄운 뒤 변경할 수 있습니다. 단, 관리자 권한이 필요한 업체 추가는 IT/SCM 담당자에게 별도로 건의사항을 남겨주시기 바랍니다.'
        }
      ];

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] slide-up">
          <div className="max-w-4xl mx-auto">

            {/* 상단 타이틀 및 탭 영역 */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
              <div className="p-6 border-b border-gray-100 bg-gradient-to-r from-blue-50/50 to-white">
                <h2 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                  <svg className="w-6 h-6 text-letusBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                  지원센터
                </h2>
                <p className="text-sm text-gray-500 mt-1">시스템 이용 중 궁금한 점이나 개선 사항을 남겨주세요.</p>
              </div>
              <div className="flex px-2 pt-2 bg-gray-50/50 border-b border-gray-100">
                <button
                  onClick={() => setActiveTab('faq')}
                  className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'faq' ? 'border-letusBlue text-letusBlue' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                >
                  자주 묻는 질문 (FAQ)
                </button>
                <button
                  onClick={() => setActiveTab('suggestion')}
                  className={`px-6 py-3 text-sm font-bold border-b-2 transition-colors ${activeTab === 'suggestion' ? 'border-letusBlue text-letusBlue' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                >
                  시스템 건의사항
                </button>
              </div>
            </div>

            {/* 탭 콘텐츠 영역 */}
            {activeTab === 'faq' && (
              <div className="space-y-4 animate-fade-in">
                {faqs.map((faq) => (
                  <div key={faq.id} className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden transition-all duration-200">
                    <button
                      onClick={() => setOpenFaqId(openFaqId === faq.id ? null : faq.id)}
                      className="w-full flex items-center justify-between p-5 text-left hover:bg-gray-50 transition-colors focus:outline-none"
                    >
                      <div className="flex items-center gap-3">
                        <span className="text-[10px] font-black text-letusOrange bg-orange-50 border border-orange-100 px-2 py-0.5 rounded uppercase tracking-wider">{faq.category}</span>
                        <span className={`font-bold text-[15px] ${openFaqId === faq.id ? 'text-letusBlue' : 'text-gray-800'}`}>Q. {faq.q}</span>
                      </div>
                      <svg className={`w-5 h-5 text-gray-400 transition-transform duration-300 ${openFaqId === faq.id ? 'rotate-180 text-letusBlue' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                    </button>

                    {openFaqId === faq.id && (
                      <div className="px-5 pb-5 pt-2 border-t border-gray-50 bg-white">
                        <div className="flex gap-3">
                          <span className="font-black text-gray-400 text-lg">A.</span>
                          <div className="flex-1 mt-1">{faq.a}</div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'suggestion' && (
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 animate-fade-in">
                <form onSubmit={(e) => { e.preventDefault(); alert('건의사항이 성공적으로 접수되었습니다. (현재 UI 테스트 중)'); }} className="space-y-5">
                  <div className="grid grid-cols-2 gap-5">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-700">작성자</label>
                      <input type="text" value={userProfile?.name || ''} disabled className="border border-gray-200 rounded-lg px-4 py-2.5 text-sm bg-gray-50 text-gray-500 cursor-not-allowed" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-xs font-bold text-gray-700">건의 유형 <span className="text-letusOrange">*</span></label>
                      <select className="border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800">
                        <option>기능 개선 (UI/UX)</option>
                        <option>신규 기능 추가 요청</option>
                        <option>오류 및 버그 신고</option>
                        <option>기타</option>
                      </select>
                    </div>
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">제목 <span className="text-letusOrange">*</span></label>
                    <input type="text" required placeholder="건의사항의 제목을 입력해 주세요." className="border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800" />
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">상세 내용 <span className="text-letusOrange">*</span></label>
                    <textarea required rows={6} placeholder="개선이 필요한 부분을 상세히 적어주시면 시스템 고도화에 큰 도움이 됩니다." className="border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-letusBlue bg-white text-gray-800 resize-none"></textarea>
                  </div>

                  <div className="pt-2 flex justify-end">
                    <button type="submit" className="px-6 py-2.5 bg-letusBlue text-white text-sm font-bold rounded-lg shadow-md hover:bg-blue-600 transition-colors flex items-center gap-2">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                      건의사항 등록
                    </button>
                  </div>
                </form>
              </div>
            )}

          </div>
        </div>
      );
    };

    const supabaseUrl = 'https://kbbkodmighrrgwtwrgdp.supabase.co';
    const supabaseAnonKey = 'sb_publishable_2yOkLjobrM_oMlncJFqL3A_gbuU9eAr';
    const SUPABASE_SERVICE_ROLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiYmtvZG1pZ2hycmd3dHdyZ2RwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDA2Nzk1OSwiZXhwIjoyMDg5NjQzOTU5fQ.p32oIw0vCr9DfwZ2ifnAjZDM0tiU23UbMgRtXFQ4aeU";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
    const adminSupabase = window.supabase.createClient(supabaseUrl, SUPABASE_SERVICE_ROLE_KEY);

    const LoginView = () => {
      const [loginId, setLoginId] = useState('');
      const [password, setPassword] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        if (!loginId || !password) {
          setErrorMsg('아이디와 비밀번호를 입력해주세요.');
          return;
        }

        setLoading(true);
        const targetEmail = loginId.includes('@') ? loginId : `${loginId}@letus.com`;

        const { error } = await supabase.auth.signInWithPassword({
          email: targetEmail,
          password: password,
        });

        if (error) {
          setErrorMsg(`[Dev] 로그인 실패: ${error.message}`);
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 slide-up">
          <div className="max-w-[400px] w-full bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8 sm:p-10 relative overflow-hidden">
            <div className="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-orange-400 to-orange-600"></div>

            <div className="text-center mb-10 pt-2">
              <h1 className="text-3xl font-black text-letusOrange tracking-tighter mb-2">LETUS LOGIS</h1>
              <p className="text-sm text-slate-500 font-medium tracking-tight">통합 물류 관리 시스템</p>
            </div>

            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-xs font-bold text-slate-700 mb-1.5 ml-1">아이디 (ID)</label>
                <input
                  type="text"
                  value={loginId}
                  onChange={(e) => setLoginId(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-letusOrange focus:ring-1 focus:ring-letusOrange transition-all text-gray-800 bg-slate-50 focus:bg-white"
                  placeholder="admin"
                />
              </div>

              <div>
                <label className="block text-xs font-bold text-slate-700 mb-1.5 ml-1">비밀번호</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-letusOrange focus:ring-1 focus:ring-letusOrange transition-all text-gray-800 bg-slate-50 focus:bg-white"
                  placeholder="••••••••"
                />
              </div>

              {errorMsg && (
                <div className="text-red-500 text-xs font-bold text-center bg-red-50 py-2.5 rounded-lg border border-red-100 flex items-center justify-center gap-1.5">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  {errorMsg}
                </div>
              )}

              <button
                type="submit"
                disabled={loading}
                className="w-full bg-letusOrange hover:bg-orange-500 active:bg-orange-600 text-white font-bold py-3.5 px-4 rounded-lg transition-colors mt-2 flex items-center justify-center shadow-md disabled:opacity-70 disabled:cursor-not-allowed"
              >
                {loading ? (
                  <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w0.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                ) : null}
                {loading ? '로그인 처리 중...' : '로그인'}
              </button>
            </form>

            <div className="mt-10 pt-6 border-t border-slate-100 text-center text-[11px] text-slate-400 font-medium">
              <p>© 2026 LETUS. All rights reserved.</p>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [issues, setIssues] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [userProfile, setUserProfile] = useState(null);
      const [selfEditTarget, setSelfEditTarget] = useState(null);
      const [notifications, setNotifications] = useState([]);
      const [isNotiOpen, setIsNotiOpen] = useState(false);

      const today = new Date().toISOString().split("T")[0];
      const [savedListFilters, setSavedListFilters] = useState({
        brand: '전체', status: '전체', startDate: today, endDate: today, searchType: '품목코드', searchValue: ''
      });

      useEffect(() => {
        if (session) {
          const savedKey = 'letus_noti_' + session.user.id;
          const saved = localStorage.getItem(savedKey);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              const now = new Date().getTime();
              const validNotis = parsed.filter(n => !(n.read && n.read_at && (now - n.read_at > 24 * 60 * 60 * 1000)));
              setNotifications(validNotis);
            } catch (e) { }
          }
        }
      }, [session]);

      useEffect(() => {
        if (session) {
          localStorage.setItem('letus_noti_' + session.user.id, JSON.stringify(notifications));
        }
      }, [notifications, session]);

      const handleNotiClick = (notiId, filterObj) => {
        setNotifications(prev => prev.map(n => n.id === notiId ? { ...n, read: true, read_at: new Date().getTime() } : n));
        handleDrillDown(filterObj);
        setIsNotiOpen(false);
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
        setUserProfile(null);
        setSession(null);
      };

      const handleDrillDown = (filterObj) => {
        setSavedListFilters(prev => ({
          ...prev,
          brand: filterObj.brand || '전체',
          status: filterObj.status || '전체'
        }));
        setCurrentPage('list');
      };

      const fetchIssues = async () => {
        setIsLoading(true);
        try {
          const { data, error } = await supabase.from('logistics_issues').select('*').order('id', { ascending: false });
          if (error) throw error;
          setIssues(data || []);
        } catch (error) {
          console.error('Supabase fetch exception:', error.message || error);
          setIssues([]);
        } finally {
          setIsLoading(false);
        }
      };

      const fetchProfile = async () => {
        if (!session) return;
        try {
          const { data, error } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
          if (data) {
            setUserProfile(data);
            if (data.role === '사용자' && currentPage === 'user_management') {
              setCurrentPage('dashboard');
            }
          }
        } catch (err) {
          console.error('프로필 갱신 실패:', err);
        }
      };

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setAuthLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          setAuthLoading(false);
        });

        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (session) {
          fetchIssues();
          fetchProfile();
        }
      }, [session]);

      useEffect(() => {
        if (!session || !userProfile) return;

        if (Notification.permission === 'default' && !sessionStorage.getItem('notiAsked')) {
          sessionStorage.setItem('notiAsked', 'true');
          Notification.requestPermission();
        }

        const channel = supabase
          .channel('logistics_issue_notifications')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '신규 입고'); })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'logistics_issues' }, (payload) => { handleIssueChange(payload.new, '상태 변경'); })
          .subscribe();

        const handleIssueChange = (newData, type) => {
          const userBrands = userProfile?.managed_brands ? userProfile.managed_brands.split(',').map(s => s.trim()) : [];
          const userVendors = userProfile?.managed_vendors ? userProfile.managed_vendors.split(',').map(s => s.trim()) : [];

          let shouldAlert = false;
          let message = '';
          const currentStatus = newData.status || '조치대기';

          if (currentStatus === '조치대기' && userProfile?.role?.includes('관리자') && (userBrands.includes('전체') || userBrands.includes(newData.brand))) {
            shouldAlert = true;
            message = `[신규] ${newData.brand} 브랜드의 새로운 이슈가 접수되었습니다. (${newData.reception_no})`;
          }
          else if (currentStatus === '처리 중' && userVendors.includes(newData.vendor)) {
            shouldAlert = true;
            message = `[이관] 관리 중인 ${newData.vendor} 업체로 이슈가 이관되었습니다. (${newData.reception_no})`;
          }
          else if (currentStatus === '조치완료' && userProfile?.role?.includes('관리자') && (userBrands.includes('전체') || userBrands.includes(newData.brand))) {
            shouldAlert = true;
            message = `[조치완료] ${newData.brand} 브랜드의 이슈 조치가 완료되었습니다. (${newData.reception_no})`;
          }

          if (shouldAlert) {
            const nowTime = new Date().getTime();
            if (window.lastAlertMsg === message && nowTime - (window.lastAlertTime || 0) < 2000) return;
            window.lastAlertMsg = message;
            window.lastAlertTime = nowTime;

            const newNoti = {
              id: newData.id + '_' + nowTime,
              title: type,
              message: message,
              date: new Date(nowTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
              read: false,
              read_at: null,
              filterObj: { brand: newData.brand || '전체', status: newData.status || '전체' }
            };

            setNotifications(prev => [newNoti, ...prev].slice(0, 10));

            if (Notification.permission === 'granted') {
              new Notification(`LETUS LOGIS - ${type}`, {
                body: message,
                icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'
              });
            }
            fetchIssues();
          }
        };

        return () => { supabase.removeChannel(channel); };
      }, [session, userProfile]);

      if (authLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
            <svg className="animate-spin h-8 w-8 text-letusBlue mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span className="text-sm font-bold text-slate-500 tracking-wide">인증 세션을 확인 중입니다...</span>
          </div>
        );
      }

      if (!session) return <LoginView />;

      return (
        <div className="flex h-screen overflow-hidden bg-letusBg text-gray-900 font-sans">
          <Sidebar page={currentPage} setPage={setCurrentPage} userProfile={userProfile} />

          <div className="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
            <Header
              page={currentPage}
              userProfile={userProfile}
              onLogout={handleLogout}
              notifications={notifications}
              isNotiOpen={isNotiOpen}
              toggleNoti={() => setIsNotiOpen(!isNotiOpen)}
              onNotiClick={handleNotiClick}
              onEditProfile={() => setSelfEditTarget(userProfile)}
            />

            <main className="flex-1 w-full">
              <div className={currentPage === 'dashboard' ? 'block' : 'hidden'}>
                <Dashboard onNavigateToList={() => setCurrentPage('list')} onDrillDown={handleDrillDown} issues={issues} isLoading={isLoading} onReload={fetchIssues} />
              </div>
              <div className={currentPage === 'list' ? 'block' : 'hidden'}>
                <IssueList userProfile={userProfile} issues={issues} isLoading={isLoading} onReload={fetchIssues} savedFilters={savedListFilters} setSavedFilters={setSavedListFilters} />
              </div>
              <div className={currentPage === 'user_management' ? 'block' : 'hidden'}>
                <UserManagement />
              </div>
              <div className={currentPage === 'support' ? 'block' : 'hidden'}>
                <SupportCenter userProfile={userProfile} />
              </div>
            </main>

            {selfEditTarget && (
              <UserEditModal
                user={selfEditTarget}
                onClose={() => setSelfEditTarget(null)}
                onReload={fetchProfile}
                isProfileMode={true}
              />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
