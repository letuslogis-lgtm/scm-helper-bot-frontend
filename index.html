          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
          children: [
            { id: 'home', label: 'MY DASHBOARD' }
          ]
        },
        {
          id: 'master', label: '마스터 정보관리',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
          children: [
            { id: 'user_management', label: '사용자 관리' },
            { id: 'product_manager', label: 'ITEM DB 수동 업데이트' }
          ]
        },
        {
          id: 'logistics', label: '입고 특이사항',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>,
          children: [
            { id: 'dashboard', label: '대시보드' },
            { id: 'list', label: '특이사항 LIST' }
          ]
        },
        {
          id: 'loading_issues', label: '상차 특이사항',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>,
          children: [
            { id: 'accident_dashboard', label: '사고분석 대시보드' },
            { id: 'accident_list', label: '사고분석 LIST' }
          ]
        },
        {
          id: 'support_menu', label: '고객 지원',
          icon: <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
          children: [{ id: 'support', label: '지원센터' }]
        }
      ];

      useEffect(() => {
        if (searchTerm) setOpenMenu('all_open');
        else setOpenMenu('logistics');
      }, [searchTerm]);

      const toggleMenu = (menuId) => {
        if (!isSidebarOpen) setIsSidebarOpen(true);
        setOpenMenu(openMenu === menuId ? null : menuId);
      };

      return (
        <div className={`${isSidebarOpen ? 'w-64' : 'w-[72px]'} bg-letusSidebar text-white flex flex-col h-full flex-shrink-0 transition-all duration-300 relative select-none z-50`}>
          <div className={`border-b border-gray-700/50 flex items-center min-h-[64px] ${isSidebarOpen ? 'p-5 justify-between' : 'justify-center py-5'}`}>
            {isSidebarOpen ? (
              <h1 className="text-2xl cursor-pointer truncate w-full text-left" onClick={() => setPage('dashboard')}>
                <span className="font-extrabold tracking-tight">LETUS</span><span className="font-extrabold text-letusOrange tracking-tight ml-1">LOGIS</span>
              </h1>
            ) : (
              <h1 className="text-[26px] leading-none cursor-pointer font-black tracking-tighter" onClick={() => setPage('dashboard')}>
                <span className="text-white">L</span><span className="text-letusOrange">L</span>
              </h1>
            )}
          </div>

          {isSidebarOpen && (
            <div className="px-4 py-4 space-y-3 border-b border-gray-700/50 animate-fade-in">
              <div className="relative">
                <input type="text" placeholder="메뉴 검색..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-gray-800 text-sm text-white placeholder-gray-500 rounded px-3 py-2 pl-9 focus:outline-none focus:ring-1 focus:ring-letusBlue transition-all" />
                <svg className="w-4 h-4 text-gray-500 absolute left-3 top-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
              </div>
              <div className="flex bg-gray-800 p-1 rounded">
                <button onClick={() => setActiveTab('all')} className={`flex-1 text-[11px] font-bold py-1.5 rounded transition-colors ${activeTab === 'all' ? 'bg-gray-600 text-white shadow-sm' : 'text-gray-400 hover:text-white'}`}>전체메뉴</button>
                <button onClick={() => setActiveTab('favorites')} className={`flex-1 text-[11px] font-bold py-1.5 rounded transition-colors ${activeTab === 'favorites' ? 'bg-yellow-500 text-white shadow-sm' : 'text-gray-400 hover:text-white'}`}>⭐ 즐겨찾기</button>
              </div>
            </div>
          )}

          <nav className="flex-1 px-2 py-3 space-y-1 overflow-y-auto custom-scrollbar">
            {activeTab === 'favorites' && isSidebarOpen && (
              <div className="animate-fade-in">
                {favorites.length === 0 ? (
                  <p className="text-xs text-gray-500 text-center py-6">별(⭐)을 눌러<br />자주 쓰는 메뉴를 등록하세요.</p>
                ) : (
                  favorites.map(favId => {
                    const foundMenu = menuData.flatMap(m => m.children).find(c => c.id === favId);
                    if (!foundMenu) return null;
                    return (
                      <div key={favId} className={`px-4 py-2.5 my-1 cursor-pointer text-sm font-bold transition-colors rounded flex items-center ${page === favId ? 'bg-letusBlue text-white shadow-sm' : 'text-gray-300 hover:text-white hover:bg-gray-800'}`} onClick={() => setPage(favId)}>
                        <span className="text-[13px] mr-2">⭐</span> {foundMenu.label}
                      </div>
                    );
                  })
                )}
              </div>
            )}

            {(activeTab === 'all' || !isSidebarOpen) && menuData.map((menu) => {
              const isAdmin = userProfile?.role === '관리자';
              const userMenus = userProfile?.accessible_menus ? userProfile.accessible_menus.split(',') : [];

              // 🔥 권한 로직의 핵심: 관리자면 다 통과, 사용자면 accessible_menus에 체크된 것만 통과!
              const allowedChildren = menu.children.filter(child => isAdmin || userMenus.includes(child.id));

              if (allowedChildren.length === 0) return null;

              const filteredChildren = allowedChildren.filter(child => child.label.toLowerCase().includes(searchTerm.toLowerCase()));

              if (searchTerm && filteredChildren.length === 0 && !menu.label.toLowerCase().includes(searchTerm.toLowerCase())) return null;
              const isMenuOpen = openMenu === menu.id || openMenu === 'all_open';

              return (
                <div key={menu.id} className="mb-1">
                  <div onClick={() => toggleMenu(menu.id)} className={`bg-transparent py-2.5 cursor-pointer flex items-center text-gray-300 hover:text-white transition-colors rounded ${isSidebarOpen ? 'px-3 justify-between' : 'justify-center hover:bg-gray-800'}`} title={!isSidebarOpen ? menu.label : ''}>
                    <div className="flex items-center justify-center">
                      <span className={`${isSidebarOpen ? 'mr-3' : ''} opacity-90 flex justify-center w-5`}>{menu.icon}</span>
                      {isSidebarOpen && <span className="text-sm font-semibold">{menu.label}</span>}
                    </div>
                    {isSidebarOpen && <svg className={`w-3 h-3 transition-transform ${isMenuOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>}
                  </div>

                  {isSidebarOpen && isMenuOpen && (
                    <div className="mt-1 space-y-1 slide-up">
                      {(searchTerm ? filteredChildren : allowedChildren).map(child => (
                        <div key={child.id} className={`pl-[42px] pr-4 py-2 cursor-pointer text-[13px] font-medium transition-colors rounded-sm ${page === child.id ? 'bg-letusBlue text-white shadow-sm' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`} onClick={() => setPage(child.id)}>
                          {searchTerm ? (
                            <span dangerouslySetInnerHTML={{ __html: child.label.replace(new RegExp(searchTerm, 'gi'), match => `<span class="text-letusOrange font-bold">${match}</span>`) }} />
                          ) : (
                            child.label
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </nav>

          {isSidebarOpen && (
            <div className="p-4 text-xs text-gray-600 font-medium border-t border-gray-800 mt-auto truncate text-center">
              <p>© 2026 LETUS LOGIS.</p>
            </div>
          )}
        </div>
      );
    };

    // --- 헤더 (Header) ---
    const Header = ({ page, userProfile, onLogout, notifications = [], isNotiOpen, toggleNoti, onNotiClick, onEditProfile, favorites, toggleFavorite, isSidebarOpen, setIsSidebarOpen, onMarkAllRead }) => {
      const [notiStatus, setNotiStatus] = useState(Notification.permission);

      const handleRequestNotification = () => {
        if (notiStatus === 'denied') {
          alert('🔕 알림이 차단되어 있습니다!\n\n브라우저 상단 주소창 왼쪽의 [자물쇠(🔒) 아이콘]을 클릭한 후, [알림] 권한을 "허용"으로 변경하고 새로고침해 주세요.');
          return;
        }
        if (notiStatus === 'default') {
          Notification.requestPermission().then(permission => {
            setNotiStatus(permission);
            if (permission === 'granted') alert('🔔 이제부터 특이사항 발생 시 바탕화면 팝업 알림이 전송됩니다!');
          });
        }
      };

      // 메뉴 이름 매칭 로직 업데이트
      const pageTitle =
        page === 'home' ? 'MY DASHBOARD' :
          page === 'dashboard' ? '특이사항 대시보드' :
            page === 'accident_dashboard' ? '사고분석 대시보드' :
              page === 'accident_list' ? '사고분석 LIST' :
                page === 'user_management' ? '사용자 관리' :
                  page === 'product_manager' ? 'ITEM DB 수동 업데이트' :
                    page === 'support' ? '지원센터' :
                      '특이사항 LIST';

      const isFavorite = favorites?.includes(page);

      // 안 읽은 알림 개수 계산
      const unreadCount = notifications.filter(n => !n.read).length;

      return (
        <header className="h-16 min-h-[64px] flex-shrink-0 bg-gradient-to-r from-blue-50/70 to-white border-b border-gray-200 flex justify-between items-center px-4 sm:px-6 sticky top-0 z-50">
          <div className="flex items-center text-gray-800 gap-3">
            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1.5 mr-1 text-gray-400 hover:text-letusBlue hover:bg-blue-50 rounded transition-colors focus:outline-none" title="사이드바 열기/접기">
              <svg className="w-[22px] h-[22px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>

            <h2 className="text-[19px] font-extrabold tracking-tight flex items-center gap-1.5">
              <button onClick={() => toggleFavorite(page)} className="focus:outline-none transition-transform hover:scale-110 active:scale-90 flex items-center" title="즐겨찾기 추가/해제">
                {isFavorite ? (
                  <svg className="w-6 h-6 text-yellow-400 drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                ) : (
                  <svg className="w-6 h-6 text-gray-300 hover:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                )}
              </button>
              {pageTitle}
            </h2>
          </div>

          <div className="flex items-center gap-4 sm:gap-5">
            <button onClick={() => window.location.reload()} className="text-gray-400 hover:text-letusBlue transition-colors focus:outline-none" title="새로고침">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>

            <div className="relative flex items-center">
              <button onClick={toggleNoti} className="text-gray-400 hover:text-letusOrange transition-colors focus:outline-none relative" title="알림 확인">
                <svg className="w-[22px] h-[22px]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                {unreadCount > 0 && (
                  <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full min-w-[17px] text-center border-2 border-white shadow-sm">
                    {unreadCount}
                  </span>
                )}
              </button>

              {isNotiOpen && (
                <div className="absolute right-0 top-full mt-4 w-72 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-[100] slide-up flex flex-col">
                  <div className="bg-gray-50 px-4 py-2.5 border-b border-gray-100 flex justify-between items-center shrink-0">
                    <h4 className="text-xs font-bold text-gray-700">최근 알림</h4>
                    <button onClick={handleRequestNotification} className={`flex items-center gap-1 text-[9px] font-bold px-2 py-1 rounded border transition-colors shadow-sm ${notiStatus === 'granted' ? 'bg-green-50 text-green-700 border-green-200' : notiStatus === 'denied' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-orange-50 text-orange-600 border-orange-200 animate-pulse'}`}>
                      {notiStatus === 'granted' ? 'PC 알림 ON' : notiStatus === 'denied' ? '알림 차단됨' : '알림 켜기'}
                    </button>
                  </div>

                  <div className="max-h-64 overflow-y-auto custom-scrollbar flex-1">
                    {notifications && notifications.length > 0 ? (
                      notifications.map(noti => (
                        <div key={noti.id} onClick={() => onNotiClick(noti.id, noti.filterObj)} className={`px-4 py-3 border-b border-gray-50 cursor-pointer hover:bg-gray-50 transition-colors ${noti.read ? 'opacity-50' : 'bg-blue-50/20'}`}>
                          <p className="text-xs font-bold text-letusBlue mb-1 flex items-center gap-1">
                            {!noti.read && <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span>}
                            {noti.title}
                          </p>
                          <p className="text-[11px] text-gray-600 line-clamp-2 leading-relaxed">{noti.message}</p>
                          <p className="text-[9px] text-gray-400 mt-1.5 font-mono">{noti.date}</p>
                        </div>
                      ))
                    ) : (
                      <div className="py-8 text-center text-xs text-gray-400 flex flex-col items-center gap-2">
                        <svg className="w-6 h-6 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
                        새로운 알림이 없습니다.
                      </div>
                    )}
                  </div>

                  {/* 🔥 안 읽은 개수 상관없이, 알림 내역이 1개라도 있으면 무조건 버튼 노출! */}
                  {notifications.length > 0 && (
                    <div className="border-t border-gray-100 bg-gray-50 p-2 text-center shrink-0 hover:bg-gray-100 transition-colors cursor-pointer" onClick={onMarkAllRead}>
                      <button className="text-[11px] font-bold text-gray-500 hover:text-letusBlue transition-colors w-full flex items-center justify-center gap-1.5">
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                        모두 읽음 처리
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="h-7 w-px bg-gray-200 mx-1 hidden sm:block"></div>

            <div className="text-right flex flex-col justify-center hidden sm:flex">
              <p className="text-[15px] font-bold text-gray-800 cursor-pointer hover:text-letusBlue transition-colors leading-tight" onClick={onEditProfile}>{userProfile?.name || '대기중'}</p>
              <p className="text-[11px] text-gray-500 mt-0.5">{userProfile?.brands || 'LETUS'} • {userProfile?.role || '사용자'}</p>
            </div>

            <button onClick={onLogout} className="p-2 ml-1 text-gray-400 hover:text-red-500 transition-colors bg-gray-50 hover:bg-red-50 rounded-lg" title="로그아웃">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
            </button>
          </div>
        </header>
      );
    };

    // --- 📝 TO DO 전용 모달 컴포넌트 ---
    const TodoModal = ({ todo, onClose, onSave, onDelete }) => {
      const [text, setText] = useState(todo ? todo.text : '');
      const [priority, setPriority] = useState(todo ? todo.priority : '4');
      const [repeat, setRepeat] = useState(todo && todo.repeat ? todo.repeat : []);

      const DAYS = ['월', '화', '수', '목', '금', '토', '일'];

      const handleToggleDay = (day) => {
        if (repeat.includes(day)) setRepeat(repeat.filter(d => d !== day));
        else setRepeat([...repeat, day]);
      };

      const handleSelectAllDays = () => {
        if (repeat.length === 7) setRepeat([]); // 모두 선택되어 있으면 전체 해제
        else setRepeat([...DAYS]); // 아니면 전체 선택
      };

      const handleSubmit = () => {
        if (!text.trim()) return alert('할 일을 입력해 주세요.');
        onSave({
          id: todo ? todo.id : Date.now(),
          text: text.trim(),
          priority,
          repeat,
          isDone: todo ? todo.isDone : false
        });
      };

      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-sm slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-sm text-gray-800 flex items-center gap-2">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full"></span>
                {todo ? 'TO DO 수정' : '새로운 TO DO 추가'}
              </h3>
              <button onClick={onClose} className="p-1 text-gray-400 hover:text-gray-600"><CloseIcon /></button>
            </div>

            <div className="p-5 space-y-4">
              {/* 1. 할 일 텍스트 */}
              <div className="flex flex-col gap-1.5">
                <label className="text-xs font-bold text-gray-700">할 일 <span className="text-letusOrange">*</span></label>
                <input
                  type="text" value={text} onChange={e => setText(e.target.value)}
                  placeholder="할 일 내용을 입력하세요" autoFocus
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-letusBlue bg-white"
                />
              </div>

              {/* 2. 우선 순위 */}
              <div className="flex flex-col gap-1.5">
                <label className="text-xs font-bold text-gray-700">우선 순위</label>
                <select value={priority} onChange={e => setPriority(e.target.value)} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-letusBlue bg-white cursor-pointer font-bold">
                  <option value="긴급">🚨 긴급 (최우선)</option>
                  <option value="1">1 순위</option>
                  <option value="2">2 순위</option>
                  <option value="3">3 순위</option>
                  <option value="4">4 순위 (기본)</option>
                </select>
              </div>

              {/* 3. 반복 여부 */}
              <div className="flex flex-col gap-1.5 pt-1">
                <div className="flex justify-between items-end mb-1">
                  <label className="text-xs font-bold text-gray-700">반복 설정 (요일)</label>
                  <button onClick={handleSelectAllDays} className="text-[10px] font-bold text-letusBlue hover:bg-blue-50 px-2 py-0.5 rounded border border-blue-200 transition-colors">
                    {repeat.length === 7 ? '전체 해제' : '전체 선택'}
                  </button>
                </div>
                <div className="flex gap-1.5 w-full justify-between">
                  {DAYS.map(day => {
                    const isSelected = repeat.includes(day);
                    return (
                      <button
                        key={day} onClick={() => handleToggleDay(day)}
                        className={`w-9 h-9 rounded-full text-xs font-bold transition-all flex items-center justify-center ${isSelected ? 'bg-letusBlue text-white shadow-sm' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                      >
                        {day}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 4. 하단 버튼 (좌측 삭제, 우측 취소/저장) */}
            <div className="p-4 border-t bg-gray-50 flex justify-between items-center">
              <div>
                {todo && (
                  <button onClick={() => { onDelete(todo.id); onClose(); }} className="px-4 py-2 border border-red-200 text-red-500 bg-white text-xs font-bold rounded-lg hover:bg-red-50 transition-colors shadow-sm">
                    삭제
                  </button>
                )}
              </div>
              <div className="flex gap-2">
                <button onClick={onClose} className="px-4 py-2 border border-gray-300 text-gray-600 bg-white text-xs font-bold rounded-lg hover:bg-gray-50 transition-colors shadow-sm">취소</button>
                <button onClick={handleSubmit} className="px-5 py-2 bg-letusBlue text-white text-xs font-bold rounded-lg shadow-sm hover:bg-blue-600 transition-colors">저장</button>
              </div>
            </div>
          </div>
        </div>
      );
    };



    // --- 🏢 협업부서 선택 모달 (TeamSearchModal) ---
    const TeamSearchModal = ({ initialTeams, onApply, onClose }) => {
      const [query, setQuery] = useState('');
      const [teamList, setTeamList] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [checkedTeams, setCheckedTeams] = useState(() => {
        if (!initialTeams) return [];
        return initialTeams.split(',').map(s => s.trim()).filter(Boolean);
      });

      useEffect(() => {
        const fetchTeams = async () => {
          setIsLoading(true);
          try {
            // DB 프로필 테이블에서 유저들의 '팀' 정보만 긁어와 중복 제거 후 리스트업
            const { data, error } = await supabase.from('profiles').select('team');
            if (error) throw error;
            const uniqueTeams = [...new Set(data.map(d => d.team).filter(Boolean))].sort();
            setTeamList(uniqueTeams);
          } catch (err) {
            console.error('팀 목록 조회 오류:', err);
          } finally {
            setIsLoading(false);
          }
        };
        fetchTeams();
      }, []);

      const filteredTeams = teamList.filter(t => t.includes(query));

      const toggleTeam = (team) => {
        setCheckedTeams(prev => prev.includes(team) ? prev.filter(t => t !== team) : [...prev, team]);
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[250] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col slide-up h-[500px]">
            <div className="flex justify-between items-center px-5 py-4 border-b border-gray-100">
              <h4 className="text-sm font-bold text-gray-800 flex items-center">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>
                협업부서 선택
              </h4>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1"><CloseIcon /></button>
            </div>
            <div className="px-4 py-3 border-b border-gray-100 bg-slate-50">
              <div className="relative">
                <svg className="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="부서명 검색..." className="w-full pl-9 pr-3 py-2 text-xs border border-gray-200 rounded-[4px] focus:outline-none focus:border-letusBlue bg-white" autoFocus />
              </div>
              {checkedTeams.length > 0 && <p className="text-[10px] text-letusBlue font-bold mt-2">선택된 부서: {checkedTeams.length}개</p>}
            </div>
            <div className="overflow-y-auto flex-1">
              {isLoading ? (
                <div className="py-10 text-center text-xs text-gray-400">부서 목록 로딩 중...</div>
              ) : (
                <div className="divide-y divide-gray-100">
                  {filteredTeams.map(team => (
                    <div key={team} className={`flex items-center gap-3 px-5 py-3 cursor-pointer transition-colors ${checkedTeams.includes(team) ? 'bg-blue-50' : 'hover:bg-gray-50'}`} onClick={() => toggleTeam(team)}>
                      <input type="checkbox" readOnly checked={checkedTeams.includes(team)} className="w-4 h-4 accent-letusBlue cursor-pointer" />
                      <span className="text-xs font-bold text-gray-700">{team}</span>
                    </div>
                  ))}
                  {filteredTeams.length === 0 && <div className="py-10 text-center text-xs text-gray-400">검색 결과가 없습니다.</div>}
                </div>
              )}
            </div>
            <div className="px-4 py-3 border-t border-gray-100 bg-white flex justify-end gap-2">
              <button onClick={onClose} className="px-4 py-2 border border-gray-200 text-gray-500 text-[11px] font-bold rounded-[3px] hover:bg-gray-50">취소</button>
              <button onClick={() => { onApply(checkedTeams.join(', ')); onClose(); }} className="px-5 py-2 bg-letusBlue text-white text-[11px] font-bold rounded-[3px] hover:bg-blue-600">적용하기</button>
            </div>
          </div>
        </div>
      );
    };

    // --- 📅 캘린더 일정 추가 모달 (CalendarEventModal) ---
    const CalendarEventModal = ({ selectedDate, onClose, onSave }) => {
      const [startDate, setStartDate] = useState(selectedDate || '');
      const [endDate, setEndDate] = useState(selectedDate || '');
      const [startTime, setStartTime] = useState('09:00');
      const [endTime, setEndTime] = useState('18:00');
      const [title, setTitle] = useState('');
      const [isImportant, setIsImportant] = useState(false);
      const [description, setDescription] = useState('');
      const [collabTeams, setCollabTeams] = useState('');
      const [isTeamModalOpen, setIsTeamModalOpen] = useState(false);

      // 00:00 부터 23:30까지 30분 단위 생성
      const timeOptions = useMemo(() => {
        const opts = [];
        for (let i = 0; i < 24; i++) {
          const h = i.toString().padStart(2, '0');
          opts.push(`${h}:00`);
          opts.push(`${h}:30`);
        }
        return opts;
      }, []);

      const handleSave = () => {
        if (!startDate || !endDate || !title.trim()) {
          return alert('날짜와 일정명을 필수로 입력해 주세요.');
        }
        if (startDate > endDate) {
          return alert('종료일이 시작일보다 빠를 수 없습니다.');
        }
        onSave({
          id: Date.now(),
          startDate, endDate, startTime, endTime,
          title: title.trim(), isImportant, description, collabTeams
        });
      };

      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-md slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-sm text-gray-800 flex items-center gap-2">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full"></span>
                새로운 일정 등록
              </h3>
              <button onClick={onClose} className="p-1 text-gray-400 hover:text-gray-600"><CloseIcon /></button>
            </div>

            <div className="p-5 space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar">
              <div className="grid grid-cols-2 gap-4">
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">시작일 <span className="text-red-500">*</span></label>
                  <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-letusBlue" />
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">종료일 <span className="text-red-500">*</span></label>
                  <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-letusBlue" />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">시작 시간</label>
                  <select value={startTime} onChange={e => setStartTime(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-letusBlue cursor-pointer bg-white font-medium">
                    {timeOptions.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-gray-700">종료 시간</label>
                  <select value={endTime} onChange={e => setEndTime(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-letusBlue cursor-pointer bg-white font-medium">
                    {timeOptions.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <div className="flex justify-between items-end">
                  <label className="text-xs font-bold text-gray-700">일정명 <span className="text-red-500">*</span></label>
                  <label className="flex items-center gap-1.5 cursor-pointer text-[11px] font-bold text-red-500 hover:bg-red-50 px-2 py-0.5 rounded transition-colors border border-transparent hover:border-red-200">
                    <input type="checkbox" checked={isImportant} onChange={e => setIsImportant(e.target.checked)} className="w-3.5 h-3.5 accent-red-500" />
                    🚨 중요(긴급) 일정
                  </label>
                </div>
                <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="일정 제목을 입력하세요" className="border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-letusBlue w-full" />
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-xs font-bold text-gray-700">협업 부서 추가</label>
                <div className="min-h-[42px] border border-gray-300 rounded-lg bg-gray-50 px-3 py-2 flex items-center justify-between">
                  <div className="flex flex-wrap gap-1.5">
                    {collabTeams ? collabTeams.split(',').map((team, i) => (
                      <span key={i} className="bg-blue-100 text-letusBlue border border-blue-200 px-2 py-0.5 rounded-full text-[10px] font-bold">{team.trim()}</span>
                    )) : <span className="text-xs text-gray-400 font-medium">선택된 부서 없음</span>}
                  </div>
                  <button onClick={() => setIsTeamModalOpen(true)} className="text-[10px] font-bold text-white bg-slate-700 hover:bg-slate-800 px-2.5 py-1.5 rounded transition-colors shrink-0 shadow-sm">부서 검색</button>
                </div>
              </div>

              <div className="flex flex-col gap-1.5">
                <label className="text-xs font-bold text-gray-700">상세 내용</label>
                <textarea value={description} onChange={e => setDescription(e.target.value)} rows={3} placeholder="회의 안건, 장소 등 세부사항을 입력하세요." className="border border-gray-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-letusBlue resize-none w-full"></textarea>
              </div>
            </div>

            <div className="p-4 border-t bg-gray-50 flex justify-end gap-2 shrink-0">
              <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 bg-white text-xs font-bold rounded-lg hover:bg-gray-50 shadow-sm">취소</button>
              <button onClick={handleSave} className="px-6 py-2 bg-letusBlue text-white text-xs font-bold rounded-lg shadow-sm hover:bg-blue-600">일정 등록</button>
            </div>
          </div>

          {isTeamModalOpen && (
            <TeamSearchModal
              initialTeams={collabTeams}
              onApply={setCollabTeams}
              onClose={() => setIsTeamModalOpen(false)}
            />
          )}
        </div>
      );
    };

    // --- 🏠 MY DASHBOARD (개인 맞춤형 DIY 화면) ---
    const MyDashboard = ({ userProfile, setPage, favorites }) => {
      const [isLoading, setIsLoading] = useState(true);
      const [stats, setStats] = useState({
        todoIssues: 0, todoAccidents: 0, doneIssues: 0, doneAccidents: 0
      });

      const [widgets, setWidgets] = useState(() => {
        const saved = localStorage.getItem(`letus_widgets_${userProfile?.id}`);
        return saved ? JSON.parse(saved) : ['issue_todo', 'acc_todo', null, null, null, null];
      });

      const [todos, setTodos] = useState(() => {
        const saved = localStorage.getItem(`letus_todos_${userProfile?.id}`);
        const parsed = saved ? JSON.parse(saved) : [];
        return parsed.map(t => ({ ...t, priority: t.priority || '4', repeat: t.repeat || [] }));
      });

      const [isTodoModalOpen, setIsTodoModalOpen] = useState(false);
      const [editingTodo, setEditingTodo] = useState(null);

      const [currentDate, setCurrentDate] = useState(new Date());

      // 🔥 캘린더 일정 상태 추가 (로컬스토리지 저장)
      const [calendarEvents, setCalendarEvents] = useState(() => {
        const saved = localStorage.getItem(`letus_events_${userProfile?.id}`);
        return saved ? JSON.parse(saved) : [];
      });
      const [isCalendarModalOpen, setIsCalendarModalOpen] = useState(false);
      const [selectedDateForEvent, setSelectedDateForEvent] = useState('');

      const [isWidgetModalOpen, setIsWidgetModalOpen] = useState(false);
      const [selectedSlotIndex, setSelectedSlotIndex] = useState(null);

      const MENU_NAMES = {
        dashboard: '대시보드', list: '특이사항 LIST', accident_dashboard: '사고분석 대시보드', accident_list: '사고분석 LIST',
        user_management: '사용자 관리', product_manager: 'ITEM DB 수동 업데이트', support: '지원센터'
      };

      useEffect(() => { if (userProfile) localStorage.setItem(`letus_widgets_${userProfile.id}`, JSON.stringify(widgets)); }, [widgets, userProfile]);
      useEffect(() => { if (userProfile) localStorage.setItem(`letus_todos_${userProfile.id}`, JSON.stringify(todos)); }, [todos, userProfile]);
      useEffect(() => { if (userProfile) localStorage.setItem(`letus_events_${userProfile.id}`, JSON.stringify(calendarEvents)); }, [calendarEvents, userProfile]);

      useEffect(() => {
        const fetchMyData = async () => {
          if (!userProfile) return;
          setIsLoading(true);
          try {
            const myBrands = userProfile.managed_brands ? userProfile.managed_brands.split(',').map(s => s.trim()) : [];
            const myVendors = userProfile.managed_vendors ? userProfile.managed_vendors.split(',').map(s => s.trim()) : [];

            let issueQuery = supabase.from('logistics_issues').select('id', { count: 'exact' }).in('status', ['조치대기', '처리 중']);
            if (userProfile.role !== '관리자') {
              if (myBrands.length > 0 && !myBrands.includes('전체')) issueQuery = issueQuery.in('brand', myBrands);
              if (myVendors.length > 0) issueQuery = issueQuery.in('vendor', myVendors);
            }
            const { count: issueCount } = await issueQuery;

            let accQuery = supabase.from('logistics_accidents').select('id', { count: 'exact' }).eq('status', '원인 파악 중');
            if (userProfile.role !== '관리자' && userProfile.team) accQuery = accQuery.eq('responsible_dept', userProfile.team);
            const { count: accCount } = await accQuery;

            const firstDay = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
            const { count: doneIssueCount } = await supabase.from('logistics_issues').select('id', { count: 'exact' }).eq('final_handler', userProfile.name).gte('resolved_at', firstDay);
            const { count: doneAccCount } = await supabase.from('logistics_accidents').select('id', { count: 'exact' }).eq('handler_name', userProfile.name).gte('updated_at', firstDay);

            setStats({ todoIssues: issueCount || 0, todoAccidents: accCount || 0, doneIssues: doneIssueCount || 0, doneAccidents: doneAccCount || 0 });
          } catch (err) { console.error(err); } finally { setIsLoading(false); }
        };
        fetchMyData();
      }, [userProfile]);

      const handleSaveTodo = (savedTodo) => {
        if (editingTodo) setTodos(todos.map(t => t.id === savedTodo.id ? savedTodo : t));
        else setTodos([savedTodo, ...todos]);
        setIsTodoModalOpen(false);
        setEditingTodo(null);
      };

      const handleDeleteTodo = (id) => setTodos(todos.filter(t => t.id !== id));
      const toggleTodoDone = (id) => setTodos(todos.map(t => t.id === id ? { ...t, isDone: !t.isDone } : t));

      const priorityWeight = { '긴급': 0, '1': 1, '2': 2, '3': 3, '4': 4 };
      const sortedTodos = [...todos].sort((a, b) => {
        if (a.isDone !== b.isDone) return a.isDone ? 1 : -1;
        const pA = priorityWeight[a.priority] ?? 4;
        const pB = priorityWeight[b.priority] ?? 4;
        if (pA !== pB) return pA - pB;
        return b.id - a.id;
      });

      const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
      const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
      const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

      const openWidgetModal = (index) => { setSelectedSlotIndex(index); setIsWidgetModalOpen(true); };
      const selectWidget = (type) => {
        const newWidgets = [...widgets];
        newWidgets[selectedSlotIndex] = type;
        setWidgets(newWidgets);
        setIsWidgetModalOpen(false);
      };
      const removeWidget = (index) => {
        const newWidgets = [...widgets];
        newWidgets[index] = null;
        setWidgets(newWidgets);
      };

      const handleSaveEvent = (newEvent) => {
        setCalendarEvents([...calendarEvents, newEvent]);
        setIsCalendarModalOpen(false);
      };

      const availableWidgets = [
        { id: 'issue_todo', title: '입고 이슈 (대기)', icon: '📦', color: 'blue' },
        { id: 'acc_todo', title: '상차 사고 (대기)', icon: '🚚', color: 'orange' },
        { id: 'issue_done', title: '입고 처리 실적', icon: '✅', color: 'green' },
        { id: 'acc_done', title: '상차 마감 실적', icon: '🏆', color: 'purple' },
        { id: 'favorites', title: '⭐ 즐겨찾기', icon: '⭐', color: 'yellow' },
      ];

      const renderWidget = (type, index) => {
        if (!type) {
          return (
            <div onClick={() => openWidgetModal(index)} className="h-28 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-letusBlue hover:bg-blue-50 transition-all group">
              <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 group-hover:bg-letusBlue group-hover:text-white transition-colors mb-1">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" /></svg>
              </div>
              <span className="text-[10px] font-bold text-gray-400 group-hover:text-letusBlue">위젯 추가</span>
            </div>
          );
        }

        const closeBtn = (
          <button onClick={(e) => { e.stopPropagation(); removeWidget(index); }} className="absolute top-0 right-0 p-3 opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all z-10">
            <CloseIcon />
          </button>
        );

        if (type === 'favorites') {
          return (
            <div className="h-28 bg-white rounded-xl shadow-sm border border-slate-200 p-3 relative group flex flex-col">
              {closeBtn}
              <span className="text-[11px] font-bold text-gray-500 mb-2 block">⭐ 즐겨찾기</span>
              <div className="flex flex-col gap-1 overflow-y-auto custom-scrollbar flex-1">
                {(!favorites || favorites.length === 0) ? <span className="text-[10px] text-gray-400">등록된 항목 없음</span> : favorites.slice(0, 3).map(favId => (
                  <div key={favId} onClick={() => setPage(favId)} className="text-[10px] font-bold text-gray-700 bg-gray-50 hover:bg-yellow-50 hover:text-yellow-600 px-2 py-1 rounded cursor-pointer truncate transition-colors border border-transparent hover:border-yellow-200 pr-5">
                    {MENU_NAMES[favId] || favId}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        const WIDGET_UI = {
          issue_todo: { title: '입고 대기건', count: stats.todoIssues, color: 'blue', onClick: () => setPage('list') },
          acc_todo: { title: '사고 대기건', count: stats.todoAccidents, color: 'orange', onClick: () => setPage('accident_list') },
          issue_done: { title: '이번달 입고처리', count: stats.doneIssues, color: 'green', onClick: () => { } },
          acc_done: { title: '이번달 사고마감', count: stats.doneAccidents, color: 'purple', onClick: () => { } },
        };

        const conf = WIDGET_UI[type];
        if (!conf) return null;

        const colorClasses = {
          blue: 'text-blue-600 bg-blue-50 border-blue-100 hover:border-blue-300',
          orange: 'text-orange-600 bg-orange-50 border-orange-100 hover:border-orange-300',
          green: 'text-green-600 bg-green-50 border-green-100 hover:border-green-300',
          purple: 'text-purple-600 bg-purple-50 border-purple-100 hover:border-purple-300'
        };

        return (
          <div className={`h-28 rounded-xl shadow-sm border p-3.5 relative group flex flex-col justify-between cursor-pointer transition-all ${colorClasses[conf.color]}`} onClick={conf.onClick}>
            {closeBtn}
            <span className="text-[11px] font-bold opacity-80">{conf.title}</span>
            <div className="flex items-baseline justify-between mt-auto">
              <span className="text-3xl font-black leading-none">{conf.count}</span>
              <span className="text-[10px] font-bold opacity-60">건</span>
            </div>
          </div>
        );
      };

      const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
      const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());
      const blanks = Array.from({ length: firstDay }, (_, i) => i);
      const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === currentDate.getFullYear() && today.getMonth() === currentDate.getMonth();

      if (isLoading) return <div className="p-6 h-[calc(100vh-64px)] flex items-center justify-center"><div className="animate-spin w-8 h-8 border-4 border-blue-100 border-t-letusBlue rounded-full"></div></div>;

      return (
        <div className="p-6 bg-slate-100 min-h-[calc(100vh-64px)] slide-up flex flex-col gap-6 max-w-[1600px] mx-auto">

          {/* 🔥 수정: 인사말 우측으로 시원하게 뻗어나가는 100% 가로 확장형 배너 */}
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden shrink-0">
            <div className="absolute top-0 right-0 w-64 h-64 bg-gradient-to-bl from-blue-50 to-transparent rounded-bl-full -mr-10 -mt-10 pointer-events-none"></div>

            {/* 1. 인사말 (왼쪽 영역 - 너비 고정) */}
            <div className="flex flex-col z-10 shrink-0 md:min-w-[280px] w-full md:w-auto">
              <span className="text-letusBlue font-bold text-xs mb-1 block">{userProfile?.team || 'LETUS'} 소속</span>
              <h2 className="text-2xl font-black text-gray-900 tracking-tight">반갑습니다, <span className="text-letusOrange">{userProfile?.name}</span>님! 👋</h2>
              <p className="text-gray-500 font-medium text-sm mt-2">오늘도 성공적인 물류 관리를 응원합니다.</p>
            </div>

            {/* 2. 담당 브랜드/업체 (오른쪽 영역 - 남는 공간 100% 꽉 채우기) */}
            <div className="flex flex-col gap-3 z-10 flex-1 w-full justify-center">
              <div className="bg-orange-50/80 border border-orange-100 rounded-lg px-5 py-3 flex flex-col w-full">
                <span className="text-xs font-black text-orange-400 mb-1.5">담당 브랜드</span>
                <span className="text-[13px] font-bold text-gray-800 truncate" title={userProfile?.managed_brands || '전체 (권한없음)'}>
                  {userProfile?.managed_brands || '전체 (권한없음)'}
                </span>
              </div>
              <div className="bg-blue-50/80 border border-blue-100 rounded-lg px-5 py-3 flex flex-col w-full">
                <span className="text-xs font-black text-blue-400 mb-1.5">담당 업체</span>
                <span className="text-[13px] font-bold text-gray-800 truncate" title={userProfile?.managed_vendors || '전체 (권한없음)'}>
                  {userProfile?.managed_vendors || '전체 (권한없음)'}
                </span>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 shrink-0">
            {widgets.map((type, index) => <React.Fragment key={index}>{renderWidget(type, index)}</React.Fragment>)}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-6 gap-6 flex-1 min-h-[400px]">

            {/* TO DO 구역 */}
            <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col h-full relative">
              <div className="flex justify-between items-center mb-5 shrink-0">
                <h3 className="font-bold text-gray-800 text-sm flex items-center gap-2">
                  📝 나의 TODO
                  <span className="bg-blue-50 text-letusBlue text-[10px] px-2 py-0.5 rounded font-black">{todos.filter(t => !t.isDone).length}개 남음</span>
                </h3>
                <button onClick={() => { setEditingTodo(null); setIsTodoModalOpen(true); }} className="bg-gray-100 hover:bg-letusBlue hover:text-white text-gray-500 w-7 h-7 rounded-full flex items-center justify-center transition-colors shadow-sm">
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" /></svg>
                </button>
              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-2.5">
                {sortedTodos.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
                    <span className="text-3xl mb-2">💡</span>
                    <span className="text-[11px] font-bold">등록된 할 일이 없습니다.</span>
                  </div>
                ) : (
                  sortedTodos.map(todo => (
                    <div key={todo.id} className={`flex flex-col p-3 rounded-lg border transition-all ${todo.isDone ? 'bg-gray-50 border-gray-100 opacity-70' : 'bg-white border-gray-200 hover:border-letusBlue/50 hover:shadow-sm'}`}>
                      <div className="flex items-start gap-3">
                        <input type="checkbox" checked={todo.isDone} onChange={() => toggleTodoDone(todo.id)} className="w-4 h-4 accent-letusBlue shrink-0 mt-0.5 cursor-pointer" />
                        <div className="flex-1 overflow-hidden cursor-pointer" onClick={() => { setEditingTodo(todo); setIsTodoModalOpen(true); }}>
                          <div className="flex items-center gap-2 mb-1">
                            {todo.priority === '긴급' ? <span className="bg-red-100 text-red-600 text-[9px] font-black px-1.5 py-0.5 rounded-sm">긴급</span> :
                              todo.priority !== '4' ? <span className="bg-orange-50 text-orange-500 text-[9px] font-bold px-1.5 py-0.5 rounded-sm border border-orange-100">{todo.priority}순위</span> : null}
                            <span className={`text-[13px] font-bold truncate block ${todo.isDone ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{todo.text}</span>
                          </div>
                          {todo.repeat && todo.repeat.length > 0 && (
                            <div className="flex items-center gap-1 mt-1.5">
                              <svg className="w-3 h-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                              <span className="text-[10px] text-gray-500 font-medium">매주 {todo.repeat.join(', ')}요일</span>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* 달력 구역 */}
            <div className="lg:col-span-4 bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col h-full relative">
              <div className="flex justify-between items-center mb-5 shrink-0">
                <h3 className="font-bold text-gray-800 text-sm flex items-center gap-2">📅 업무 캘린더</h3>
                <div className="flex items-center gap-3 bg-slate-50 border border-slate-100 rounded-lg px-2 py-1">
                  <button onClick={prevMonth} className="p-1 text-gray-500 hover:text-letusBlue transition-colors"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 19l-7-7 7-7" /></svg></button>
                  <span className="text-xs font-bold text-gray-700 min-w-[70px] text-center">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</span>
                  <button onClick={nextMonth} className="p-1 text-gray-500 hover:text-letusBlue transition-colors"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" /></svg></button>
                </div>
              </div>

              <div className="flex-1 flex flex-col border border-gray-100 rounded-lg overflow-hidden bg-gray-50/30">
                <div className="grid grid-cols-7 border-b border-gray-200 bg-gray-100/50 shrink-0">
                  {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                    <div key={day} className={`py-2 text-center text-[10px] font-black ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-500'}`}>{day}</div>
                  ))}
                </div>
                <div className="grid grid-cols-7 flex-1 auto-rows-fr bg-white">
                  {blanks.map(b => <div key={`b-${b}`} className="border-r border-b border-gray-100 bg-gray-50/50 min-h-[60px]"></div>)}

                  {days.map(day => {
                    const isToday = isCurrentMonth && day === today.getDate();
                    const dateStr = `${currentDate.getFullYear()}-${(currentDate.getMonth() + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;

                    // 🔥 현재 날짜에 속하는 일정 필터링
                    const dayEvents = calendarEvents.filter(e => dateStr >= e.startDate && dateStr <= e.endDate);

                    return (
                      <div key={day} className="border-r border-b border-gray-100 p-1.5 flex flex-col relative group transition-colors hover:bg-blue-50/30 min-h-[60px]">
                        <span className={`text-[11px] font-bold w-6 h-6 flex items-center justify-center rounded-full mb-1 ${isToday ? 'bg-letusBlue text-white shadow-sm' : 'text-gray-600'}`}>
                          {day}
                        </span>

                        {/* 🔥 3. 초과 일정 오버플로우 처리 로직 (최대 2개만 표시, 넘어가면 '+N 더보기') */}
                        <div className="flex flex-col gap-0.5 overflow-hidden flex-1">
                          {dayEvents.slice(0, 2).map((ev, idx) => (
                            <div key={idx} className={`text-[9px] truncate px-1.5 py-0.5 rounded font-bold border cursor-help ${ev.isImportant ? 'bg-red-50 text-red-600 border-red-200' : 'bg-blue-50 text-blue-600 border-blue-100'}`} title={`${ev.startTime} ~ ${ev.endTime} | ${ev.title}`}>
                              {ev.title}
                            </div>
                          ))}
                          {dayEvents.length > 2 && (
                            <div className="text-[9px] font-bold text-gray-400 mt-0.5 text-center bg-gray-50 border border-gray-100 rounded py-0.5 cursor-pointer hover:bg-gray-100">
                              +{dayEvents.length - 2} 더보기
                            </div>
                          )}
                        </div>

                        {/* 마우스 올리면 나오는 일정 추가 버튼 */}
                        <button
                          onClick={() => { setSelectedDateForEvent(dateStr); setIsCalendarModalOpen(true); }}
                          className="absolute top-1.5 right-1.5 opacity-0 group-hover:opacity-100 transition-opacity text-gray-400 hover:text-letusBlue bg-white rounded-full p-0.5"
                          title="일정 추가"
                        >
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" /></svg>
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

          </div>

          {isWidgetModalOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
              <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsWidgetModalOpen(false)}></div>
              <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-sm slide-up border border-gray-100 overflow-hidden flex flex-col">
                <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                  <h3 className="font-bold text-sm text-gray-800">위젯 선택</h3>
                  <button onClick={() => setIsWidgetModalOpen(false)} className="p-1 text-gray-400 hover:text-gray-600"><CloseIcon /></button>
                </div>
                <div className="p-4 flex flex-col gap-2">
                  {availableWidgets.map(w => {
                    const isAdded = widgets.includes(w.id);
                    return (
                      <button key={w.id} onClick={() => !isAdded && selectWidget(w.id)} disabled={isAdded} className={`flex items-center p-3 rounded-lg border text-left transition-colors ${isAdded ? 'bg-gray-50 border-gray-100 opacity-60 cursor-not-allowed' : 'bg-white border-gray-200 hover:border-letusBlue hover:bg-blue-50 cursor-pointer'}`}>
                        <span className="text-2xl mr-3">{w.icon}</span>
                        <div className="flex-1">
                          <span className="text-[13px] font-bold text-gray-800 block">{w.title}</span>
                          <span className="text-[10px] text-gray-500">{isAdded ? '이미 추가된 위젯입니다' : '클릭하여 추가하기'}</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {isTodoModalOpen && (
            <TodoModal
              todo={editingTodo}
              onClose={() => { setIsTodoModalOpen(false); setEditingTodo(null); }}
              onSave={handleSaveTodo}
              onDelete={handleDeleteTodo}
            />
          )}

          {/* 🔥 캘린더 모달 연결 */}
          {isCalendarModalOpen && (
            <CalendarEventModal
              selectedDate={selectedDateForEvent}
              onClose={() => setIsCalendarModalOpen(false)}
              onSave={handleSaveEvent}
            />
          )}

        </div>
      );
    };

    // --- 대시보드 (Dashboard) ---
    const Dashboard = ({ onNavigateToList, onDrillDown, issues = [], isLoading = false, onReload }) => {
      const [selectedBrands, setSelectedBrands] = useState([]);

      // 🔥 1. 날짜 필터 상태 (기본값: 'W' 주간)
      const [filterType, setFilterType] = useState('W'); // 'D', 'W', 'M', 'CUSTOM'

      // 🔥 2. 오늘 날짜 구하기 (YYYY-MM-DD 폼)
      const getTodayStr = () => {
        const d = new Date();
        const pad = n => n.toString().padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      };

      const [customDate, setCustomDate] = useState({ start: getTodayStr(), end: getTodayStr() });

      // 🔥 3. 버튼에 따른 날짜 계산 로직
      const getFilterDates = () => {
        const now = new Date();
        const pad = n => n.toString().padStart(2, '0');
        const format = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

        if (filterType === 'D') {
          // 당일
          const today = format(now);
          return { startDate: today, endDate: today, label: '당일 기준' };
        }
        else if (filterType === 'W') {
          // 해당 주 (월요일 ~ 일요일)
          const day = now.getDay();
          const diffToMonday = now.getDate() - day + (day === 0 ? -6 : 1); // 일요일(0)이면 -6일, 아니면 월요일로 맞춤
          const monday = new Date(now);
          monday.setDate(diffToMonday);
          const sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);
          return { startDate: format(monday), endDate: format(sunday), label: '이번 주 기준' };
        }
        else if (filterType === 'M') {
          // 해당 월 (1일 ~ 말일)
          const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
          const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0); // 다음 달의 0번째 날 = 이번 달 말일
          return { startDate: format(firstDay), endDate: format(lastDay), label: '이번 달 기준' };
        }
        else {
          // 사용자 지정
          return { startDate: customDate.start, endDate: customDate.end, label: '사용자 지정 기간' };
        }
      };

      const { startDate, endDate, label } = getFilterDates();

      const toggleBrand = (brand) => {
        if (selectedBrands.includes(brand)) {
          setSelectedBrands(selectedBrands.filter(b => b !== brand));
        } else {
          if (selectedBrands.length >= 6) return;
          setSelectedBrands([...selectedBrands, brand]);
        }
      };

      // 🔥 선택된 기간으로 전체 데이터 필터링 (글로벌 필터 적용)
      const dashboardIssues = issues.filter(issue => {
        if (!issue.created_at) return false;
        const issueDate = issue.created_at.split('T')[0];
        return issueDate >= startDate && issueDate <= endDate;
      });

      const displayBrands = ['퍼시스', '일룸', '시디즈', '슬로우베드', '알로소', '데스커'];
      const brandStatsDetails = displayBrands.reduce((acc, brand) => {
        acc[brand] = { pending: 0, processing: 0, completed: 0 };
        return acc;
      }, {});

      dashboardIssues.forEach(issue => {
        if (brandStatsDetails[issue.brand]) {
          if (issue.status === '조치대기') brandStatsDetails[issue.brand].pending += 1;
          if (issue.status === '처리 중') brandStatsDetails[issue.brand].processing += 1;
          if (issue.status === '조치완료') brandStatsDetails[issue.brand].completed += 1;
        }
      });

      const targetIssues = selectedBrands.length > 0
        ? dashboardIssues.filter(issue => selectedBrands.includes(issue.brand))
        : dashboardIssues;

      // 파이 차트 (특이사항 유형)
      const chartStats = {};
      targetIssues.forEach(issue => {
        const type = issue.issue_type || '기타';
        chartStats[type] = (chartStats[type] || 0) + 1;
      });

      const totalIssues = Object.values(chartStats).reduce((a, b) => a + b, 0);
      const pieData = totalIssues === 0
        ? [{ name: '데이터 없음', value: 1, isEmpty: true }]
        : Object.entries(chartStats).map(([k, v]) => ({ name: k, value: v }));

      // 바 차트 (공급업체)
      const supplierStats = {};
      targetIssues.forEach(issue => {
        const vendor = issue.vendor || issue.brand || '미상';
        supplierStats[vendor] = (supplierStats[vendor] || 0) + 1;
      });

      const supplierTotal = Object.values(supplierStats).reduce((a, b) => a + b, 0);
      const sortedSuppliers = Object.entries(supplierStats).sort((a, b) => b[1] - a[1]);

      return (
        <div className="p-6 space-y-6 slide-up">

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow shrink-0">
            {/* 🔥 마스터 날짜 필터 컨트롤러 영역 */}
            <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-6 gap-4">
              <div>
                <h3 className="text-lg font-bold text-gray-900 font-sans flex items-center gap-2">
                  브랜드별 특이사항 처리 현황
                  <span className="bg-blue-50 text-letusBlue text-[10px] px-2 py-0.5 rounded border border-blue-100 font-black">{label}</span>
                </h3>
                <p className="text-xs text-gray-400 font-medium mt-1.5">조회 기간: {startDate} ~ {endDate}</p>
              </div>

              {/* 글로벌 날짜 토글 버튼 */}
              <div className="flex items-center gap-2">
                {/* 사용자 지정 시 나타나는 달력 폼 */}
                {filterType === 'CUSTOM' && (
                  <div className="flex items-center bg-gray-50 border border-gray-200 rounded-lg p-1 animate-fade-in shadow-sm">
                    <input type="date" value={customDate.start} onChange={e => setCustomDate({ ...customDate, start: e.target.value })} className="bg-transparent text-xs text-gray-700 font-bold focus:outline-none cursor-pointer px-1 w-[110px]" />
                    <span className="text-gray-400 text-xs mx-1">~</span>
                    <input type="date" value={customDate.end} onChange={e => setCustomDate({ ...customDate, end: e.target.value })} className="bg-transparent text-xs text-gray-700 font-bold focus:outline-none cursor-pointer px-1 w-[110px]" />
                  </div>
                )}

                {/* D, W, M, 사용자지정 세그먼트 컨트롤 */}
                <div className="flex bg-gray-100 p-1 rounded-lg border border-gray-200 shadow-inner">
                  {[
                    { id: 'D', name: '당일' },
                    { id: 'W', name: '주간' },
                    { id: 'M', name: '월간' },
                    { id: 'CUSTOM', name: '직접지정' }
                  ].map(btn => (
                    <button
                      key={btn.id}
                      onClick={() => setFilterType(btn.id)}
                      className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${filterType === btn.id ? 'bg-white text-letusBlue shadow-sm ring-1 ring-black/5' : 'text-gray-500 hover:text-gray-800'}`}
                    >
                      {btn.name}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
              {displayBrands.map(brand => {
                const stats = brandStatsDetails[brand];
                const isSelected = selectedBrands.includes(brand);
                return (
                  <div
                    key={brand}
                    onClick={() => toggleBrand(brand)}
                    className={`rounded-xl px-5 py-4 flex items-center border text-sm cursor-pointer transition-all ${isSelected
                      ? 'bg-orange-50 border-orange-400 shadow-sm ring-1 ring-orange-400/50'
                      : 'bg-gray-50/60 border-gray-100 hover:border-gray-200 hover:bg-gray-100'
                      }`}
                  >
                    <div style={{ width: '31%' }} className={`font-bold tracking-tight whitespace-nowrap truncate pr-2 ${isSelected ? 'text-orange-700' : 'text-gray-800'}`}>
                      {brand}
                    </div>

                    <div className="flex items-center flex-1">
                      {/* 날짜 데이터까지 같이 넘겨주는 드릴다운 이벤트 */}
                      <div style={{ width: '33.33%' }} className="flex justify-between items-center pr-3 sm:pr-4 border-r border-gray-200">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">조치대기</span>
                        <span className="text-red-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '조치대기', startDate, endDate }); }}>{stats.pending}</span>
                      </div>

                      <div style={{ width: '33.33%' }} className="flex justify-between items-center px-3 sm:px-4 border-r border-gray-200">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">처리 중</span>
                        <span className="text-yellow-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '처리 중', startDate, endDate }); }}>{stats.processing}</span>
                      </div>

                      <div style={{ width: '33.33%' }} className="flex justify-between items-center pl-3 sm:pl-4">
                        <span className="text-gray-400 font-medium whitespace-nowrap text-xs sm:text-sm">조치완료</span>
                        <span className="text-green-500 font-bold text-base sm:text-lg cursor-pointer hover:underline" onClick={(e) => { e.stopPropagation(); onDrillDown({ brand, status: '조치완료', startDate, endDate }); }}>{stats.completed}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition-shadow">
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-900 font-sans">특이사항 유형</h3>
              </div>
              <div className="flex-1 flex items-center justify-center gap-8 xl:gap-14 w-full h-[220px] mt-2">
                <div className="relative w-56 h-56 flex items-center justify-center">
                  {PieChart ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={pieData}
                          cx="50%"
                          cy="50%"
                          innerRadius={65}
                          outerRadius={95}
                          paddingAngle={totalIssues === 0 ? 0 : 4}
                          cornerRadius={totalIssues === 0 ? 0 : 8}
                          dataKey="value"
                          stroke="none"
                        >
                          {pieData.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.isEmpty ? '#e5e7eb' : (CATEGORY_COLORS[entry.name] || '#aaaaaa')} />
                          ))}
                        </Pie>
                        {totalIssues > 0 && (
                          <Tooltip
                            contentStyle={{ borderRadius: '8px', border: '1px solid #f3f4f6', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)', fontSize: '13px' }}
                            itemStyle={{ color: '#1f2937', fontWeight: 'bold' }}
                          />
                        )}
                      </PieChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="text-[11px] font-bold text-red-500 bg-red-50 rounded-full w-40 h-40 flex items-center justify-center shadow-inner border border-red-200 text-center leading-relaxed">
                      Chart Module<br />Loading Failed
                    </div>
                  )}

                  <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span className={`text-[28px] font-black leading-tight ${totalIssues === 0 ? 'text-gray-300' : 'text-gray-900'}`}>{totalIssues}</span>
                    <span className="text-xs font-semibold text-gray-500">총 발생건</span>
                  </div>
                </div>

                <div className="space-y-3">
                  {totalIssues === 0 ? (
                    <div className="text-sm text-gray-400 font-bold ml-4">해당 기간 데이터가 없습니다.</div>
                  ) : (
                    Object.entries(chartStats).map(([k, v]) => (
                      <div key={k} className="flex justify-between items-center w-48 text-sm">
                        <div className="flex items-center text-gray-600 font-medium whitespace-nowrap">
                          <span className="w-2.5 h-2.5 rounded-full mr-3" style={{ backgroundColor: CATEGORY_COLORS[k] || '#d1d5db' }}></span>{k}
                        </div>
                        <div className="font-bold text-gray-900">{v}<span className="text-xs text-gray-400 font-normal ml-0.5">건</span></div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition-shadow">
              <div className="mb-6">
                <h3 className="text-lg font-bold text-gray-900 font-sans">공급업체별 이슈 비율 (Top 5)</h3>
              </div>
              <div className="flex-1 flex flex-col justify-center space-y-6 px-4">
                {supplierTotal === 0 ? (
                  <div className="text-center text-sm text-gray-400 font-bold py-10">해당 기간 등록된 이슈가 없습니다.</div>
                ) : (
                  sortedSuppliers.slice(0, 5).map(([vendor, count], idx) => {
                    const percent = ((count / supplierTotal) * 100).toFixed(1);
                    return (
                      <div key={vendor} className="flex items-center text-sm group" title={`${vendor}: ${count}건 (${percent}%)`}>
                        <span className="w-24 text-gray-600 font-semibold truncate text-right mr-4">{vendor}</span>
                        <div className="flex-1 h-5 rounded overflow-hidden bg-gray-100 relative cursor-pointer">
                          <div className="h-full rounded-r transition-all duration-1000 ease-out" style={{ width: `${percent}%`, backgroundColor: BRAND_COLORS[idx % BRAND_COLORS.length] }}></div>
                        </div>
                        <span className="w-12 text-right text-xs font-bold text-gray-500 ml-3">{percent}%</span>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
            <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
              <div className="flex items-center">
                <svg className="w-5 h-5 text-gray-700 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <h3 className="text-lg font-bold text-gray-900">해당 기간 특이사항 리스트</h3>
              </div>
              <button onClick={onNavigateToList} className="text-sm font-semibold text-letusBlue hover:text-blue-700 transition-colors flex items-center">
                전체보기 <svg className="w-4 h-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
              </button>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left whitespace-nowrap">
                <thead className="bg-white border-b border-gray-200 text-xs font-bold text-gray-500">
                  <tr>
                    <th className="p-4 pl-6">입고번호</th>
                    <th className="p-4">발생시간</th>
                    <th className="p-4">공급사</th>
                    <th className="p-4">품목정보</th>
                    <th className="p-4">특이유형</th>
                    <th className="p-4 text-center">처리상태</th>
                    <th className="p-4 text-center">관리</th>
                  </tr>
                </thead>
                {isLoading ? (
                  <TableSkeleton rowCount={5} colCount={7} />
                ) : (
                  <tbody className="divide-y divide-gray-100 text-sm">
                    {dashboardIssues.length === 0 ? (
                      <tr>
                        <td colSpan="7" className="p-8 text-center text-gray-400 font-bold text-xs">
                          해당 기간에 발생한 특이사항이 없습니다.
                        </td>
                      </tr>
                    ) : (
                      [...dashboardIssues]
                        .sort((a, b) => {
                          if (a.status === '조치대기' && b.status !== '조치대기') return -1;
                          if (a.status !== '조치대기' && b.status === '조치대기') return 1;
                          return 0;
                        })
                        .slice(0, 6)
                        .map((row, idx) => (
                          <tr key={row.reception_no || idx} className="hover:bg-gray-50 transition-colors">
                            <td className="p-4 pl-6 text-gray-800 font-semibold">{row.reception_no}</td>
                            <td className="p-4 text-gray-500 font-mono">{row.created_at ? new Date(row.created_at).toLocaleDateString() : '-'}</td>
                            <td className="p-4 font-semibold text-gray-700">{row.vendor || '-'}</td>
                            <td className="p-4 text-gray-600 truncate max-w-xs">{row.product_code}</td>
                            <td className="p-4"><CategoryBadge category={row.issue_type} /></td>
                            <td className="p-4 text-center"><StatusBadge status={row.status} category={row.issue_type} /></td>
                            <td className="p-4 text-center">
