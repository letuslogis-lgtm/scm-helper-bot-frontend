<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LETUS LOGIS</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            letusBg: '#f5f7fa',
            letusSidebar: '#273444',
            letusBlue: '#4b89ff',
            letusOrange: '#f58220',
          },
          fontFamily: { sans: ['Pretendard', '-apple-system', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    body {
      background-color: #f5f7fa;
      margin: 0;
      padding: 0;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    .slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;

    // --- Recharts 컴포넌트 ---
    const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = window.Recharts || {};

    const BRANDS = ['(주)한국물류', '글로벌테크', '퍼시스', '일룸', '스마트패키징', '에이스코리아'];

    // --- 범용 컴포넌트 ---
    const TableSkeleton = ({ colCount = 7 }) => (
      <tbody className="bg-white">
        <tr>
          {/* text-center 제거하고 내부 div에서 위치를 제어합니다 */}
          <td colSpan={colCount} className="py-24">
            {/* 🔥 w-full과 sticky left-0을 줘서 스크롤을 움직여도 항상 화면 한가운데 오도록 고정! */}
            <div className="flex flex-col items-center justify-center animate-pulse w-full sticky left-0">
              <svg className="w-8 h-8 text-letusBlue mb-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <p className="text-gray-500 font-bold text-sm tracking-tight">데이터를 불러오는 중입니다...</p>
            </div>
          </td>
        </tr>
      </tbody>
    );

    const CloseIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
    );

    const CATEGORY_COLORS = {
      '파손 및 불량': '#ef4444',
      '제품 파손': '#f87171',
      '박스 훼손': '#fb923c',
      '박스훼손': '#fb923c',
      '바코드 불량': '#eab308',
      '계획 이슈': '#3b82f6',
      '계획 미생성': '#60a5fa',
      '계획 부족(실물 과다)': '#818cf8',
      '계획 과다(실물 부족)': '#c084fc',
      '기타 특이사항': '#9ca3af',
      '기타': '#9ca3af',
      '파손': '#ef4444',
      '수량부족': '#facc15',
      '오입고': '#22c55e',
      '품질불량': '#3b82f6'
    };
    const BRAND_COLORS = ['#22c55e', '#14b8a6', '#3b82f6', '#8b5cf6', '#f97316', '#ef4444'];

    const StatusBadge = ({ status, category }) => {
      let bg = '', text = '', icon = null;
      if (status === '조치대기') { bg = 'bg-red-50 border-red-200'; text = 'text-red-500'; }
      if (status === '처리 중') { bg = 'bg-yellow-50 border-yellow-300'; text = 'text-yellow-600'; }
      if (status === '조치완료') { bg = 'bg-green-50 border-green-200'; text = 'text-green-600'; }
      if (status === '피드백완료') {
        bg = 'bg-blue-50 border-blue-200';
        text = 'text-blue-600';
        icon = <svg className="w-3 h-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>;
      }
      return (
        <span className={`inline-flex outline-none items-center px-2 py-1 rounded-full text-xs font-bold border shadow-sm ${bg} ${text} justify-center`}>
          {icon}
          {status}
        </span>
      );
    };

    const CategoryBadge = ({ category }) => {
      const color = CATEGORY_COLORS[category] || '#9ca3af';
      return (
        <div className="flex items-center">
          <span className="w-2 h-2 rounded-full mr-2" style={{ backgroundColor: color }}></span>
          <span className="text-sm text-gray-700">{category}</span>
        </div>
      );
    }

    const formatDateTime = (isoString) => {
      if (!isoString) return '-';
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return '-';
      const pad = n => n.toString().padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    };

    const ImageSlider = ({ imageUrlString }) => {
      const urls = imageUrlString ? imageUrlString.split(',').map(s => s.trim()).filter(Boolean) : [];
      const [currentIndex, setCurrentIndex] = React.useState(0);

      if (urls.length === 0) {
        return (
          <div className="w-full h-full min-h-[400px] bg-gray-50 rounded-lg border border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-sm font-medium">
            첨부된 사진이 없습니다
          </div>
        );
      }

      return (
        <div className="flex flex-col items-center gap-3 w-full h-full">
          <div className="relative w-full h-[400px] flex items-center justify-center bg-gray-50 rounded-lg border border-gray-200 overflow-hidden group">
            <img
              src={urls[currentIndex]}
              alt={`현장사진 ${currentIndex + 1}`}
              className="w-full h-full object-contain transition-opacity duration-300"
            />

            {urls.length > 1 && (
              <div className="absolute top-4 right-4 bg-black/60 text-white text-xs font-bold px-2 py-1 rounded-md backdrop-blur-sm">
                {currentIndex + 1} / {urls.length}
              </div>
            )}
          </div>

          {urls.length > 1 && (
            <div className="flex bg-gray-100 px-3 py-1.5 rounded-full gap-2 border border-gray-200 shadow-inner">
              {urls.map((_, idx) => (
                <button
                  key={idx}
                  onClick={(e) => { e.preventDefault(); e.stopPropagation(); setCurrentIndex(idx); }}
                  className={`w-1.5 h-1.5 rounded-full outline-none transition-all ${idx === currentIndex ? 'bg-letusBlue scale-125' : 'bg-gray-300 hover:bg-gray-400'}`}
                />
              ))}
            </div>
          )}
        </div>
      );
    };

    const RequestModal = ({ row, onClose, onReload, userProfile }) => {
      const [text, setText] = useState(row.request_content || '');
      const [actionText, setActionText] = useState(row?.action_content || '');
      const [isSaving, setIsSaving] = useState(false);

      const handleAction = async (newStatus) => {
        setIsSaving(true);
        try {
          const nowIso = new Date().toISOString();

          const { error } = await supabase
            .from('logistics_issues')
            .update({
              request_content: text,
              action_content: actionText,
              status: newStatus,
              final_handler: userProfile?.name || '관리자',
              resolved_at: nowIso
            })
            .eq('id', row.id);

          if (error) throw error;

          await onReload();
          onClose();
        } catch (error) {
          console.error('Update error:', error);
          alert('상태 업데이트 중 오류가 발생했습니다.');
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>

          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-4xl slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-gray-900">현장 특이사항 요청 내용 ({row.reception_no})</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>

            <div className="p-5 bg-white grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch overflow-y-auto max-h-[80vh]">

              <div className="flex flex-col h-full">
                <h4 className="text-sm font-bold text-gray-700 mb-2">📸 현장 사진</h4>
                <ImageSlider imageUrlString={row.image_url} />
              </div>

              <div className="flex flex-col h-full space-y-4">

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-gray-700 mb-2">요청 내용</h4>
                  <textarea
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    placeholder="특이사항 조치 관련 요청 상세 내용이나 확인된 메모를 자유롭게 입력해 주세요."
                    disabled={userProfile?.role === '사용자' || row.status !== '조치대기'}
                    className={`flex-1 w-full border border-gray-300 rounded-lg p-3 text-sm text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-letusBlue focus:border-letusBlue outline-none resize-none transition-shadow ${userProfile?.role === '사용자' || row.status !== '조치대기' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : ''}`}
                  ></textarea>
                </div>

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-blue-600 mb-2">🛠️ 조치 내용 (현장 작업자 피드백용)</h4>
                  <textarea
                    value={actionText}
                    onChange={(e) => setActionText(e.target.value)}
                    placeholder="현장 작업자의 텔레그램으로 전송될 상세 조치 결과를 입력해 주세요."
                    disabled={userProfile?.role === '사용자' || row.status !== '조치대기'}
                    className={`flex-1 w-full border border-blue-300 rounded-lg p-3 text-sm text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none transition-shadow ${userProfile?.role === '사용자' || row.status !== '조치대기' ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'bg-blue-50'}`}
                  ></textarea>
                </div>

              </div>
            </div>

            <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center gap-2">

              <div>
                {row.status !== '조치대기' && (
                  <span className="text-gray-500 font-bold text-sm">✅ 처리가 이관/완료되어 내용을 수정할 수 없습니다.</span>
                )}
              </div>

              <div className="flex gap-2">
                <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded hover:bg-gray-100 transition-colors shadow-sm bg-white">
                  {row.status !== '조치대기' ? '닫기' : '취소'}
                </button>

                {row.status === '조치대기' && (
                  <>
                    <button
                      onClick={() => handleAction('처리 중')}
                      disabled={isSaving || userProfile?.role === '사용자'}
                      className={`px-6 py-2 text-white text-sm font-bold rounded shadow transition-colors flex items-center gap-2 ${userProfile?.role === '사용자' ? 'bg-gray-300 cursor-not-allowed opacity-60' : 'bg-yellow-500 hover:bg-yellow-600'} ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}
                    >
                      {isSaving ? '진행 중...' : '이관'}
                    </button>
                    <button
                      onClick={() => handleAction('조치완료')}
                      disabled={isSaving || userProfile?.role === '사용자'}
                      className={`px-6 py-2 text-white text-sm font-bold rounded shadow transition-colors flex items-center gap-2 ${userProfile?.role === '사용자' ? 'bg-gray-300 cursor-not-allowed opacity-60' : 'bg-green-500 hover:bg-green-600'
                        } ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}
                    >
                      {isSaving ? '진행 중...' : '조치완료'}
                    </button>
                  </>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    };

    const HandleModal = ({ row, onClose, onReload, userProfile }) => {
      const [text, setText] = useState(row.handleComment || '');
      const [actionText, setActionText] = useState(row.action_content || '');
      const [isSaving, setIsSaving] = useState(false);

      const handleAction = async (newStatus) => {
        setIsSaving(true);
        try {
          const nowIso = new Date().toISOString();

          const { error } = await supabase
            .from('logistics_issues')
            .update({
              request_content: text,
              action_content: actionText,
              status: newStatus,
              final_handler: userProfile?.name || '관리자',
              resolved_at: nowIso
            })
            .eq('id', row.id);

          if (error) throw error;

          await onReload();
          onClose();
        } catch (error) {
          console.error('Update error:', error);
          alert('상태 업데이트 중 오류가 발생했습니다.');
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-xl shadow-2xl z-10 w-full max-w-4xl slide-up border border-gray-100 overflow-hidden flex flex-col">
            <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="font-bold text-gray-900">현장 특이사항 조치 등록 ({row.reception_no})</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors"><CloseIcon /></button>
            </div>

            <div className="p-5 bg-white grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch overflow-y-auto max-h-[80vh]">

              <div className="flex flex-col h-full">
                <h4 className="text-sm font-bold text-gray-700 mb-2">📸 현장 사진</h4>
                <ImageSlider imageUrlString={row.image_url} />
              </div>

              <div className="flex flex-col h-full space-y-4">

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-gray-700 mb-2">요청 내용</h4>
                  <div className="flex-1 w-full border border-gray-200 bg-gray-100 rounded-lg p-3 text-sm text-gray-600 overflow-y-auto">
                    {row.request_content || '등록된 요청 내용이 없습니다.'}
                  </div>
                </div>

                <div className="flex-1 flex flex-col">
                  <h4 className="text-sm font-bold text-green-600 mb-2">🛠️ 조치 내용</h4>
                  <textarea
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    disabled={row.status === '조치완료'}
                    placeholder="추가 조치된 내용이나 완료 피드백을 상세하게 입력해 주세요."
                    className={`flex-1 w-full border rounded-lg p-3 text-sm text-gray-800 outline-none resize-none transition-shadow ${row.status === '조치완료' ? 'bg-gray-100 text-gray-500 border-gray-200 cursor-not-allowed' : 'border-gray-300 focus:ring-2 focus:ring-green-500 focus:border-green-500'}`}
                  ></textarea>
                </div>
              </div>
            </div>

            <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center gap-2">
              <div>
                {row.status === '조치완료' && (
                  <span className="text-green-600 font-bold text-sm">✅ 조치가 완료되어 내용을 수정할 수 없습니다.</span>
                )}
              </div>
              <div className="flex gap-2">
                <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-sm font-bold rounded hover:bg-gray-100 transition-colors shadow-sm bg-white">
                  {row.status === '조치완료' ? '닫기' : '취소'}
                </button>
                {row.status !== '조치완료' && (
                  <button
                    onClick={() => handleAction('조치완료')}
                    disabled={isSaving}
                    className={`px-6 py-2 bg-green-500 text-white text-sm font-bold rounded shadow hover:bg-green-600 transition-colors flex items-center gap-2 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}
                  >
                    {isSaving ? '진행 중...' : '조치완료'}
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const VendorSearchModal = ({ initialVendors, onApplyVendors, initialBrands, onApplyBrands, onClose }) => {
      const [query, setQuery] = React.useState('');
      const [vendorList, setVendorList] = React.useState([]);
      const [isLoading, setIsLoading] = React.useState(true);

      const [checkedVendors, setCheckedVendors] = React.useState(() => {
        if (!initialVendors) return [];
        return initialVendors.split(',').map(s => s.trim()).filter(Boolean);
      });

      const [checkedBrands, setCheckedBrands] = React.useState(() => {
        if (!initialBrands) return [];
        return initialBrands.split(',').map(s => s.trim()).filter(Boolean);
      });

      const brandList = ['퍼시스', '일룸', '시디즈', '슬로우베드', '알로소', '데스커', '바로스'];

      React.useEffect(() => {
        const fetchVendors = async () => {
          setIsLoading(true);
          try {
            const { data, error } = await supabase
              .from('vendors')
              .select('id, vendor_name')
              .order('vendor_name', { ascending: true });
            if (error) throw error;
            setVendorList(data || []);
          } catch (err) {
            console.error('vendors fetch error:', err.message);
          } finally {
            setIsLoading(false);
          }
        };
        fetchVendors();
      }, []);

      const filteredVendors = vendorList.filter(v => v.vendor_name.includes(query));
      const filteredBrands = brandList.filter(b => b.includes(query));

      const toggleVendor = (name) => {
        setCheckedVendors(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
      };

      const toggleBrand = (name) => {
        setCheckedBrands(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
      };

      const handleApply = () => {
        onApplyVendors(checkedVendors.join(','));
        onApplyBrands(checkedBrands.join(','));
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col slide-up h-[600px]" style={{ maxHeight: '80vh' }}>
            <div className="flex justify-between items-center px-5 py-4 border-b border-gray-100">
              <h4 className="text-sm font-bold text-gray-800 flex items-center">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>
                담당 업체 및 브랜드 검색
              </h4>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>

            <div className="px-4 py-3 border-b border-gray-100 bg-slate-50">
              <div className="relative">
                <svg className="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input
                  type="text"
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  placeholder="브랜드명 또는 업체명 검색..."
                  className="w-full pl-9 pr-3 py-2 text-xs border border-gray-200 rounded-[4px] focus:outline-none focus:border-letusBlue bg-white"
                  autoFocus
                />
              </div>
              {(checkedVendors.length > 0 || checkedBrands.length > 0) && (
                <p className="text-[10px] text-letusBlue font-bold mt-2">
                  브랜드 {checkedBrands.length}개, 업체 {checkedVendors.length}개 선택됨
                </p>
              )}
            </div>

            <div className="overflow-y-auto flex-1">
              {isLoading ? (
                <div className="py-10 text-center text-xs text-gray-400 flex flex-col items-center gap-2">
                  <svg className="animate-spin w-5 h-5 text-letusBlue" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                  목록 로딩 중...
                </div>
              ) : (
                <div className="divide-y divide-gray-100">
                  {filteredBrands.length > 0 && (
                    <div className="bg-white">
                      <div className="px-5 py-2 bg-slate-50 text-[10px] font-bold text-slate-400">관리 브랜드</div>
                      {filteredBrands.map(b => (
                        <div key={b} className={`flex items-center gap-3 px-5 py-2.5 cursor-pointer transition-colors ${checkedBrands.includes(b) ? 'bg-orange-50' : 'hover:bg-gray-50'}`} onClick={() => toggleBrand(b)}>
                          <input type="checkbox" readOnly checked={checkedBrands.includes(b)} className="w-3.5 h-3.5 accent-letusOrange cursor-pointer" />
                          <span className="text-xs font-bold text-gray-700">{b}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {filteredVendors.length > 0 && (
                    <div className="bg-white">
                      <div className="px-5 py-2 bg-slate-50 text-[10px] font-bold text-slate-400">담당 업체</div>
                      {filteredVendors.map(v => (
                        <div key={v.id} className={`flex items-center gap-3 px-5 py-2.5 cursor-pointer transition-colors ${checkedVendors.includes(v.vendor_name) ? 'bg-blue-50' : 'hover:bg-gray-50'}`} onClick={() => toggleVendor(v.vendor_name)}>
                          <input type="checkbox" readOnly checked={checkedVendors.includes(v.vendor_name)} className="w-3.5 h-3.5 accent-letusBlue cursor-pointer" />
                          <span className="text-xs font-bold text-gray-700">{v.vendor_name}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {filteredBrands.length === 0 && filteredVendors.length === 0 && (
                    <div className="py-10 text-center text-xs text-gray-400">검색 결과가 없습니다.</div>
                  )}
                </div>
              )}
            </div>

            <div className="px-4 py-3 border-t border-gray-100 bg-white flex justify-end gap-2 shrink-0">
              <button onClick={onClose} className="px-4 py-2 border border-gray-200 text-gray-500 text-[11px] font-bold rounded-[3px] hover:bg-gray-50">취소</button>
              <button
                onClick={handleApply}
                className="px-5 py-2 bg-letusBlue text-white text-[11px] font-bold rounded-[3px] hover:bg-blue-600 transition-colors"
              >
                적용하기 {(checkedVendors.length > 0 || checkedBrands.length > 0) && `(${checkedVendors.length + checkedBrands.length})`}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 🔐 메뉴 권한 설정 전용 모달 (MenuPermissionModal - 아코디언 구조) ---
    const MenuPermissionModal = ({ initialMenus, onApply, onClose }) => {
      const [selectedMenus, setSelectedMenus] = useState(initialMenus || []);
      const [expandedMenus, setExpandedMenus] = useState([]);

      // 실제 사이드바 구조와 동일한 메뉴 데이터
      const MENU_DATA = [
        {
          id: 'master', label: '마스터 정보관리',
          children: [{ id: 'user_management', label: '사용자 관리' }, { id: 'product_manager', label: 'ITEM DB 수동 업데이트' }]
        },
        {
          id: 'logistics', label: '입고 특이사항',
          children: [{ id: 'dashboard', label: '대시보드' }, { id: 'list', label: '특이사항 LIST' }]
        },
        {
          id: 'loading_issues', label: '상차 특이사항',
          children: [{ id: 'accident_dashboard', label: '사고분석 대시보드' }, { id: 'accident_list', label: '사고분석 LIST' }]
        },
        {
          id: 'support_menu', label: '고객 지원',
          children: [{ id: 'support', label: '지원센터' }]
        }
      ];

      // 대메뉴 아코디언 열기/닫기
      const toggleExpand = (id) => {
        setExpandedMenus(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);
      };

      // 대메뉴 체크박스 클릭 (하위 메뉴 일괄 선택/해제)
      const toggleMainMenu = (menu) => {
        const childIds = menu.children.map(c => c.id);
        const isAllSelected = childIds.every(id => selectedMenus.includes(id));

        if (isAllSelected) {
          // 전부 해제
          setSelectedMenus(prev => prev.filter(id => !childIds.includes(id)));
        } else {
          // 전부 선택
          setSelectedMenus(prev => [...new Set([...prev, ...childIds])]);
        }
      };

      // 하위 메뉴 개별 체크
      const toggleSubMenu = (id) => {
        setSelectedMenus(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);
      };

      const handleSave = () => {
        onApply(selectedMenus);
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[110] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-[400px] overflow-hidden flex flex-col slide-up">
            <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-gray-50 shrink-0">
              <h3 className="text-sm font-bold text-gray-800 flex items-center">
                <span className="w-1.5 h-3.5 bg-purple-500 rounded-full mr-2"></span>메뉴 접근 권한 설정
              </h3>
              <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors p-1"><CloseIcon /></button>
            </div>

            <div className="p-5 bg-white flex-1 overflow-y-auto max-h-[60vh] custom-scrollbar space-y-2">
              <div className="bg-purple-50 border border-purple-100 rounded-lg p-3 text-xs text-gray-600 mb-4 font-medium">
                💡 대메뉴를 선택하면 하위 메뉴가 모두 선택됩니다.<br />
                <span className="text-gray-400 mt-1 block">* 관리자 그룹은 이 설정과 무관하게 모든 메뉴에 접근 가능합니다.</span>
              </div>

              <div className="border border-gray-200 rounded-lg overflow-hidden divide-y divide-gray-100">
                {MENU_DATA.map(menu => {
                  const childIds = menu.children.map(c => c.id);
                  const isAllSelected = childIds.length > 0 && childIds.every(id => selectedMenus.includes(id));
                  const isPartiallySelected = !isAllSelected && childIds.some(id => selectedMenus.includes(id));
                  const isExpanded = expandedMenus.includes(menu.id);

                  return (
                    <div key={menu.id} className="bg-white">
                      {/* 대메뉴 헤더 */}
                      <div className="flex items-center justify-between p-3 hover:bg-gray-50 transition-colors">
                        <div className="flex items-center gap-2.5">
                          <input
                            type="checkbox"
                            checked={isAllSelected}
                            ref={input => { if (input) input.indeterminate = isPartiallySelected; }}
                            onChange={() => toggleMainMenu(menu)}
                            className="w-4 h-4 accent-purple-500 cursor-pointer"
                          />
                          <span className="text-sm font-bold text-gray-800 select-none cursor-pointer" onClick={() => toggleMainMenu(menu)}>{menu.label}</span>
                        </div>
                        <button onClick={() => toggleExpand(menu.id)} className="p-1 text-gray-400 hover:text-gray-600 transition-colors rounded-md hover:bg-gray-200">
                          <svg className={`w-4 h-4 transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
                        </button>
                      </div>

                      {/* 하위 메뉴 목록 (아코디언) */}
                      {isExpanded && (
                        <div className="bg-slate-50 pl-10 pr-3 py-2 space-y-2 border-t border-gray-50">
                          {menu.children.map(child => (
                            <label key={child.id} className="flex items-center gap-2.5 cursor-pointer group">
                              <input
                                type="checkbox"
                                checked={selectedMenus.includes(child.id)}
                                onChange={() => toggleSubMenu(child.id)}
                                className="w-3.5 h-3.5 accent-purple-500 cursor-pointer"
                              />
                              <span className={`text-xs font-medium transition-colors select-none ${selectedMenus.includes(child.id) ? 'text-gray-800 font-bold' : 'text-gray-500 group-hover:text-gray-700'}`}>{child.label}</span>
                            </label>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="p-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-2 shrink-0">
              <button type="button" onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-xs font-bold rounded hover:bg-gray-100 transition-colors bg-white">취소</button>
              <button onClick={handleSave} className="px-5 py-2 bg-purple-600 text-white text-xs font-bold rounded hover:bg-purple-700 transition-colors flex items-center gap-1.5 shadow-sm">
                권한 적용
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- 👥 선택 항목 일괄 수정 모달 (Web UI 체크박스 기반) ---
    const UserBulkEditModal = ({ selectedUserIds, users, onClose, onReload }) => {
      const [updateTarget, setUpdateTarget] = useState({ vendor: false, menu: false });
      const [managedVendors, setManagedVendors] = useState('');
      const [managedBrands, setManagedBrands] = useState('');
      const [accessibleMenus, setAccessibleMenus] = useState([]);
      const [vendorModalOpen, setVendorModalOpen] = useState(false);
      const [menuModalOpen, setMenuModalOpen] = useState(false);
      const [isSaving, setIsSaving] = useState(false);

      const targetUsers = users.filter(u => selectedUserIds.includes(u.id));

      const handleSave = async () => {
        if (!updateTarget.vendor && !updateTarget.menu) return alert('변경할 대상을 선택해 주세요.');

        setIsSaving(true);
        try {
          const updateData = {};
          if (updateTarget.vendor) {
            updateData.managed_vendors = managedVendors;
            updateData.managed_brands = managedBrands;
          }
          if (updateTarget.menu) {
            updateData.accessible_menus = accessibleMenus.join(',');
          }

          // 선택된 유저 ID들에 대해 일괄 업데이트 쿼리 실행
          const { error } = await adminSupabase.from('profiles').update(updateData).in('id', selectedUserIds);
          if (error) throw error;

          alert(`총 ${selectedUserIds.length}명의 정보가 일괄 수정되었습니다.`);
          onReload();
          onClose();
        } catch (err) {
          alert('일괄 수정 중 오류 발생: ' + err.message);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <>
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] backdrop-blur-sm p-4 animate-fade-in">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-[450px] overflow-hidden flex flex-col slide-up">
              <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
                <h3 className="text-sm font-bold text-gray-800 flex items-center"><span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>선택 항목 일괄 수정</h3>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1"><CloseIcon /></button>
              </div>
              <div className="p-6 bg-slate-50 flex-1 space-y-5">
                <div className="bg-blue-50 border border-blue-100 rounded-lg p-3 text-xs font-bold text-letusBlue text-center">
                  현재 <span className="text-lg mx-1">{selectedUserIds.length}</span>명의 사용자가 선택되었습니다.
                </div>

                <div className="space-y-4">
                  {/* 옵션 1: 업체/브랜드 일괄 변경 */}
                  <div className={`border rounded-lg p-4 transition-colors ${updateTarget.vendor ? 'border-letusBlue bg-white shadow-sm' : 'border-gray-200 bg-gray-50'}`}>
                    <label className="flex items-center gap-2 cursor-pointer font-bold text-gray-800 text-sm mb-3">
                      <input type="checkbox" checked={updateTarget.vendor} onChange={e => setUpdateTarget({ ...updateTarget, vendor: e.target.checked })} className="w-4 h-4 accent-letusBlue" />
                      담당 브랜드 및 업체 일괄 변경
                    </label>
                    {updateTarget.vendor && (
                      <div className="pl-6 animate-fade-in space-y-2">
                        <div className="flex flex-wrap gap-1.5 text-[10px] font-bold">
                          <span className="bg-orange-50 text-letusOrange border border-orange-200 px-2 py-0.5 rounded-full">{managedBrands || '선택된 브랜드 없음'}</span>
                          <span className="bg-blue-50 text-blue-600 border border-blue-200 px-2 py-0.5 rounded-full">{managedVendors || '선택된 업체 없음'}</span>
                        </div>
                        <button onClick={() => setVendorModalOpen(true)} className="text-[11px] font-bold text-letusBlue bg-blue-50 border border-blue-200 px-3 py-1.5 rounded hover:bg-blue-100">업체/브랜드 재설정 모달 열기</button>
                      </div>
                    )}
                  </div>

                  {/* 옵션 2: 메뉴 권한 일괄 변경 */}
                  <div className={`border rounded-lg p-4 transition-colors ${updateTarget.menu ? 'border-purple-400 bg-white shadow-sm' : 'border-gray-200 bg-gray-50'}`}>
                    <label className="flex items-center gap-2 cursor-pointer font-bold text-gray-800 text-sm mb-3">
                      <input type="checkbox" checked={updateTarget.menu} onChange={e => setUpdateTarget({ ...updateTarget, menu: e.target.checked })} className="w-4 h-4 accent-purple-500" />
                      메뉴 접근 권한 일괄 덮어쓰기
                    </label>
                    {updateTarget.menu && (
                      <div className="pl-6 animate-fade-in">
                        <button onClick={() => setMenuModalOpen(true)} className="text-[11px] font-bold text-purple-700 bg-purple-50 border border-purple-200 px-3 py-1.5 rounded hover:bg-purple-100 flex items-center gap-1.5">
                          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                          메뉴 권한 아코디언 열기 ({accessibleMenus.length}개 선택됨)
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="p-4 border-t bg-white flex justify-end gap-2">
                <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-[11px] font-bold rounded hover:bg-gray-50">취소</button>
                <button onClick={handleSave} disabled={isSaving || (!updateTarget.vendor && !updateTarget.menu)} className="px-5 py-2 bg-letusBlue text-white text-[11px] font-bold rounded hover:bg-blue-600 flex items-center gap-1.5 disabled:opacity-50">
                  {isSaving ? '일괄 적용 중...' : '선택 대상 일괄 적용'}
                </button>
              </div>
            </div>
          </div>
          {vendorModalOpen && <VendorSearchModal initialVendors={managedVendors} onApplyVendors={setManagedVendors} initialBrands={managedBrands} onApplyBrands={setManagedBrands} onClose={() => setVendorModalOpen(false)} />}
          {menuModalOpen && <MenuPermissionModal initialMenus={accessibleMenus} onApply={setAccessibleMenus} onClose={() => setMenuModalOpen(false)} />}
        </>
      );
    };

    // --- 👤 사용자 추가 모달 (UserAddModal - UI 간소화 및 메뉴권한 모달 분리) ---
    const UserAddModal = ({ onClose, onReload }) => {
      const [name, setName] = useState('');
      const [loginId, setLoginId] = useState('');
      const [password, setPassword] = useState('');
      const [group, setGroup] = useState('관리자');
      const [status, setStatus] = useState('정상');
      const [brand, setBrand] = useState('퍼시스');
      const [team, setTeam] = useState('');
      const [managedVendors, setManagedVendors] = useState('');
      const [managedBrands, setManagedBrands] = useState('');
      const [vendorModalOpen, setVendorModalOpen] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      // 🔥 신규: 메뉴 권한 모달 상태 및 기본값 설정
      const [menuModalOpen, setMenuModalOpen] = useState(false);
      const [accessibleMenus, setAccessibleMenus] = useState(['dashboard', 'list', 'accident_dashboard', 'accident_list']);

      const handleSave = async (e) => {
        e.preventDefault();
        setErrorMsg('');

        if (!name || !loginId || !password) { setErrorMsg('이름, 아이디, 비밀번호를 모두 입력해 주세요.'); return; }
        if (password.length < 6) { setErrorMsg('비밀번호는 최소 6자리 이상이어야 합니다.'); return; }

        setIsSaving(true);
        try {
          const targetEmail = loginId.includes('@') ? loginId : `${loginId}@letus.com`;
          const { data: authData, error: authError } = await adminSupabase.auth.admin.createUser({ email: targetEmail, password: password, email_confirm: true });
          if (authError) throw authError;

          const newUserId = authData.user.id;
          const { error: profileError } = await adminSupabase.from('profiles').insert([
            {
              id: newUserId, name: name, login_id: loginId, role: group, status: status, brands: brand, team: team,
              managed_vendors: managedVendors, managed_brands: managedBrands,
              accessible_menus: accessibleMenus.join(','),
              created_at: new Date().toISOString()
            }
          ]);
          if (profileError) throw profileError;

          alert('신규 사용자가 성공적으로 등록되었습니다.');
          onReload();
          onClose();
        } catch (error) {
          console.error("User Creation Error:", error);
          setErrorMsg(`등록 실패: ${error.message}`);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <>
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] backdrop-blur-sm p-4 animate-fade-in">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-[480px] overflow-hidden flex flex-col slide-up">
              <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
                <h3 className="text-sm font-bold text-gray-800 flex items-center">
                  <span className="w-1.5 h-3.5 bg-letusOrange rounded-full mr-2"></span>사용자 추가
                </h3>
                <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors p-1"><CloseIcon /></button>
              </div>

              <div className="p-6 bg-slate-50 flex-1 overflow-y-auto max-h-[70vh] custom-scrollbar">
                <form id="addForm" onSubmit={handleSave} className="space-y-4">
                  {errorMsg && (
                    <div className="bg-red-50 text-red-600 text-xs font-bold p-3 rounded border border-red-100 flex items-center gap-1.5">
                      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      {errorMsg}
                    </div>
                  )}

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">이름 <span className="text-red-500">*</span></label>
                    <input type="text" value={name} onChange={(e) => setName(e.target.value)} required className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-xs focus:outline-none focus:border-letusBlue transition-all bg-white" placeholder="사용자 이름" />
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">아이디 (ID) <span className="text-red-500">*</span></label>
                    <div className="flex items-center border border-gray-300 rounded-[4px] overflow-hidden focus-within:border-letusBlue bg-white transition-all">
                      <input type="text" value={loginId} onChange={(e) => setLoginId(e.target.value)} required className="flex-1 px-3.5 py-2 text-xs focus:outline-none placeholder-slate-400" placeholder="admin" />
                      <span className="bg-slate-50 px-3 py-2 text-xs text-slate-500 font-bold border-l border-gray-200 shrink-0">@letus.com</span>
                    </div>
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">비밀번호 <span className="text-red-500">*</span></label>
                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-xs focus:outline-none focus:border-letusBlue transition-all bg-white" placeholder="최소 6자리 이상" />
                  </div>

                  <div className="grid grid-cols-2 gap-4 pt-1">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-[11px] font-bold text-gray-700">소속 팀 <span className="text-red-500">*</span></label>
                      <input type="text" value={team} onChange={(e) => setTeam(e.target.value)} required className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800" placeholder="소속 팀 입력" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-[11px] font-bold text-gray-700">소속 브랜드 <span className="text-red-500">*</span></label>
                      <select value={brand} onChange={(e) => setBrand(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                        <option value="전체">전체 (All)</option><option value="퍼시스">퍼시스</option><option value="일룸">일룸</option><option value="슬로우베드">슬로우베드</option><option value="데스커">데스커</option><option value="시디즈">시디즈</option><option value="알로소">알로소</option><option value="바로스">바로스</option>
                      </select>
                    </div>
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-[11px] font-bold text-gray-700">담당 브랜드 및 업체 관리</label>
                    <div className="min-h-[60px] border border-gray-300 rounded-[4px] bg-white px-2.5 py-2 flex flex-col gap-2">
                      <div className="flex flex-wrap gap-1.5 items-center">
                        <span className="text-[9px] font-black text-orange-400 bg-orange-50 px-1 rounded">BRAND</span>
                        {managedBrands ? managedBrands.split(',').filter(Boolean).map((b, i) => (
                          <span key={i} className="bg-orange-50 text-letusOrange border border-orange-200 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">{b.trim()}</span>
                        )) : <span className="text-gray-300 text-[10px]">미설정</span>}
                      </div>
                      <div className="flex flex-wrap gap-1.5 items-center">
                        <span className="text-[9px] font-black text-blue-400 bg-blue-50 px-1 rounded">VENDOR</span>
                        {managedVendors ? managedVendors.split(',').filter(Boolean).map((v, i) => (
                          <span key={i} className="bg-blue-50 text-blue-600 border border-blue-200 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">{v.trim()}</span>
                        )) : <span className="text-gray-300 text-[10px]">미설정</span>}
                      </div>
                    </div>
                    <button type="button" onClick={() => setVendorModalOpen(true)} className="flex items-center gap-1.5 text-[11px] font-bold text-letusBlue border border-letusBlue/40 bg-blue-50 hover:bg-blue-100 rounded-[4px] px-3 py-1.5 transition-colors w-fit">
                      <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> 업체 검색 및 추가
                    </button>
                  </div>

                  <div className="grid grid-cols-2 gap-4 pb-1">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-[11px] font-bold text-gray-700">권한 그룹</label>
                      <select value={group} onChange={(e) => setGroup(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                        <option value="관리자">관리자</option>
                        <option value="사용자">사용자</option>
                      </select>
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-[11px] font-bold text-gray-700">계정 상태</label>
                      <select value={status} onChange={(e) => setStatus(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                        <option value="정상">정상 승인</option>
                        <option value="정지">이용 정지</option>
                      </select>
                    </div>
                  </div>
                </form>
              </div>

              {/* 🔥 하단 영역 분리: 좌측(메뉴 권한 설정), 우측(취소/등록) */}
              <div className="p-4 border-t border-gray-200 bg-white flex justify-between items-center shrink-0">
                <div>
                  <button
                    type="button"
                    onClick={() => setMenuModalOpen(true)}
                    disabled={group === '관리자'}
                    className={`flex items-center gap-1.5 text-[11px] font-bold px-3 py-[9px] rounded-[3px] border transition-colors ${group === '관리자' ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100 cursor-pointer'}`}
                    title={group === '관리자' ? "관리자는 모든 메뉴에 접근 가능합니다." : "사용자가 볼 수 있는 메뉴를 설정합니다."}
                  >
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                    메뉴 권한 설정
                  </button>
                </div>
                <div className="flex gap-2">
                  <button type="button" onClick={onClose} className="px-5 py-[9px] border border-gray-300 text-gray-600 text-[11px] font-bold rounded-[3px] hover:bg-gray-50 transition-colors">취소</button>
                  <button onClick={handleSave} disabled={isSaving} className={`px-5 py-[9px] bg-letusBlue text-white text-[11px] font-bold rounded-[3px] hover:bg-blue-600 transition-colors flex items-center gap-1.5 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    {isSaving ? <svg className="animate-spin h-3.5 w-3.5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> : null}
                    {isSaving ? '생성 중...' : '등록하기'}
                  </button>
                </div>
              </div>
            </div>
          </div>
          {vendorModalOpen && <VendorSearchModal initialVendors={managedVendors} onApplyVendors={setManagedVendors} initialBrands={managedBrands} onApplyBrands={setManagedBrands} onClose={() => setVendorModalOpen(false)} />}
          {/* 🔥 분리된 메뉴 모달 연결 */}
          {menuModalOpen && <MenuPermissionModal initialMenus={accessibleMenus} onApply={setAccessibleMenus} onClose={() => setMenuModalOpen(false)} />}
        </>
      );
    };

    // --- 👥 사용자 일괄 업로드 전용 모달 (Excel Upsert: 신규생성 + 기존수정) ---
    const UserBulkUploadModal = ({ onClose, onReload }) => {
      const [file, setFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);
      const [uploadStats, setUploadStats] = useState(null);

      const handleDownloadTemplate = () => {
        const templateData = [
          {
            '이름(필수)': '홍길동', '아이디(필수)': 'gildong', '비밀번호(필수/선택)': '123456',
            '소속팀(필수)': '물류사업1팀', '소속브랜드': '퍼시스', '권한그룹': '사용자', '상태': '정상',
            '담당브랜드': '퍼시스, 일룸', '담당업체': 'CJ대한통운',
            '허용메뉴(ID)': 'dashboard,list,accident_dashboard,accident_list'
          }
        ];
        const ws = XLSX.utils.json_to_sheet(templateData);
        ws['!cols'] = [{ wch: 10 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 20 }, { wch: 20 }, { wch: 40 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "사용자업로드양식");
        XLSX.writeFile(wb, `사용자_일괄등록수정_양식_${new Date().toISOString().split('T')[0]}.xlsx`);
      };

      const handleFileChange = (e) => {
        const selected = e.target.files[0];
        if (selected && selected.name.includes('.xls')) setFile(selected);
        else { alert('엑셀 파일(.xlsx, .xls)만 업로드 가능합니다.'); e.target.value = null; }
      };

      const handleUpload = async () => {
        if (!file) return alert('업로드할 엑셀 파일을 선택해 주세요.');
        setIsUploading(true); setUploadStats(null);

        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const wb = XLSX.read(e.target.result, { type: 'binary' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });

            if (rows.length === 0) throw new Error('엑셀 파일에 데이터가 없습니다.');

            let insertCount = 0; let updateCount = 0; let failCount = 0;
            const errorLogs = [];

            for (const [index, row] of rows.entries()) {
              const rowNum = index + 2;
              const name = String(row['이름(필수)'] || '').trim();
              const loginId = String(row['아이디(필수)'] || '').trim();
              const password = String(row['비밀번호(필수/선택)'] || '').trim();
              const team = String(row['소속팀(필수)'] || '').trim();

              if (!name || !loginId || !team) {
                failCount++; errorLogs.push(`${rowNum}행: 필수 항목 누락`); continue;
              }

              try {
                // 🔥 DB에서 기존 계정 존재 여부 확인
                const { data: existingProfiles } = await adminSupabase.from('profiles').select('id').eq('login_id', loginId);
                const existingProfile = existingProfiles?.[0];

                const role = String(row['권한그룹'] || '사용자').trim();
                const status = String(row['상태'] || '정상').trim();
                const brand = String(row['소속브랜드'] || '전체').trim();
                const mBrands = String(row['담당브랜드'] || '').trim();
                const mVendors = String(row['담당업체'] || '').trim();
                let menus = String(row['허용메뉴(ID)'] || '').trim();
                if (!menus) menus = 'accident_dashboard,accident_list';

                if (existingProfile) {
                  // 🔥 기존 계정 업데이트
                  if (password && password.length >= 6) {
                    await adminSupabase.auth.admin.updateUserById(existingProfile.id, { password });
                  }
                  await adminSupabase.from('profiles').update({
                    name, role, status, brands: brand, team,
                    managed_vendors: mVendors, managed_brands: mBrands, accessible_menus: menus
                  }).eq('id', existingProfile.id);
                  updateCount++;
                } else {
                  // 🔥 신규 계정 생성
                  if (!password || password.length < 6) throw new Error('신규 계정은 6자리 이상의 비밀번호가 필수입니다.');
                  const targetEmail = loginId.includes('@') ? loginId : `${loginId}@letus.com`;
                  const { data: authData, error: authError } = await adminSupabase.auth.admin.createUser({ email: targetEmail, password: password, email_confirm: true });
                  if (authError) throw authError;

                  await adminSupabase.from('profiles').insert([{
                    id: authData.user.id, name, login_id: loginId, role, status, brands: brand, team,
                    managed_vendors: mVendors, managed_brands: mBrands, accessible_menus: menus, created_at: new Date().toISOString()
                  }]);
                  insertCount++;
                }
              } catch (err) {
                failCount++; errorLogs.push(`${rowNum}행 (${loginId}): ${err.message}`);
              }
            }
            setUploadStats({ insert: insertCount, update: updateCount, fail: failCount, logs: errorLogs });
            if (insertCount > 0 || updateCount > 0) onReload();

          } catch (err) { alert('업로드 중 오류 발생: ' + err.message); }
          finally { setIsUploading(false); }
        };
        reader.readAsBinaryString(file);
      };

      return (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-[500px] overflow-hidden flex flex-col slide-up">
            <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
              <h3 className="text-sm font-bold text-gray-800 flex items-center"><span className="w-1.5 h-3.5 bg-green-500 rounded-full mr-2"></span>사용자 일괄 등록/수정 (Excel)</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1"><CloseIcon /></button>
            </div>
            <div className="p-6 bg-slate-50 flex-1 overflow-y-auto max-h-[70vh] custom-scrollbar">
              {!uploadStats ? (
                <div className="space-y-4">
                  <div className="bg-blue-50 border border-blue-100 rounded-lg p-4 text-xs font-medium text-gray-600 space-y-1">
                    <p className="font-bold text-letusBlue mb-2">💡 엑셀 일괄 처리 가이드</p>
                    <p>- <span className="font-bold text-green-600">신규 아이디:</span> 시스템에 새로운 계정으로 등록됩니다.</p>
                    <p>- <span className="font-bold text-orange-500">기존 아이디:</span> 엑셀 데이터로 기존 정보가 <b>업데이트(덮어쓰기)</b> 됩니다.</p>
                  </div>
                  <button onClick={handleDownloadTemplate} className="w-full flex justify-center gap-2 py-2.5 border border-green-500 text-green-600 text-xs font-bold rounded-lg hover:bg-green-50 shadow-sm"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>양식 다운로드</button>
                  <input type="file" accept=".xlsx, .xls" onChange={handleFileChange} className="block w-full text-xs text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded file:border-0 file:font-bold file:bg-blue-50 file:text-letusBlue hover:file:bg-blue-100 border border-gray-300 rounded-lg bg-white cursor-pointer" />
                </div>
              ) : (
                <div className="space-y-4">
                  <div className="p-4 rounded-lg border bg-white border-gray-200">
                    <h4 className="font-bold text-gray-800 mb-2 text-center">업로드 처리 결과</h4>
                    <div className="flex justify-center gap-4 text-sm font-bold">
                      <span className="text-green-600">✨ 신규: {uploadStats.insert}</span>
                      <span className="text-blue-600">🔄 수정: {uploadStats.update}</span>
                      <span className="text-red-500">❌ 실패: {uploadStats.fail}</span>
                    </div>
                  </div>
                  {uploadStats.logs.length > 0 && (
                    <div className="bg-red-50 border border-red-100 rounded-lg p-3 max-h-32 overflow-auto text-[11px] text-red-500">
                      {uploadStats.logs.map((l, i) => <p key={i}>- {l}</p>)}
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className="p-4 border-t bg-white flex justify-end gap-2">
              <button onClick={onClose} className="px-5 py-2 border border-gray-300 text-gray-600 text-[11px] font-bold rounded hover:bg-gray-50">{uploadStats ? '닫기' : '취소'}</button>
              {!uploadStats && <button onClick={handleUpload} disabled={isUploading || !file} className="px-5 py-2 bg-letusBlue text-white text-[11px] font-bold rounded hover:bg-blue-600 flex items-center gap-1.5">{isUploading ? '처리 중...' : '데이터 분석 및 적용'}</button>}
            </div>
          </div>
        </div>
      );
    };

    // --- 👤 사용자 정보 수정 모달 (UserEditModal - UI 간소화 및 메뉴권한 모달 분리) ---
    const UserEditModal = ({ user, onClose, onReload, isProfileMode = false }) => {
      const [name, setName] = useState(user.name || '');
      const [loginId, setLoginId] = useState(user.login_id || '');
      const [password, setPassword] = useState('');
      const [group, setGroup] = useState(user.role || '사용자');
      const [status, setStatus] = useState(user.status || '정상');
      const [brand, setBrand] = useState(user.brands || '전체');
      const [team, setTeam] = useState(user.team || '');
      const [managedVendors, setManagedVendors] = useState(user.managed_vendors || '');
      const [managedBrands, setManagedBrands] = useState(user.managed_brands || '');

      const [vendorModalOpen, setVendorModalOpen] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');

      // 🔥 신규: 메뉴 권한 모달 상태 설정
      const [menuModalOpen, setMenuModalOpen] = useState(false);
      const [accessibleMenus, setAccessibleMenus] = useState(user.accessible_menus ? user.accessible_menus.split(',') : []);

      React.useEffect(() => {
        if (user) {
          setManagedVendors(user.managed_vendors || '');
          setManagedBrands(user.managed_brands || '');
        }
      }, [user]);

      const handleSave = async (e) => {
        e.preventDefault();
        setErrorMsg('');

        if (!name || !loginId) { setErrorMsg('이름과 아이디는 필수 입력 항목입니다.'); return; }
        if (password && password.length < 6) { setErrorMsg('비밀번호는 최소 6자리 이상이어야 합니다.'); return; }

        setIsSaving(true);
        try {
          const { error: profileError } = await adminSupabase.from('profiles').update({
            name, login_id: loginId, role: group, status, brands: brand, team,
            managed_vendors: managedVendors, managed_brands: managedBrands,
            accessible_menus: accessibleMenus.join(','),
          }).eq('id', user.id);
          if (profileError) throw profileError;

          if (password) {
            const { error: pwError } = await adminSupabase.auth.admin.updateUserById(user.id, { password });
            if (pwError) throw pwError;
          }

          alert('사용자 정보가 수정되었습니다.');
          onReload();
          onClose();
        } catch (error) {
          console.error('User Update Error:', error);
          setErrorMsg(`수정 실패: ${error.message}`);
        } finally {
          setIsSaving(false);
        }
      };

      return (
        <>
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[100] backdrop-blur-sm p-4 animate-fade-in">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-[480px] overflow-hidden flex flex-col slide-up">
              <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-white">
                <h3 className="text-sm font-bold text-gray-800 flex items-center">
                  <span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>
                  {isProfileMode ? '내 정보 수정' : '사용자 정보 수정'}
                </h3>
                <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors p-1"><CloseIcon /></button>
              </div>

              <div className="p-6 bg-slate-50 flex-1 overflow-y-auto max-h-[70vh] custom-scrollbar">
                <form id="editForm" onSubmit={handleSave} className="space-y-4">
                  {errorMsg && (
                    <div className="bg-red-50 text-red-600 text-xs font-bold p-3 rounded border border-red-100 flex items-center gap-1.5">
                      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      {errorMsg}
                    </div>
                  )}

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">이름 <span className="text-red-500">*</span></label>
                    <input type="text" value={name} onChange={(e) => setName(e.target.value)} required className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-xs focus:outline-none focus:border-letusBlue transition-all bg-white" />
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">아이디 (ID) <span className="text-red-500">*</span></label>
                    <div className="flex items-center border border-gray-300 rounded-[4px] overflow-hidden focus-within:border-letusBlue bg-white transition-all">
                      <input type="text" value={loginId} onChange={(e) => setLoginId(e.target.value)} required disabled={isProfileMode} className={`flex-1 px-3.5 py-2 text-xs focus:outline-none ${isProfileMode ? 'bg-gray-100 text-gray-500 cursor-not-allowed' : 'placeholder-slate-400'}`} />
                      <span className="bg-slate-50 px-3 py-2 text-xs text-slate-500 font-bold border-l border-gray-200 shrink-0">@letus.com</span>
                    </div>
                  </div>

                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-gray-700">새 비밀번호 <span className="text-slate-400 font-normal">(변경 시에만 입력)</span></label>
                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} minLength={6} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-xs focus:outline-none focus:border-letusBlue transition-all bg-white" placeholder="변경하지 않으려면 비워두세요" />
                  </div>

                  <div className="grid grid-cols-2 gap-4 pt-1">
                    <div className="flex flex-col gap-1.5">
                      <label className="text-[11px] font-bold text-gray-700">소속 팀 <span className="text-red-500">*</span></label>
                      <input type="text" value={team} onChange={(e) => setTeam(e.target.value)} required className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800" />
                    </div>
                    <div className="flex flex-col gap-1.5">
                      <label className="text-[11px] font-bold text-gray-700">소속 브랜드 <span className="text-red-500">*</span></label>
                      <select value={brand} onChange={(e) => setBrand(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                        <option value="전체">전체 (All)</option><option value="퍼시스">퍼시스</option><option value="일룸">일룸</option><option value="슬로우베드">슬로우베드</option><option value="데스커">데스커</option><option value="시디즈">시디즈</option><option value="알로소">알로소</option><option value="바로스">바로스</option>
                      </select>
                    </div>
                  </div>

                  {!isProfileMode && (
                    <>
                      <div className="flex flex-col gap-1.5">
                        <label className="text-[11px] font-bold text-gray-700">담당 브랜드 및 업체 관리</label>
                        <div className="min-h-[60px] border border-gray-300 rounded-[4px] bg-white px-2.5 py-2 flex flex-col gap-2">
                          <div className="flex flex-wrap gap-1.5 items-center">
                            <span className="text-[9px] font-black text-orange-400 bg-orange-50 px-1 rounded">BRAND</span>
                            {managedBrands ? managedBrands.split(',').filter(Boolean).map((b, i) => (
                              <span key={i} className="bg-orange-50 text-letusOrange border border-orange-200 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">{b.trim()}</span>
                            )) : <span className="text-gray-300 text-[10px]">미설정</span>}
                          </div>
                          <div className="flex flex-wrap gap-1.5 items-center">
                            <span className="text-[9px] font-black text-blue-400 bg-blue-50 px-1 rounded">VENDOR</span>
                            {managedVendors ? managedVendors.split(',').filter(Boolean).map((v, i) => (
                              <span key={i} className="bg-blue-50 text-blue-600 border border-blue-200 text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1">{v.trim()}</span>
                            )) : <span className="text-gray-300 text-[10px]">미설정</span>}
                          </div>
                        </div>
                        <button type="button" onClick={() => setVendorModalOpen(true)} className="flex items-center gap-1.5 text-[11px] font-bold text-letusBlue border border-letusBlue/40 bg-blue-50 hover:bg-blue-100 rounded-[4px] px-3 py-1.5 transition-colors w-fit">
                          <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> 업체 검색 및 추가
                        </button>
                      </div>

                      <div className="grid grid-cols-2 gap-4 pb-1">
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[11px] font-bold text-gray-700">권한 그룹</label>
                          <select value={group} onChange={(e) => setGroup(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                            <option value="관리자">관리자</option>
                            <option value="사용자">사용자</option>
                          </select>
                        </div>
                        <div className="flex flex-col gap-1.5">
                          <label className="text-[11px] font-bold text-gray-700">계정 상태</label>
                          <select value={status} onChange={(e) => setStatus(e.target.value)} className="border border-gray-300 rounded-[4px] px-3.5 py-2 text-[11px] focus:outline-none focus:border-letusBlue transition-all bg-white text-gray-800 font-medium cursor-pointer">
                            <option value="정상">정상 승인</option>
                            <option value="정지">이용 정지</option>
                          </select>
                        </div>
                      </div>
                    </>
                  )}
                </form>
              </div>

              {/* 🔥 하단 영역 분리 */}
              <div className="p-4 border-t border-gray-200 bg-white flex justify-between items-center shrink-0">
                <div>
                  {!isProfileMode && (
                    <button
                      type="button"
                      onClick={() => setMenuModalOpen(true)}
                      disabled={group === '관리자'}
                      className={`flex items-center gap-1.5 text-[11px] font-bold px-3 py-[9px] rounded-[3px] border transition-colors ${group === '관리자' ? 'bg-gray-100 text-gray-400 border-gray-200 cursor-not-allowed' : 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100 cursor-pointer'}`}
                    >
                      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                      메뉴 권한 설정
                    </button>
                  )}
                </div>
                <div className="flex gap-2">
                  <button type="button" onClick={onClose} className="px-5 py-[9px] border border-gray-300 text-gray-600 text-[11px] font-bold rounded-[3px] hover:bg-gray-50 transition-colors">취소</button>
                  <button onClick={handleSave} disabled={isSaving} className={`px-5 py-[9px] bg-letusBlue text-white text-[11px] font-bold rounded-[3px] hover:bg-blue-600 transition-colors flex items-center gap-1.5 ${isSaving ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    {isSaving ? <svg className="animate-spin h-3.5 w-3.5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> : null}
                    {isSaving ? '수정 중...' : '수정하기'}
                  </button>
                </div>
              </div>
            </div>
          </div>
          {vendorModalOpen && <VendorSearchModal initialVendors={managedVendors} onApplyVendors={setManagedVendors} initialBrands={managedBrands} onApplyBrands={setManagedBrands} onClose={() => setVendorModalOpen(false)} />}
          {/* 🔥 분리된 메뉴 모달 연결 */}
          {menuModalOpen && <MenuPermissionModal initialMenus={accessibleMenus} onApply={setAccessibleMenus} onClose={() => setMenuModalOpen(false)} />}
        </>
      );
    };

    const VendorListModal = ({ user, onClose }) => {
      const bRaw = user?.managed_brands || '';
      const vRaw = user?.managed_vendors || '';
      const brandList = typeof bRaw === 'string' ? bRaw.split(',').map(v => v.trim()).filter(Boolean) : [];
      const vendorList = typeof vRaw === 'string' ? vRaw.split(',').map(v => v.trim()).filter(Boolean) : [];

      const totalCount = brandList.length + vendorList.length;

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[200] backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-xs overflow-hidden flex flex-col slide-up h-[500px]" style={{ maxHeight: '70vh' }}>
            <div className="flex justify-between items-center px-5 py-4 border-b border-gray-100 shrink-0">
              <h4 className="text-sm font-bold text-gray-800 flex items-center">
                <span className="w-1.5 h-3.5 bg-letusBlue rounded-full mr-2"></span>
                담당 브랜드 및 업체
                <span className="ml-2 text-xs text-letusBlue font-bold bg-blue-50 border border-blue-200 rounded-full px-2 py-0.5">{totalCount}개</span>
              </h4>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-1">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>

            <div className="overflow-y-auto flex-1 divide-y divide-gray-50">
              {brandList.length > 0 && (
                <div>
                  <div className="px-5 py-2 bg-orange-50/50 text-[10px] font-bold text-orange-400">관리 브랜드</div>
                  {brandList.map((b, i) => (
                    <div key={i} className="flex items-center gap-3 px-5 py-2.5">
                      <span className="w-4 h-4 rounded-full bg-orange-100 text-letusOrange text-[9px] font-black flex items-center justify-center shrink-0">{i + 1}</span>
                      <span className="text-xs font-bold text-gray-700">{b}</span>
                    </div>
                  ))}
                </div>
              )}
              {vendorList.length > 0 && (
                <div>
                  <div className="px-5 py-2 bg-blue-50/50 text-[10px] font-bold text-letusBlue">담당 업체</div>
                  {vendorList.map((v, i) => (
                    <div key={i} className="flex items-center gap-3 px-5 py-2.5">
                      <span className="w-4 h-4 rounded-full bg-blue-100 text-letusBlue text-[9px] font-black flex items-center justify-center shrink-0">{i + 1}</span>
                      <span className="text-xs font-bold text-gray-700">{v}</span>
                    </div>
                  ))}
                </div>
              )}
              {totalCount === 0 && (
                <div className="py-16 text-center text-xs text-gray-400 font-bold">등록된 정보가 없습니다.</div>
              )}
            </div>

            <div className="px-4 py-3 border-t border-gray-100 bg-gray-50 flex justify-end shrink-0">
              <button onClick={onClose} className="px-5 py-2 bg-slate-700 text-white text-[11px] font-bold rounded-[3px] hover:bg-slate-800 transition-colors">닫기</button>
            </div>
          </div>
        </div>
      );
    };

    // --- 사이드바 (Sidebar) 메인 업데이트 (메뉴 권한 통제 적용) ---
    const Sidebar = ({ page, setPage, userProfile, isSidebarOpen, setIsSidebarOpen, favorites }) => {
      const [openMenu, setOpenMenu] = useState('logistics');
      const [activeTab, setActiveTab] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');

      const menuData = [
        // 🔥 신규: 사이드바 맨 위에 홈 버튼 추가
        {
          id: 'home_menu', label: '나의 워크스페이스',
